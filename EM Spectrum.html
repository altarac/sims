<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Electromagnetic Spectrum Explorer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Custom styles for the slider thumb to ensure accent-color works well across browsers */
    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      background: transparent;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 20px;
      width: 20px;
      border-radius: 50%;
      background: currentColor;
      cursor: pointer;
      margin-top: -6px; /* You need to specify a margin in Chrome, but in Firefox and IE it is automatic */
    }
    input[type=range]::-moz-range-thumb {
      height: 20px;
      width: 20px;
      border-radius: 50%;
      background: currentColor;
      cursor: pointer;
      border: none;
    }
    input[type=range]::-webkit-slider-runnable-track {
      width: 100%;
      height: 8px;
      cursor: pointer;
      background: #1e293b; /* slate-800 */
      border-radius: 9999px;
    }
    input[type=range]:focus {
      outline: none;
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans selection:bg-slate-800 min-h-screen">

  <div class="max-w-5xl mx-auto px-6 py-12 flex flex-col gap-8">
    
    <!-- Header -->
    <div class="text-center space-y-2">
      <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight bg-gradient-to-r from-slate-200 to-slate-500 bg-clip-text text-transparent">
        Electromagnetic Spectrum
      </h1>
      <p class="text-slate-400 text-lg max-w-2xl mx-auto">
        Slide through the frequencies to explore how energy travels through space in the form of waves.
      </p>
      <div class="flex justify-center mt-6">
        <button
          id="testModeBtn"
          class="px-6 py-2.5 rounded-full font-bold text-sm tracking-wide transition-all duration-300 flex items-center gap-2 bg-slate-800 text-slate-300 hover:bg-slate-700 border border-slate-700"
        >
          Test Yourself
        </button>
      </div>
    </div>

    <!-- Main Visualizer Window -->
    <div 
      id="visualizerContainer"
      class="relative w-full h-80 rounded-3xl border border-slate-800 bg-slate-900/50 overflow-hidden shadow-2xl transition-colors duration-500 flex flex-col items-center justify-center"
    >
      <!-- Animated Wave Canvas -->
      <canvas 
        id="waveCanvas" 
        class="absolute inset-0 w-full h-full opacity-80"
      ></canvas>

      <!-- Overlay Text -->
      <div class="relative z-10 flex flex-col items-center text-center drop-shadow-2xl">
        
        <!-- Test Mode Overlay (Hidden by default) -->
        <button
          id="revealBtn"
          class="hidden group flex flex-col items-center justify-center px-10 py-8 rounded-3xl bg-slate-950/40 hover:bg-slate-900/60 backdrop-blur-md border border-slate-700/50 transition-all duration-300 cursor-pointer shadow-2xl"
        >
          <span class="text-6xl md:text-8xl font-black text-slate-200 opacity-90 mb-3 group-hover:scale-110 transition-transform">?</span>
          <span class="text-slate-300 font-bold tracking-widest uppercase text-sm">Click to Reveal Name</span>
        </button>

        <!-- Normal Overlay -->
        <div id="normalOverlay" class="pointer-events-none flex flex-col items-center">
          <div class="flex items-center gap-3 mb-2" id="titleContainer">
            <span id="iconContainer"></span>
            <h2 id="categoryText" class="text-4xl md:text-6xl font-black uppercase tracking-widest">
              Category
            </h2>
          </div>
          
          <h3 
            id="subCategoryText"
            class="text-3xl md:text-4xl font-bold transition-all duration-300 hidden"
          >
            Subcategory Light
          </h3>
        </div>

      </div>
    </div>

    <!-- Controls Section -->
    <div class="bg-slate-900 rounded-3xl p-6 md:p-8 border border-slate-800 shadow-xl space-y-8">
      
      <div class="space-y-4">
        <div class="flex justify-between items-center text-sm font-medium text-slate-400 uppercase tracking-wider">
          <span>Lower Frequency</span>
          <span>Higher Frequency</span>
        </div>

        <!-- Slider -->
        <input
          type="range"
          id="spectrumSlider"
          min="0"
          max="100"
          step="0.1"
          value="48"
        />

        <!-- Spectrum Visual Map Legend -->
        <div class="flex w-full h-3 rounded-full overflow-hidden opacity-80">
          <div class="h-full bg-slate-700" style="width: 14%" title="Radio"></div>
          <div class="h-full bg-orange-900" style="width: 14%" title="Microwave"></div>
          <div class="h-full bg-red-900" style="width: 14%" title="Infrared"></div>
          <!-- Visible Rainbow Band -->
          <div class="h-full bg-gradient-to-r from-red-500 via-green-500 to-violet-500" style="width: 16%" title="Visible Light"></div>
          <div class="h-full bg-purple-900" style="width: 14%" title="Ultraviolet"></div>
          <div class="h-full bg-blue-900" style="width: 14%" title="X-Ray"></div>
          <div class="h-full bg-indigo-900" style="width: 14%" title="Gamma Ray"></div>
        </div>
        
        <div class="flex justify-between w-full text-xs text-slate-500 pt-1 px-1" id="legendContainer">
          <span class="w-[14%] text-left" data-name="Radio">Radio</span>
          <span class="w-[14%] text-center" data-name="Micro">Micro</span>
          <span class="w-[14%] text-center" data-name="IR">IR</span>
          <span class="w-[16%] text-center text-slate-300 font-semibold" data-name="Visible">Visible</span>
          <span class="w-[14%] text-center" data-name="UV">UV</span>
          <span class="w-[14%] text-center" data-name="X-Ray">X-Ray</span>
          <span class="w-[14%] text-right" data-name="Gamma">Gamma</span>
        </div>
      </div>

      <!-- Info Cards -->
      <div id="infoCards" class="grid md:grid-cols-3 gap-4 pt-4 border-t border-slate-800">
        <div class="bg-slate-950 rounded-2xl p-5 border border-slate-800/50 flex flex-col justify-center">
          <div class="text-slate-500 text-sm font-semibold uppercase tracking-wider mb-1">Frequency</div>
          <div id="freqText" class="text-2xl font-mono text-slate-200">...</div>
        </div>
        <div class="bg-slate-950 rounded-2xl p-5 border border-slate-800/50 flex flex-col justify-center">
          <div class="text-slate-500 text-sm font-semibold uppercase tracking-wider mb-1">Wavelength</div>
          <div id="waveText" class="text-2xl font-mono text-slate-200">...</div>
        </div>
        <div class="bg-slate-950 rounded-2xl p-5 border border-slate-800/50 flex items-start gap-3">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5 text-slate-400 shrink-0 mt-0.5"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
          <p id="descText" class="text-slate-300 text-sm leading-relaxed">...</p>
        </div>
      </div>
      
    </div>
  </div>

  <script>
    // Inline SVGs for vanilla JS usage
    const icons = {
      radio: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6"><path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9"/><path d="M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.5"/><circle cx="12" cy="12" r="2"/><path d="M16.2 7.8c2.3 2.3 2.3 6.1 0 8.5"/><path d="M19.1 4.9C23 8.8 23 15.2 19.1 19.1"/></svg>`,
      activity: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>`,
      sun: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>`,
      zap: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>`,
      zapIndigo: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6 text-indigo-200"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>`,
      minimize2: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="14" y1="10" x2="21" y2="3"/><line x1="3" y1="21" x2="10" y2="14"/></svg>`
    };

    // State Variables
    let sliderValue = 48;
    let isTestMode = false;
    let isRevealed = false;
    let currentCategory = "";

    // DOM Elements
    const slider = document.getElementById('spectrumSlider');
    const visualizerContainer = document.getElementById('visualizerContainer');
    const testModeBtn = document.getElementById('testModeBtn');
    const revealBtn = document.getElementById('revealBtn');
    const normalOverlay = document.getElementById('normalOverlay');
    
    const iconContainer = document.getElementById('iconContainer');
    const categoryText = document.getElementById('categoryText');
    const subCategoryText = document.getElementById('subCategoryText');
    const titleContainer = document.getElementById('titleContainer');
    
    const freqTextEl = document.getElementById('freqText');
    const waveTextEl = document.getElementById('waveText');
    const descTextEl = document.getElementById('descText');
    
    const legendContainer = document.getElementById('legendContainer');
    const infoCards = document.getElementById('infoCards');
    const canvas = document.getElementById('waveCanvas');
    const ctx = canvas.getContext('2d');

    // Spectrum Data Logic
    const getSpectrumData = (val) => {
      if (val < 14) {
        return { category: "Radio Waves", subCategory: null, freqText: "10³ - 10¹¹ Hz", waveText: "> 1 mm", hex: "#6b7280", glow: "rgba(107, 114, 128, 0.2)", desc: "The longest wavelengths in the spectrum. Used primarily for communications, including television, radio, and mobile phones.", icon: icons.radio };
      }
      if (val < 28) {
        return { category: "Microwaves", subCategory: null, freqText: "10¹¹ - 10¹³ Hz", waveText: "1 mm - 25 μm", hex: "#f97316", glow: "rgba(249, 115, 22, 0.2)", desc: "Higher frequency than radio. Used for radar, satellite communications, and cooking food by exciting water molecules.", icon: icons.activity };
      }
      if (val < 42) {
        return { category: "Infrared", subCategory: null, freqText: "10¹³ - 4×10¹⁴ Hz", waveText: "25 μm - 750 nm", hex: "#ef4444", glow: "rgba(239, 68, 68, 0.2)", desc: "Felt as heat. Emitted by all warm objects and used in thermal imaging, remote controls, and fiber optics.", icon: icons.sun };
      }
      if (val < 58) {
        let colorName, hexCode, glowCode;
        if (val < 45) { colorName = "Red"; hexCode = "#ff0000"; glowCode = "rgba(255, 0, 0, 0.3)"; }
        else if (val < 47) { colorName = "Orange"; hexCode = "#ff7f00"; glowCode = "rgba(255, 127, 0, 0.3)"; }
        else if (val < 49) { colorName = "Yellow"; hexCode = "#facc15"; glowCode = "rgba(250, 204, 21, 0.3)"; }
        else if (val < 52) { colorName = "Green"; hexCode = "#22c55e"; glowCode = "rgba(34, 197, 94, 0.3)"; }
        else if (val < 55) { colorName = "Blue"; hexCode = "#3b82f6"; glowCode = "rgba(59, 130, 246, 0.3)"; }
        else { colorName = "Violet"; hexCode = "#8b5cf6"; glowCode = "rgba(139, 92, 246, 0.3)"; }
        return { category: "Visible Light", subCategory: colorName, freqText: "4×10¹⁴ - 7.5×10¹⁴ Hz", waveText: "750 nm - 380 nm", hex: hexCode, glow: glowCode, desc: "The only part of the spectrum visible to the human eye. Different frequencies are perceived as different colors.", icon: icons.sun };
      }
      if (val < 72) {
        return { category: "Ultraviolet", subCategory: null, freqText: "7.5×10¹⁴ - 3×10¹⁶ Hz", waveText: "380 nm - 10 nm", hex: "#c084fc", glow: "rgba(192, 132, 252, 0.2)", desc: "Invisible rays that can cause sunburns. Used in fluorescent lights, sterilization, and detecting forged bank notes.", icon: icons.zap };
      }
      if (val < 86) {
        return { category: "X-Rays", subCategory: null, freqText: "3×10¹⁶ - 3×10¹⁹ Hz", waveText: "10 nm - 10 pm", hex: "#60a5fa", glow: "rgba(96, 165, 250, 0.2)", desc: "High energy waves that can pass through many materials. Widely used in medical imaging and security scanners.", icon: icons.minimize2 };
      }
      return { category: "Gamma Rays", subCategory: null, freqText: "> 3×10¹⁹ Hz", waveText: "< 10 pm", hex: "#e0e7ff", glow: "rgba(224, 231, 255, 0.3)", desc: "The highest energy, shortest wavelength electromagnetic waves. Emitted by radioactive atoms and nuclear explosions.", icon: icons.zapIndigo };
    };

    // Update UI Elements
    const updateUI = () => {
      const data = getSpectrumData(sliderValue);

      // Reset reveal state if category changes
      if (data.category !== currentCategory) {
        currentCategory = data.category;
        isRevealed = false;
      }

      // Update basic info
      freqTextEl.textContent = data.freqText;
      waveTextEl.textContent = data.waveText;
      descTextEl.textContent = data.desc;
      visualizerContainer.style.backgroundColor = data.glow;
      slider.style.color = data.hex; // used for thumb via CSS currentColor

      // Update normal overlay content
      iconContainer.innerHTML = data.icon;
      categoryText.textContent = data.category;
      titleContainer.style.color = data.hex;
      
      if (data.subCategory) {
        subCategoryText.textContent = `${data.subCategory} Light`;
        subCategoryText.style.color = data.hex;
        subCategoryText.style.textShadow = `0 0 20px ${data.hex}`;
        subCategoryText.classList.remove('hidden');
      } else {
        subCategoryText.classList.add('hidden');
      }

      // Handle Test Mode View States
      if (isTestMode) {
        legendContainer.style.display = 'none';
        infoCards.style.display = 'none';
        
        if (!isRevealed) {
          revealBtn.classList.remove('hidden');
          revealBtn.classList.add('flex');
          normalOverlay.classList.add('hidden');
        } else {
          revealBtn.classList.add('hidden');
          revealBtn.classList.remove('flex');
          normalOverlay.classList.remove('hidden');
        }
      } else {
        legendContainer.style.display = '';
        infoCards.style.display = '';
        
        revealBtn.classList.add('hidden');
        revealBtn.classList.remove('flex');
        normalOverlay.classList.remove('hidden');
      }

      // Update Button Style
      if (isTestMode) {
        testModeBtn.textContent = "Exit Test Mode";
        testModeBtn.className = "px-6 py-2.5 rounded-full font-bold text-sm tracking-wide transition-all duration-300 flex items-center gap-2 bg-indigo-500 text-white shadow-lg shadow-indigo-500/25";
      } else {
        testModeBtn.textContent = "Test Yourself";
        testModeBtn.className = "px-6 py-2.5 rounded-full font-bold text-sm tracking-wide transition-all duration-300 flex items-center gap-2 bg-slate-800 text-slate-300 hover:bg-slate-700 border border-slate-700";
      }
    };

    // Event Listeners
    slider.addEventListener('input', (e) => {
      sliderValue = parseFloat(e.target.value);
      updateUI();
    });

    testModeBtn.addEventListener('click', () => {
      isTestMode = !isTestMode;
      isRevealed = false; // Always reset when entering/exiting
      updateUI();
    });

    revealBtn.addEventListener('click', () => {
      isRevealed = true;
      updateUI();
    });

    // Wave Animation Engine
    let time = 0;
    const renderWave = () => {
      const data = getSpectrumData(sliderValue);
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      
      if (canvas.width !== rect.width * dpr || canvas.height !== rect.height * dpr) {
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr);
      }

      ctx.clearRect(0, 0, rect.width, rect.height);

      const baseFrequency = 0.008 * Math.exp(sliderValue * 0.04); 
      const amplitude = rect.height / 3;
      const centerY = rect.height / 2;
      const speed = 60; // Constant speed

      ctx.beginPath();
      ctx.moveTo(0, centerY);

      for (let x = 0; x <= rect.width; x++) {
        const y = Math.sin((x - time * speed) * baseFrequency) * amplitude + centerY;
        ctx.lineTo(x, y);
      }

      ctx.strokeStyle = data.hex;
      ctx.lineWidth = 4;
      ctx.lineJoin = 'round';
      
      ctx.shadowBlur = 15;
      ctx.shadowColor = data.hex;
      
      ctx.stroke();

      time += 0.02;
      requestAnimationFrame(renderWave);
    };

    // Initialize
    updateUI();
    renderWave();

  </script>
</body>
</html>
