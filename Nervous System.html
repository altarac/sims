<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nervous System Explorer</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Custom Animations to replace React animate-in classes -->
  <style>
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInBottom {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes zoomIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    .animate-slide-in-right { animation: slideInRight 0.5s ease-out forwards; }
    .animate-slide-in-bottom { animation: slideInBottom 0.3s ease-out forwards; }
    .animate-zoom-in { animation: zoomIn 0.3s ease-out forwards; }
    
    /* Ensure the image fills the space correctly */
    .anatomy-bg {
      object-fit: contain;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800 font-sans p-4 flex items-center justify-center">

  <div class="max-w-6xl w-full bg-white rounded-3xl shadow-xl overflow-hidden grid grid-cols-1 md:grid-cols-2">
    
    <!-- LEFT COLUMN: VISUALIZATION -->
    <div class="bg-slate-100 p-6 flex flex-col items-center justify-center relative border-b md:border-b-0 md:border-r border-slate-200">
      <div class="w-full max-w-sm aspect-[4/5.8] relative bg-white rounded-2xl shadow-inner border border-slate-200 p-2 overflow-hidden">
        
        <!-- SVG Container for Overlays -->
        <div id="svg-container" class="w-full h-full relative">
          <!-- The image is placed inside the SVG using an <image> tag to keep the coordinate system consistent -->
        </div>
        
        <!-- Menu Overlay -->
        <div id="menu-overlay" class="absolute inset-0 bg-white/60 backdrop-blur-[2px] flex items-center justify-center p-6 text-center z-10">
          <div>
            <i data-lucide="brain" class="w-16 h-16 text-orange-500 mx-auto mb-4"></i>
            <h2 class="text-2xl font-bold text-slate-800 mb-2">Nervous System Explorer</h2>
            <p class="text-sm text-slate-600 mb-6">Discover how signals travel through your body during different actions.</p>
            <button onclick="startRandomScenario()" class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-full font-bold transition-all shadow-md mx-auto">
              <i data-lucide="play" class="w-5 h-5 fill-current"></i>
              Start Simulation
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- RIGHT COLUMN: CONTROLS & QUIZ -->
    <div class="p-8 flex flex-col justify-between">
      <div>
        <!-- Header -->
        <div class="flex flex-col xl:flex-row justify-between items-start xl:items-center gap-4 mb-8 border-b pb-4">
          <h1 class="text-2xl font-black text-slate-800 flex items-center gap-2">
            <i data-lucide="zap" class="w-6 h-6 text-yellow-500 fill-yellow-500"></i>
            Signal Routing
          </h1>
          <div class="bg-slate-100 px-4 py-2 rounded-lg font-bold text-slate-600 flex items-center gap-4 text-sm whitespace-nowrap">
            <div>Score: <span id="score-display" class="text-blue-600">0</span></div>
            <div class="w-px h-4 bg-slate-300 hidden sm:block"></div>
            <div>Completed: <span id="total-display" class="text-blue-600">0</span> / <span id="max-scenarios">14</span> Scenarios</div>
          </div>
        </div>

        <!-- Dynamic Content Area -->
        <div id="dynamic-panel">
          <!-- Populated by JS -->
        </div>

      </div>
      <div class="mt-8 text-center text-sm text-slate-400">
        Interactive Biology Simulation
      </div>
    </div>

  </div>

  <script>
    // --- ANATOMY & COORDINATES ---
    // Coordinates accurately traced to the provided background image
    const nodes = {
      Brain: { x: 212, y: 100 },
      Face: { x: 260, y: 150 }, 
      SpineCervical: { x: 212, y: 220 },
      SpineLumbar: { x: 212, y: 400 },
      RightArm: { x: 85, y: 480 },  // Anatomical Right Arm (Image Left)
      LeftArm: { x: 335, y: 480 },  // Anatomical Left Arm (Image Right)
      RightLeg: { x: 170, y: 560 }, // Anatomical Right Leg (Image Left)
      LeftLeg: { x: 255, y: 560 },  // Anatomical Left Leg (Image Right)
    };

    // Quadratic Bezier definitions for smooth nerve paths matching the illustration
    const curves = {
      FaceToBrain: { p0: nodes.Face, p1: { x: 240, y: 120 }, p2: nodes.Brain },
      BrainToFace: { p0: nodes.Brain, p1: { x: 240, y: 120 }, p2: nodes.Face },
      
      RightArmToSpine: { p0: nodes.RightArm, p1: { x: 120, y: 260 }, p2: nodes.SpineCervical },
      SpineToRightArm: { p0: nodes.SpineCervical, p1: { x: 120, y: 260 }, p2: nodes.RightArm },
      
      LeftArmToSpine: { p0: nodes.LeftArm, p1: { x: 305, y: 260 }, p2: nodes.SpineCervical },
      SpineToLeftArm: { p0: nodes.SpineCervical, p1: { x: 305, y: 260 }, p2: nodes.LeftArm },
      
      RightLegToSpine: { p0: nodes.RightLeg, p1: { x: 185, y: 480 }, p2: nodes.SpineLumbar },
      SpineToRightLeg: { p0: nodes.SpineLumbar, p1: { x: 185, y: 480 }, p2: nodes.RightLeg },
      
      LeftLegToSpine: { p0: nodes.LeftLeg, p1: { x: 240, y: 480 }, p2: nodes.SpineLumbar },
      SpineToLeftLeg: { p0: nodes.SpineLumbar, p1: { x: 240, y: 480 }, p2: nodes.LeftLeg },
      
      SpineLumbarToCervical: { p0: nodes.SpineLumbar, p1: { x: 212, y: 310 }, p2: nodes.SpineCervical },
      SpineCervicalToLumbar: { p0: nodes.SpineCervical, p1: { x: 212, y: 310 }, p2: nodes.SpineLumbar },
      
      SpineCervicalToBrain: { p0: nodes.SpineCervical, p1: { x: 212, y: 160 }, p2: nodes.Brain },
      BrainToSpineCervical: { p0: nodes.Brain, p1: { x: 212, y: 160 }, p2: nodes.SpineCervical },
    };

    // Constant coordinate for visual stimuli (e.g. eyes/face area)
    const visualStimulus = { x: 250, y: 110 };

    // --- SCENARIOS ---
    const scenarios = [
      { id: 1, title: "Touching a Hot Stove", description: "You accidentally touch a burning hot pan with your right hand. Watch the signal travel.", type: "reflex", icon: "flame", iconColor: "text-red-500", stimulusPos: nodes.RightArm, path: [{ curve: curves.RightArmToSpine, duration: 600 }, { curve: curves.SpineToRightArm, duration: 600 }], explanation: "This is a Reflex Arc! The signal travelled only to the spinal cord and immediately back out to the muscles to pull your hand away quickly, bypassing the brain to save precious milliseconds." },
      { id: 2, title: "Feeling a Mosquito", description: "You feel a mosquito land on your left leg. You decide to swat it with your left hand.", type: "voluntary", icon: "bug", iconColor: "text-green-600", stimulusPos: nodes.LeftLeg, path: [{ curve: curves.LeftLegToSpine, duration: 600 }, { curve: curves.SpineLumbarToCervical, duration: 500 }, { curve: curves.SpineCervicalToBrain, duration: 500 }, { pause: 600 }, { curve: curves.BrainToSpineCervical, duration: 500 }, { curve: curves.SpineToLeftArm, duration: 600 }], explanation: "This is a Voluntary Act! The sensory signal had to travel all the way up the spinal cord to the brain so you could consciously perceive the bug and decide to move your arm." },
      { id: 3, title: "Stepping on a Sharp Tack", description: "You are walking barefoot and step on a sharp tack with your right foot.", type: "reflex", icon: "target", iconColor: "text-gray-700", stimulusPos: nodes.RightLeg, path: [{ curve: curves.RightLegToSpine, duration: 600 }, { curve: curves.SpineToRightLeg, duration: 600 }], explanation: "This is a Reflex Arc! The pain signal hit the lower spinal cord, which instantly fired a motor command to lift your leg before your brain even registered the pain." },
      { id: 4, title: "Catching a Ball", description: "A friend throws a ball to you. You see it and reach out your right arm to catch it.", type: "voluntary", icon: "activity", iconColor: "text-blue-500", stimulusPos: nodes.Face, path: [{ curve: curves.FaceToBrain, duration: 400 }, { pause: 400 }, { curve: curves.BrainToSpineCervical, duration: 600 }, { curve: curves.SpineToRightArm, duration: 600 }], explanation: "This is a Voluntary Act! Your brain processed the visual information (seeing the ball) and then sent a conscious command down your spine to your arm muscles." },
      { id: 5, title: "Pupil Constriction", description: "A bright light suddenly shines in your eyes, causing your pupils to immediately shrink.", type: "reflex", icon: "sun", iconColor: "text-yellow-500", stimulusPos: nodes.Face, path: [{ curve: curves.FaceToBrain, duration: 400 }, { curve: curves.BrainToFace, duration: 400 }], explanation: "This is a Reflex Arc (specifically a cranial reflex)! The optic nerve detected bright light and triggered an immediate reflex in the midbrain to constrict the pupil, protecting your retina without conscious thought." },
      { id: 6, title: "Kicking a Soccer Ball", description: "You line up a shot on goal and consciously decide to kick the ball with your right foot.", type: "voluntary", icon: "footprints", iconColor: "text-emerald-600", stimulusPos: visualStimulus, path: [{ curve: curves.BrainToSpineCervical, duration: 400 }, { curve: curves.SpineCervicalToLumbar, duration: 400 }, { curve: curves.SpineToRightLeg, duration: 600 }], explanation: "This is a Voluntary Act! Your motor cortex in the brain initiated the complex sequence of muscle movements, sending the signal all the way down the spinal cord to your leg." },
      { id: 7, title: "Knee-Jerk Test", description: "A doctor taps just below your left kneecap with a small rubber hammer.", type: "reflex", icon: "zap", iconColor: "text-indigo-500", stimulusPos: nodes.LeftLeg, path: [{ curve: curves.LeftLegToSpine, duration: 600 }, { curve: curves.SpineToLeftLeg, duration: 600 }], explanation: "This is a Reflex Arc (the patellar reflex)! The tap stretches a tendon, sending a signal to the lumbar spinal cord, which immediately fires a signal back to the thigh muscle to kick." },
      { id: 8, title: "Smelling Fresh Cookies", description: "You smell fresh cookies baking and decide to reach out with your left hand to grab one.", type: "voluntary", icon: "coffee", iconColor: "text-amber-700", stimulusPos: nodes.Face, path: [{ curve: curves.FaceToBrain, duration: 400 }, { pause: 600 }, { curve: curves.BrainToSpineCervical, duration: 500 }, { curve: curves.SpineToLeftArm, duration: 600 }], explanation: "This is a Voluntary Act! Your olfactory (smell) nerves sent signals to your brain, which processed the delicious scent and consciously decided to initiate arm movement." },
      { id: 9, title: "Dropping a Scalding Mug", description: "You pick up a mug of tea with your left hand, realize it's scalding hot, and instantly drop it.", type: "reflex", icon: "flame", iconColor: "text-orange-500", stimulusPos: nodes.LeftArm, path: [{ curve: curves.LeftArmToSpine, duration: 600 }, { curve: curves.SpineToLeftArm, duration: 600 }], explanation: "This is a Reflex Arc! To prevent severe tissue damage, the spinal cord loops the extreme pain signal directly back to your hand muscles to release the grip before the brain even feels the burn." },
      { id: 10, title: "Typing on a Keyboard", description: "You think of a funny message and use your right hand to type it out on your phone.", type: "voluntary", icon: "keyboard", iconColor: "text-slate-600", stimulusPos: visualStimulus, path: [{ curve: curves.BrainToSpineCervical, duration: 500 }, { curve: curves.SpineToRightArm, duration: 600 }], explanation: "This is a Voluntary Act! Composing a message and moving your fingers to the correct keys requires high-level conscious processing and precise motor control from the brain." },
      { id: 11, title: "Blinking at a Gnat", description: "A small bug flies right at your face, and your eyelids instantly snap shut.", type: "reflex", icon: "eye", iconColor: "text-blue-400", stimulusPos: nodes.Face, path: [{ curve: curves.FaceToBrain, duration: 300 }, { curve: curves.BrainToFace, duration: 300 }], explanation: "This is a Reflex Arc! The blink reflex is a rapid, involuntary response processed in the brain stem to protect the eye from potential hazards." },
      { id: 12, title: "Raising Your Hand", description: "You know the answer to the teacher's question and enthusiastically raise your right arm.", type: "voluntary", icon: "hand", iconColor: "text-yellow-600", stimulusPos: visualStimulus, path: [{ curve: curves.BrainToSpineCervical, duration: 500 }, { curve: curves.SpineToRightArm, duration: 600 }], explanation: "This is a Voluntary Act! You consciously recalled the information, made a decision to answer, and commanded your arm muscles to raise." },
      { id: 13, title: "Stepping in Ice Water", description: "You accidentally step into a freezing puddle with your left foot and yank it back instantly.", type: "reflex", icon: "target", iconColor: "text-cyan-500", stimulusPos: nodes.LeftLeg, path: [{ curve: curves.LeftLegToSpine, duration: 600 }, { curve: curves.SpineToLeftLeg, duration: 600 }], explanation: "This is a Reflex Arc! Extreme temperature, much like pain, triggers a withdrawal reflex in the spinal cord to quickly remove the body part from the damaging stimulus." },
      { id: 14, title: "Tapping to the Beat", description: "You hear your favorite song playing and decide to start tapping your left foot to the rhythm.", type: "voluntary", icon: "music", iconColor: "text-purple-500", stimulusPos: nodes.Face, path: [{ curve: curves.FaceToBrain, duration: 400 }, { pause: 400 }, { curve: curves.BrainToSpineCervical, duration: 400 }, { curve: curves.SpineCervicalToLumbar, duration: 400 }, { curve: curves.SpineToLeftLeg, duration: 600 }], explanation: "This is a Voluntary Act! Auditory signals went to your brain, which processed the music and sent conscious rhythmic commands all the way down to your foot." }
    ];

    document.getElementById('max-scenarios').innerText = scenarios.length;

    // --- STATE ---
    let appState = 'menu'; 
    let currentScenario = null;
    let score = 0;
    let totalQuizzes = 0;
    let cancelAnim = false;
    let lastAnswerCorrect = null;

    // --- UTILS ---
    const getQuadraticBezierPoint = (t, p0, p1, p2) => {
      const x = Math.pow(1 - t, 2) * p0.x + 2 * (1 - t) * t * p1.x + Math.pow(t, 2) * p2.x;
      const y = Math.pow(1 - t, 2) * p0.y + 2 * (1 - t) * t * p1.y + Math.pow(t, 2) * p2.y;
      return { x, y };
    };

    // --- RENDER SVG ---
    function initSVG() {
      const imageUrl = "https://lh3.googleusercontent.com/u/0/d/1eDGxLc6kOchU6Xdof4lAAa0V2aejxpks";
      
      const svgHTML = `
        <svg viewBox="0 0 400 580" class="w-full h-full drop-shadow-sm overflow-visible">
          <defs>
            <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
              <feGaussianBlur stdDeviation="4" result="blur" />
              <feComposite in="SourceGraphic" in2="blur" operator="over" />
            </filter>
          </defs>

          <!-- The Base Anatomical Image -->
          <image href="${imageUrl}" x="0" y="0" width="400" height="580" preserveAspectRatio="xMidYMid meet" 
            onerror="this.setAttribute('href', 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 400 580%22%3E%3Crect width=%22100%25%22 height=%22100%25%22 fill=%22%23f1f5f9%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-family=%22sans-serif%22 font-size=%2214%22 fill=%22%2394a3b8%22%3EImage failed to load%3C/text%3E%3C/svg%3E')" />

          <!-- Stimulus Icon Overlay -->
          <g id="stimulus-ping" style="display: none;">
            <circle cx="16" cy="16" r="20" fill="#06b6d4" opacity="0.4" class="animate-ping" />
            <circle cx="16" cy="16" r="8" fill="#06b6d4" opacity="0.8" />
          </g>

          <!-- The Animated Signal Dot -->
          <circle id="signal-dot" cx="-100" cy="-100" r="7" fill="#06b6d4" filter="url(#glow)" style="display: none;" />

          <!-- Brain Processing Indication -->
          <circle id="brain-thinking" cx="${nodes.Brain.x}" cy="${nodes.Brain.y}" r="30" fill="#06b6d4" opacity="0.4" class="animate-ping" style="display: none;" />
        </svg>
      `;
      document.getElementById('svg-container').innerHTML = svgHTML;
    }

    // --- DOM UPDATES ---
    function renderUI() {
      const panel = document.getElementById('dynamic-panel');
      const menuOverlay = document.getElementById('menu-overlay');

      document.getElementById('score-display').innerText = score;
      document.getElementById('total-display').innerText = totalQuizzes;

      if (appState === 'menu') {
        menuOverlay.style.display = 'flex';
        panel.innerHTML = `
          <div class="space-y-6">
            <p class="text-lg text-slate-600 leading-relaxed">
              The nervous system is divided into two main parts:
            </p>
            <ul class="space-y-4">
              <li class="flex gap-3 items-start">
                <div class="w-4 h-4 rounded mt-1 shrink-0 bg-[#f97316]"></div>
                <div>
                  <strong class="block text-slate-800">Central Nervous System (CNS)</strong>
                  <span class="text-slate-600 text-sm">The brain and spinal cord. It processes information and makes decisions.</span>
                </div>
              </li>
              <li class="flex gap-3 items-start">
                <div class="w-4 h-4 rounded mt-1 shrink-0 bg-[#eab308]"></div>
                <div>
                  <strong class="block text-slate-800">Peripheral Nervous System (PNS)</strong>
                  <span class="text-slate-600 text-sm">Nerves extending throughout your body. They send sensory data to the CNS and carry motor commands.</span>
                </div>
              </li>
            </ul>
          </div>
        `;
      } else {
        menuOverlay.style.display = 'none';
        
        let headerHtml = `
          <div class="animate-slide-in-right">
            <div class="flex items-center gap-4 mb-4">
              <div class="p-3 bg-slate-100 rounded-xl">
                <i data-lucide="${currentScenario.icon}" class="w-8 h-8 ${currentScenario.iconColor}"></i>
              </div>
              <div>
                <h2 class="text-xl font-bold text-slate-800">${currentScenario.title}</h2>
                <span class="text-xs font-semibold uppercase tracking-wider text-slate-400">Scenario ${currentScenario.id}</span>
              </div>
            </div>
            <p class="text-slate-600 mb-8 p-4 bg-slate-50 border border-slate-100 rounded-xl leading-relaxed">
              ${currentScenario.description}
            </p>
        `;

        let contentHtml = '';

        if (appState === 'simulating') {
          contentHtml = `
            <div class="text-center p-8 bg-blue-50 text-blue-800 rounded-2xl border border-blue-100 font-medium animate-pulse">
              <i data-lucide="activity" class="w-8 h-8 mx-auto mb-2 opacity-50"></i>
              Watch the signal path on the diagram...
            </div>
          `;
        } else if (appState === 'quiz') {
          contentHtml = `
            <div class="space-y-4 animate-slide-in-bottom">
              <div class="flex justify-between items-center mb-6">
                <h3 class="text-lg font-bold text-slate-800">What type of action was this?</h3>
                <button onclick="replayAnimation()" class="flex items-center gap-1.5 text-sm font-bold text-slate-500 hover:text-blue-600 transition-colors">
                  <i data-lucide="rotate-ccw" class="w-4 h-4"></i> Replay Animation
                </button>
              </div>
              <div class="grid grid-cols-2 gap-4">
                <button onclick="handleAnswer('reflex')" class="group flex flex-col items-center gap-2 p-6 bg-white border-2 border-slate-200 hover:border-yellow-500 hover:bg-yellow-50 rounded-2xl transition-all">
                  <i data-lucide="zap" class="w-10 h-10 text-slate-400 group-hover:text-yellow-500 transition-colors"></i>
                  <span class="font-bold text-slate-700 group-hover:text-yellow-700">Reflex Arc</span>
                </button>
                <button onclick="handleAnswer('voluntary')" class="group flex flex-col items-center gap-2 p-6 bg-white border-2 border-slate-200 hover:border-orange-500 hover:bg-orange-50 rounded-2xl transition-all">
                  <i data-lucide="brain" class="w-10 h-10 text-slate-400 group-hover:text-orange-500 transition-colors"></i>
                  <span class="font-bold text-slate-700 group-hover:text-orange-700">Voluntary Act</span>
                </button>
              </div>
            </div>
          `;
        } else if (appState === 'feedback') {
          const isCorrect = lastAnswerCorrect;
          const bgClass = isCorrect ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200';
          const textClass = isCorrect ? 'text-green-800' : 'text-red-800';
          const pClass = isCorrect ? 'text-green-700' : 'text-red-700';
          const btnClass = isCorrect ? 'text-green-600 hover:text-green-800' : 'text-red-600 hover:text-red-800';
          const iconStr = isCorrect ? `<i data-lucide="check-circle-2" class="w-8 h-8 text-green-600"></i>` : `<i data-lucide="x-circle" class="w-8 h-8 text-red-600"></i>`;
          const headingTxt = isCorrect ? 'Correct!' : 'Not quite!';

          contentHtml = `
            <div class="animate-zoom-in">
              <div class="p-6 rounded-2xl border-2 mb-6 ${bgClass}">
                <div class="flex justify-between items-start mb-3">
                  <div class="flex items-center gap-3">
                    ${iconStr}
                    <h3 class="text-xl font-bold ${textClass}">${headingTxt}</h3>
                  </div>
                  <button onclick="replayAnimation()" class="flex items-center gap-1.5 text-sm font-bold transition-colors ${btnClass}">
                    <i data-lucide="rotate-ccw" class="w-4 h-4"></i> Replay Path
                  </button>
                </div>
                <p class="leading-relaxed ${pClass}">${currentScenario.explanation}</p>
              </div>
              <button onclick="startRandomScenario()" class="w-full flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-900 text-white p-4 rounded-xl font-bold transition-all">
                Next Scenario <i data-lucide="arrow-right" class="w-5 h-5"></i>
              </button>
            </div>
          `;
        }

        panel.innerHTML = headerHtml + contentHtml + `</div>`;
      }
      
      lucide.createIcons();
    }

    function updateVisuals(isDotVisible, isThinking) {
      const dot = document.getElementById('signal-dot');
      const thinking = document.getElementById('brain-thinking');
      const ping = document.getElementById('stimulus-ping');

      if(dot) dot.style.display = isDotVisible ? 'block' : 'none';
      if(thinking) thinking.style.display = isThinking ? 'block' : 'none';
      
      if(ping) {
        if(appState === 'simulating' && currentScenario && currentScenario.stimulusPos && !isDotVisible && !isThinking) {
           ping.style.display = 'block';
           ping.setAttribute('transform', `translate(${currentScenario.stimulusPos.x - 16}, ${currentScenario.stimulusPos.y - 16})`);
        } else {
           ping.style.display = 'none';
        }
      }
    }

    // --- ANIMATION LOGIC ---
    const animateSegment = (curve, duration) => {
      return new Promise((resolve) => {
        let startTime = null;
        const dot = document.getElementById('signal-dot');
        const step = (timestamp) => {
          if (cancelAnim) return resolve();
          if (!startTime) startTime = timestamp;
          const progress = Math.min((timestamp - startTime) / duration, 1);
          
          const currentPos = getQuadraticBezierPoint(progress, curve.p0, curve.p1, curve.p2);
          if(dot) {
            dot.setAttribute('cx', currentPos.x);
            dot.setAttribute('cy', currentPos.y);
          }

          if (progress < 1) {
            requestAnimationFrame(step);
          } else {
            resolve();
          }
        };
        requestAnimationFrame(step);
      });
    };

    const runAnimation = async (scenario, finalState) => {
      cancelAnim = true;
      await new Promise(r => setTimeout(r, 50)); 
      cancelAnim = false;

      appState = 'simulating';
      renderUI();
      updateVisuals(false, false);

      await new Promise(r => setTimeout(r, 600));
      if (cancelAnim) return;

      updateVisuals(true, false);

      for (let i = 0; i < scenario.path.length; i++) {
        const step = scenario.path[i];
        if (step.pause) {
          updateVisuals(false, true);
          await new Promise(r => setTimeout(r, step.pause));
          updateVisuals(true, false);
        } else {
          await animateSegment(step.curve, step.duration);
        }
        if (cancelAnim) return;
      }

      appState = finalState;
      updateVisuals(false, false);
      renderUI();
    };

    // --- INTERACTIONS ---
    function startRandomScenario() {
      let nextScenario;
      do {
        nextScenario = scenarios[Math.floor(Math.random() * scenarios.length)];
      } while (currentScenario && nextScenario.id === currentScenario.id && scenarios.length > 1);
      
      currentScenario = nextScenario;
      lastAnswerCorrect = null;
      runAnimation(nextScenario, 'quiz');
    }

    function replayAnimation() {
      runAnimation(currentScenario, appState);
    }

    function handleAnswer(answerType) {
      const isCorrect = answerType === currentScenario.type;
      lastAnswerCorrect = isCorrect;
      if (isCorrect) score += 1;
      totalQuizzes += 1;
      appState = 'feedback';
      renderUI();
    }

    // --- INITIALIZATION ---
    window.onload = () => {
      initSVG();
      renderUI();
    };

  </script>
</body>
</html>
