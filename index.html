<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Interactive Simulations</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#10b981',
                        dark: '#0f172a',
                        card: '#1e293b'
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom scrollbar for a polished look */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a; 
        }
        ::-webkit-scrollbar-thumb {
            background: #334155; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569; 
        }
        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body class="bg-dark text-slate-300 min-h-screen font-sans selection:bg-primary selection:text-white flex flex-col">

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 bg-dark/80 backdrop-blur-md border-b border-slate-800 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-3">
                    <i data-lucide="atom" class="text-primary h-8 w-8"></i>
                    <span class="font-bold text-xl text-white tracking-tight">OmniLabs</span>
                </div>
                <div class="flex items-center gap-4">
                    <a href="https://github.com/yourusername" target="_blank" class="text-slate-400 hover:text-white transition flex items-center gap-2">
                        <i data-lucide="github" class="h-5 w-5"></i>
                        <span class="hidden sm:inline">GitHub</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 w-full">
        
        <!-- Header Section -->
        <div class="text-center mb-16">
            <h1 class="text-4xl md:text-5xl font-extrabold text-white mb-4 tracking-tight">
                Interactive <span class="text-transparent bg-clip-text bg-gradient-to-r from-primary to-secondary">Simulations</span>
            </h1>
            <p class="text-lg text-slate-400 max-w-2xl mx-auto">
                A collection of physics engines, cellular automata, mathematical visualizations, and interactive experiments built with web technologies.
            </p>
        </div>

        <!-- Search and Filter Bar -->
        <div class="relative max-w-xl mx-auto mb-12 text-slate-400 focus-within:text-white">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <i data-lucide="search" class="h-5 w-5"></i>
            </div>
            <input 
                type="text" 
                id="searchInput" 
                class="block w-full pl-11 pr-4 py-3 bg-card border border-slate-700 rounded-xl leading-5 bg-opacity-50 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary focus:bg-opacity-100 transition duration-150 sm:text-sm" 
                placeholder="Search simulations by name or keyword..."
            >
        </div>

        <!-- Simulations Grid -->
        <div id="simulationsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Cards will be injected here by Javascript -->
        </div>

        <!-- Empty State (Hidden by default) -->
        <div id="emptyState" class="hidden text-center py-20">
            <i data-lucide="ghost" class="h-16 w-16 text-slate-600 mx-auto mb-4"></i>
            <h3 class="text-xl font-medium text-slate-300">No simulations found</h3>
            <p class="text-slate-500 mt-2">Try adjusting your search terms.</p>
        </div>

    </main>

    <!-- Footer -->
    <footer class="border-t border-slate-800 bg-dark py-8 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col sm:flex-row justify-between items-center gap-4 text-sm text-slate-500">
            <p>&copy; <span id="year"></span> Your Name. All rights reserved.</p>
            <p>Hosted on <a href="https://pages.github.com/" class="text-primary hover:underline">GitHub Pages</a></p>
        </div>
    </footer>

    <!-- Application Logic -->
    <script>
        // Set current year in footer
        document.getElementById('year').textContent = new Date().getFullYear();

        // Initialize Lucide icons
        lucide.createIcons();

        // Helper function to assign icons based on keywords in the title
        function getIconForTitle(title) {
            const t = title.toLowerCase();
            if (t.includes('blood') || t.includes('heart')) return 'heart';
            if (t.includes('cell') || t.includes('evolution') || t.includes('dna')) return 'dna';
            if (t.includes('plant') || t.includes('tropism') || t.includes('photosynthesis')) return 'leaf';
            if (t.includes('acid') || t.includes('base') || t.includes('chem') || t.includes('solution') || t.includes('dilution') || t.includes('concentration')) return 'flask-conical';
            if (t.includes('atom') || t.includes('bohn') || t.includes('dalton') || t.includes('matter')) return 'atom';
            if (t.includes('gravity') || t.includes('force') || t.includes('mass') || t.includes('weight') || t.includes('pressure')) return 'scale';
            if (t.includes('magnet')) return 'magnet';
            if (t.includes('wave') || t.includes('spectrum') || t.includes('current')) return 'activity';
            if (t.includes('lens') || t.includes('reflection') || t.includes('drawing') || t.includes('isometric')) return 'eye';
            if (t.includes('moon') || t.includes('season')) return 'moon';
            if (t.includes('water') || t.includes('fluid') || t.includes('solubility') || t.includes('density') || t.includes('watershed')) return 'droplet';
            if (t.includes('convection') || t.includes('thermal') || t.includes('burn')) return 'flame';
            if (t.includes('orogenesis')) return 'mountain';
            if (t.includes('ohm')) return 'zap';
            return 'microscope'; // Default
        }

        // Helper function to generate tags automatically
        function getTagsForTitle(title) {
            const tags = [];
            const t = title.toLowerCase();
            if (t.includes('lab')) tags.push('lab');
            if (t.includes('chem') || t.includes('acid') || t.includes('base') || t.includes('equation') || t.includes('dilution') || t.includes('solubility') || t.includes('bohn') || t.includes('dalton') || t.includes('reaction') || t.includes('iron') || t.includes('matter')) tags.push('chemistry');
            if (t.includes('force') || t.includes('gravity') || t.includes('mass') || t.includes('wave') || t.includes('pressure') || t.includes('magnet') || t.includes('ohm') || t.includes('lens') || t.includes('reflection') || t.includes('spectrum') || t.includes('thermal')) tags.push('physics');
            if (t.includes('blood') || t.includes('cell') || t.includes('plant') || t.includes('system') || t.includes('evolution') || t.includes('lung') || t.includes('nutrition') || t.includes('dichotomous') || t.includes('tropism') || t.includes('photosynthesis')) tags.push('biology');
            if (t.includes('water') || t.includes('weather') || t.includes('season') || t.includes('moon') || t.includes('convection') || t.includes('orogenesis') || t.includes('watershed')) tags.push('earth-science');
            if (tags.length === 0) tags.push('interactive');
            return tags;
        }

        // --- SIMULATIONS DATA ---
        // Pre-loaded list of all 46 simulations currently in your repository (Acts as an immediate fallback)
        const initialFiles = [
            "Acid-Base Identification Labs.html", "Balancing Chemical Equations.html", "Blood Compatibility.html",
            "Blood Typing Lab.html", "Bohn-Rutherford Builder.html", "Burning Iron Wool.html", "Cell Division.html",
            "Chemical Reaction Indicators.html", "Concentrations.html", "Convection Currents.html", "Dalton's Model.html",
            "Density Column.html", "Density Lab.html", "Dichotomous Key.html", "Diffusion in the Lungs.html",
            "Dilution.html", "EM Spectrum.html", "Evolution.html", "Fluids.html", "Forces (Tug of War).html",
            "Gravity (Force Arrows).html", "Gravity.html", "Growing Plants Lab.html", "Isometric projections.html",
            "Lenses.html", "Macronutrient Lab.html", "Magnetism.html", "Mass of Air.html", "Mass vs Weight.html",
            "Nervous System.html", "Nutrition Labels.html", "Ohm's Law Lab.html", "Orogenesis.html",
            "Phases of the Moon.html", "Photosynthesis.html", "Pressure.html", "Reflection.html", "Seasons.html",
            "Separation Techniques Lab.html", "Solubility.html", "States of Matter.html", "Technical Drawings.html",
            "Thermal Expansion.html", "Tropisms.html", "Watersheds.html", "Waves.html"
        ];

        let simulations = initialFiles.map(filename => {
            const title = filename.replace('.html', '');
            return {
                title: title,
                description: `Interactive module exploring concepts related to ${title}.`,
                link: filename,
                icon: getIconForTitle(title),
                tags: getTagsForTitle(title)
            };
        });

        const grid = document.getElementById('simulationsGrid');
        const searchInput = document.getElementById('searchInput');
        const emptyState = document.getElementById('emptyState');

        // Render the simulation cards
        function renderSimulations(data) {
            grid.innerHTML = ''; // Clear current grid

            if (data.length === 0) {
                grid.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }

            grid.classList.remove('hidden');
            emptyState.classList.add('hidden');

            data.forEach(sim => {
                const card = document.createElement('a');
                card.href = sim.link;
                card.className = "card-hover block bg-card border border-slate-700/50 rounded-2xl p-6 group cursor-pointer relative overflow-hidden";
                
                // Card Content HTML
                card.innerHTML = `
                    <div class="absolute top-0 left-0 w-1 bg-gradient-to-b from-primary to-secondary h-full opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    
                    <div class="flex items-start justify-between mb-4">
                        <div class="p-3 bg-dark rounded-xl text-primary border border-slate-700/50">
                            <i data-lucide="${sim.icon}" class="h-6 w-6"></i>
                        </div>
                        <i data-lucide="arrow-up-right" class="h-5 w-5 text-slate-500 group-hover:text-white transition-colors"></i>
                    </div>
                    
                    <h2 class="text-xl font-bold text-white mb-2 group-hover:text-primary transition-colors">${sim.title}</h2>
                    <p class="text-sm text-slate-400 mb-4 line-clamp-3">${sim.description}</p>
                    
                    <div class="flex flex-wrap gap-2 mt-auto pt-4 border-t border-slate-700/50">
                        ${sim.tags.slice(0, 3).map(tag => `<span class="text-xs font-medium text-slate-500 bg-dark px-2 py-1 rounded-md border border-slate-700/30">${tag}</span>`).join('')}
                    </div>
                `;
                grid.appendChild(card);
            });

            // Re-initialize icons for newly added DOM elements
            lucide.createIcons();
        }

        // Initial render using the pre-loaded initialFiles
        renderSimulations(simulations);

        // Search Functionality
        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            
            const filteredSimulations = simulations.filter(sim => {
                const titleMatch = sim.title.toLowerCase().includes(searchTerm);
                const descMatch = sim.description.toLowerCase().includes(searchTerm);
                const tagMatch = sim.tags.some(tag => tag.toLowerCase().includes(searchTerm));
                
                return titleMatch || descMatch || tagMatch;
            });

            renderSimulations(filteredSimulations);
        });

        // DYNAMIC FETCH LOGIC: Automatically update list if new files are added to GitHub repo
        async function updateSimulationsFromGitHub() {
            // Default repo based on context, but will adapt if hosted on github.io
            let owner = 'altarac';
            let repo = 'sims';
            
            if (window.location.hostname.includes('github.io')) {
                owner = window.location.hostname.split('.')[0];
                const pathname = window.location.pathname.split('/');
                if (pathname.length > 1 && pathname[1]) {
                    repo = pathname[1];
                }
            }

            try {
                // Fetch repository contents via GitHub API
                const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/`);
                if (!response.ok) return; // Fail silently if API limit reached or repo not found
                
                const data = await response.json();
                const fetchedSims = data
                    .filter(item => item.name.endsWith('.html') && item.name !== 'index.html')
                    .map(item => {
                        const title = item.name.replace('.html', '');
                        return {
                            title: title,
                            description: `Interactive module exploring concepts related to ${title}.`,
                            link: item.name,
                            icon: getIconForTitle(title),
                            tags: getTagsForTitle(title)
                        };
                    });
                
                if (fetchedSims.length > 0) {
                    simulations = fetchedSims; // Update with the most recent live data from GitHub
                    // Re-apply current search filter to update the grid
                    searchInput.dispatchEvent(new Event('input'));
                }
            } catch (err) {
                console.log("Could not fetch new sims dynamically. Using cached list.");
            }
        }

        // Fetch updates in the background on load
        updateSimulationsFromGitHub();

    </script>
</body>
</html>
