<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniLabs | Interactive Science Simulations</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#10b981',
                        background: '#f8fafc',
                        card: '#ffffff'
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .modal-animate { transition: all 0.3s ease-out; }
        
        .skeleton {
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
        }
        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="bg-background text-slate-700 min-h-screen font-sans flex flex-col relative">

    <!-- Navigation -->
    <nav class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-slate-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-3">
                    <div class="bg-primary p-1.5 rounded-lg shadow-sm">
                        <i data-lucide="atom" class="text-white h-6 w-6"></i>
                    </div>
                    <span class="font-bold text-xl text-slate-900 tracking-tight">OmniLabs</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 w-full">
        
        <!-- Search Bar -->
        <div class="relative max-w-xl mx-auto mb-10 text-slate-500 focus-within:text-slate-900">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <i data-lucide="search" class="h-5 w-5"></i>
            </div>
            <input 
                type="text" 
                id="searchInput" 
                class="block w-full pl-11 pr-4 py-3.5 bg-white border border-slate-300 rounded-2xl leading-5 text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition shadow-sm" 
                placeholder="Search simulations..."
            >
        </div>

        <!-- Grid -->
        <div id="simulationsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="skeleton h-48 rounded-2xl"></div>
            <div class="skeleton h-48 rounded-2xl"></div>
            <div class="skeleton h-48 rounded-2xl"></div>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-20">
            <i data-lucide="search-x" class="h-16 w-16 text-slate-300 mx-auto mb-4"></i>
            <h3 class="text-xl font-medium text-slate-800">No matches found</h3>
            <p class="text-slate-500 mt-2">Try a different keyword.</p>
        </div>

    </main>

    <!-- Footer -->
    <footer class="border-t border-slate-200 bg-white py-8 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col sm:flex-row justify-between items-center gap-4 text-sm text-slate-400">
            <p>&copy; <span id="year"></span> OmniLabs. All rights reserved.</p>
        </div>
    </footer>

    <!-- Logic -->
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        // 1. FALLBACK DATA
        const initialFiles = [
            "Acid-Base Identification Labs.html", "Balancing Chemical Equations.html", "Blood Compatibility.html",
            "Blood Typing Lab.html", "Bohn-Rutherford Builder.html", "Burning Iron Wool.html", "Cell Division.html",
            "Chemical Reaction Indicators.html", "Concentrations.html", "Convection Currents.html", "Dalton's Model.html",
            "Density Column.html", "Density Lab.html", "Dichotomous Key.html", "Diffusion in the Lungs.html",
            "Dilution.html", "EM Spectrum.html", "Evolution.html", "Fluids.html", "Forces (Tug of War).html",
            "Gravity (Force Arrows).html", "Gravity.html", "Growing Plants Lab.html", "Isometric projections.html",
            "Lenses.html", "Macronutrient Lab.html", "Magnetism.html", "Mass of Air.html", "Mass vs Weight.html",
            "Nervous System.html", "Nutrition Labels.html", "Ohm's Law Lab.html", "Orogenesis.html",
            "Phases of the Moon.html", "Photosynthesis.html", "Pressure.html", "Reflection.html", "Seasons.html",
            "Separation Techniques Lab.html", "Solubility.html", "States of Matter.html", "Technical Drawings.html",
            "Thermal Expansion.html", "Tropisms.html", "Watersheds.html", "Waves.html"
        ];
        
        let allSimulations = initialFiles.map((name, index) => ({
            id: index,
            title: name.replace('.html', ''),
            link: name
        }));

        // 2. METADATA HELPERS
        const getIcon = (t) => {
            t = t.toLowerCase();
            if (t.includes('blood') || t.includes('heart')) return 'heart';
            if (t.includes('cell') || t.includes('evolution') || t.includes('dna')) return 'dna';
            if (t.includes('plant') || t.includes('photosynthesis')) return 'leaf';
            if (t.includes('acid') || t.includes('chem') || t.includes('solution')) return 'flask-conical';
            if (t.includes('atom') || t.includes('matter')) return 'atom';
            if (t.includes('force') || t.includes('gravity') || t.includes('pressure')) return 'scale';
            if (t.includes('wave') || t.includes('spectrum')) return 'activity';
            if (t.includes('water') || t.includes('fluid') || t.includes('solubility')) return 'droplet';
            return 'microscope';
        };

        const getTags = (t) => {
            t = t.toLowerCase();
            const tags = [];
            if (t.includes('chem') || t.includes('acid') || t.includes('matter')) tags.push('Chemistry');
            if (t.includes('force') || t.includes('gravity') || t.includes('wave')) tags.push('Physics');
            if (t.includes('blood') || t.includes('cell') || t.includes('plant')) tags.push('Biology');
            if (tags.length === 0) tags.push('Simulation');
            return tags;
        };

        // 3. CORE RENDERING
        const render = (data) => {
            const grid = document.getElementById('simulationsGrid');
            const empty = document.getElementById('emptyState');
            grid.innerHTML = '';
            
            if (data.length === 0) {
                grid.classList.add('hidden');
                empty.classList.remove('hidden');
                return;
            }

            grid.classList.remove('hidden');
            empty.classList.add('hidden');

            data.forEach((sim) => {
                const card = document.createElement('a');
                card.href = sim.link;
                
                card.className = `block bg-white border border-slate-200 rounded-2xl p-6 group relative overflow-hidden transition-all shadow-sm card-hover cursor-pointer hover:shadow-md`;

                card.innerHTML = `
                    <div class="flex items-start justify-between mb-4">
                        <div class="p-3 bg-blue-50 text-primary rounded-xl border border-slate-100">
                            <i data-lucide="${getIcon(sim.title)}" class="h-6 w-6"></i>
                        </div>
                        <i data-lucide="arrow-up-right" class="h-5 w-5 text-slate-300 group-hover:text-primary transition-colors"></i>
                    </div>
                    <h2 class="text-lg font-bold text-slate-800 mb-1 group-hover:text-primary transition-colors">${sim.title}</h2>
                    <div class="flex flex-wrap gap-2 mt-3">
                        ${getTags(sim.title).map(tag => `<span class="text-[10px] uppercase tracking-wider font-bold text-slate-400 bg-slate-50 px-2 py-0.5 rounded border border-slate-100">${tag}</span>`).join('')}
                    </div>
                `;
                grid.appendChild(card);
            });
            lucide.createIcons();
        };

        const filterSims = () => {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allSimulations.filter(s => s.title.toLowerCase().includes(query));
            render(filtered);
        };

        document.getElementById('searchInput').oninput = filterSims;

        // 4. GITHUB DATA FETCH
        const fetchSims = async () => {
            try {
                const res = await fetch(`https://api.github.com/repos/altarac/sims/contents/`);
                if (!res.ok) throw new Error();
                const items = await res.json();
                allSimulations = items
                    .filter(i => i.name.endsWith('.html') && i.name !== 'index.html')
                    .map((i, index) => ({
                        id: index,
                        title: i.name.replace('.html', ''),
                        link: i.name
                    }));
                filterSims();
            } catch (e) { 
                filterSims(); 
            }
        };

        fetchSims();
        lucide.createIcons();
    </script>
</body>
</html>
