        // --- HELPER FUNCTIONS ---
        function getLeaves(node) {
          if (node.isLeaf) return [node];
          return [...getLeaves(node.yes), ...getLeaves(node.no)];
        }

        function buildLayout(node, depth = 0, state = { y: 40 }, nodes = [], edges = []) {
          const x = depth * 240 + 20;
          const currentNode = { ...node, x };

          if (node.isLeaf) {
            currentNode.y = state.y;
            state.y += 80; // Vertical spacing between leaves
            nodes.push(currentNode);
            return { node: currentNode, nodes, edges };
          }

          const yesLayout = buildLayout(node.yes, depth + 1, state, nodes, edges);
          const noLayout = buildLayout(node.no, depth + 1, state, nodes, edges);

          currentNode.y = (yesLayout.node.y + noLayout.node.y) / 2;
          nodes.push(currentNode);

          edges.push({ source: currentNode, target: yesLayout.node, label: 'Yes' });
          edges.push({ source: currentNode, target: noLayout.node, label: 'No' });

          return { node: currentNode, nodes, edges };
        }

              case 'bee': return (
                <svg viewBox="0 0 200 200" className="w-full h-full drop-shadow-md">

          if (!bug) return null;

          return (
            <div className="flex flex-col items-center w-full">

        // --- MAIN COMPONENT ---
        const DichotomousKeyApp = () => {
          const [targetBug, setTargetBug] = useState(null);
          const [currentNode, setCurrentNode] = useState(treeData);
          const [path, setPath] = useState([treeData.id]);
          const [status, setStatus] = useState('playing'); // 'playing', 'won', 'lost'
          
          const scrollContainerRef = useRef(null);

          // Generate graph layout coordinates once
          const { nodes, edges } = useMemo(() => {
            const n = [];
            const e = [];
            buildLayout(treeData, 0, { y: 60 }, n, e);
            return { nodes: n, edges: e };
          }, []);

          // Initialize Game
          const initGame = () => {
            const randomBug = allBugs[Math.floor(Math.random() * allBugs.length)];
            setTargetBug(randomBug);
            setCurrentNode(treeData);
            setPath([treeData.id]);
            setStatus('playing');
          };

          useEffect(() => {
            initGame();
          }, []);

          // Auto-scroll logic to follow the path dynamically
          useEffect(() => {
            if (scrollContainerRef.current && currentNode) {
              const activeLayoutNode = nodes.find(n => n.id === currentNode.id);
              if (activeLayoutNode) {
                scrollContainerRef.current.scrollTo({
                  left: Math.max(0, activeLayoutNode.x - 50),
                  top: Math.max(0, activeLayoutNode.y - scrollContainerRef.current.clientHeight / 2),
                  behavior: 'smooth'
                });
              }
            }
          }, [currentNode, nodes]);

          const handleAnswer = (isYes) => {
            const nextNode = isYes ? currentNode.yes : currentNode.no;
            const newPath = [...path, nextNode.id];
            
            setPath(newPath);
            setCurrentNode(nextNode);

            if (nextNode.isLeaf) {
              if (nextNode.id === targetBug.id) {
                setStatus('won');
              } else {
                setStatus('lost');
              }
            }
          };

          const handleGoBack = () => {
            if (path.length <= 1) return;
            
            // Remove the last answer from the path
            const newPath = path.slice(0, -1);
            setPath(newPath);
            
            // Re-traverse the tree to find the correct previous node
            let curr = treeData;
            for (let i = 1; i < newPath.length; i++) {
              if (curr.yes && curr.yes.id === newPath[i]) curr = curr.yes;
              else if (curr.no && curr.no.id === newPath[i]) curr = curr.no;
            }
            
            setCurrentNode(curr);
            setStatus('playing');
          };

          if (!targetBug) return <div className="p-8 text-center">Loading Field Guide...</div>;

          return (
            <div className="flex flex-col md:flex-row h-screen bg-slate-100 font-sans text-slate-800 overflow-hidden">
              
              {/* LEFT PANEL: The Interaction & Question Area */}
              <div className="w-full md:w-1/3 lg:w-1/4 bg-white shadow-xl z-10 flex flex-col border-r border-slate-200">
                <div className="p-6 bg-indigo-600 text-white text-center shrink-0">
                  <h1 className="text-2xl font-bold tracking-tight">Bug Identifier</h1>
                  <p className="text-indigo-200 text-sm mt-1">Dichotomous Key Training</p>
                </div>

                <div className="flex-1 p-6 flex flex-col gap-6 overflow-y-auto">
                  {/* Mystery Bug Display */}
                  <div className="bg-slate-50 border-2 border-slate-200 rounded-2xl p-6 text-center shadow-sm shrink-0">
                    <h2 className="text-sm font-bold text-slate-500 uppercase tracking-wider mb-4">Mystery Bug</h2>
                    <div className="flex justify-center w-full mb-2">
                      <BugIllustration bug={targetBug} />
                    </div>
                    <p className="text-slate-600 text-sm mt-4">Observe the traits of this bug to answer the key.</p>
                  </div>

                  {/* Active Question or Result */}
                  {status === 'playing' ? (
                    <div className="flex flex-col gap-4 animate-fade-in shrink-0">
                      <h3 className="text-lg font-semibold text-slate-800 text-center px-2">
                        {currentNode.text}
                      </h3>
                      <div className="flex gap-3 mt-2">
                        <button 
                          onClick={() => handleAnswer(true)}
                          className="flex-1 bg-green-500 hover:bg-green-600 active:bg-green-700 text-white font-bold py-4 rounded-xl shadow-md transition-all active:scale-95"
                        >
                          YES
                        </button>
                        <button 
                          onClick={() => handleAnswer(false)}
                          className="flex-1 bg-red-500 hover:bg-red-600 active:bg-red-700 text-white font-bold py-4 rounded-xl shadow-md transition-all active:scale-95"
                        >
                          NO
                        </button>
                      </div>
                      
                      <div className="flex flex-col gap-1 mt-2">
                          {path.length > 1 && (
                            <button 
                              onClick={handleGoBack}
                              className="text-slate-400 hover:text-slate-600 font-medium py-2 flex items-center justify-center gap-2 transition-colors text-sm w-full"
                            >
                              <span>↩</span> Go Back
                            </button>
                          )}
                          <button 
                              onClick={initGame}
                              className="text-slate-400 hover:text-indigo-600 font-medium py-2 flex items-center justify-center gap-2 transition-colors text-sm w-full"
                          >
                              <span>⏭️</span> Skip this bug
                          </button>
                      </div>
                    </div>
                  ) : (
                    <div className={`p-6 rounded-2xl text-center shadow-md animate-fade-in shrink-0 ${status === 'won' ? 'bg-green-100 border-2 border-green-400' : 'bg-red-100 border-2 border-red-400'}`}>
                      <h3 className={`text-2xl font-bold mb-2 ${status === 'won' ? 'text-green-700' : 'text-red-700'}`}>
                        {status === 'won' ? 'Correct Match!' : 'Incorrect Match!'}
                      </h3>
                      <p className="mb-6 text-slate-700 font-medium">
                        {status === 'won' 
                          ? `You successfully identified the ${targetBug.bug}!` 
                          : `You identified a ${currentNode.bug}, but the mystery bug was a ${targetBug.bug}.`}
                      </p>
                      <div className="flex flex-col gap-3">
                        <button 
                          onClick={initGame}
                          className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl shadow-md transition-all active:scale-95"
                        >
                          Identify Another Bug
                        </button>
                        <button 
                          onClick={handleGoBack}
                          className="w-full bg-white border-2 border-slate-200 hover:bg-slate-50 text-slate-600 font-bold py-3 px-4 rounded-xl shadow-sm transition-all active:scale-95 flex justify-center items-center gap-2"
                        >
                          <span>↩</span> Change Previous Answer
                        </button>
                      </div>
                    </div>
                  )}
                </div>
              </div>

              {/* RIGHT PANEL: The Tree Graph Visualization */}
              <div 
                ref={scrollContainerRef}
                className="w-full md:w-2/3 lg:w-3/4 flex-1 overflow-auto bg-slate-50 relative cursor-grab active:cursor-grabbing"
              >
                <div className="p-8 pb-24" style={{ minWidth: '1800px', minHeight: '850px' }}>
                  <h2 className="text-xl font-bold text-slate-400 mb-6 sticky left-8">Dichotomous Tree Map</h2>
                  
                  <svg className="w-full h-full overflow-visible" style={{ pointerEvents: 'none' }}>
                    <defs>
                      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                        <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
                      </marker>
                      <marker id="arrowhead-active" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                        <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1" />
                      </marker>
                    </defs>

                    {/* Draw Edges (Lines) */}
                    {edges.map((edge, i) => {
                      const isEdgeActive = path.includes(edge.source.id) && path.includes(edge.target.id);
                      const isPastEdge = path.includes(edge.target.id) || (!path.includes(edge.target.id) && !path.includes(currentNode.id) && status !== 'playing');

                      const sourceX = edge.source.x + 160;
                      const sourceY = edge.source.y;
                      const targetX = edge.target.x - 10; // slightly offset for arrowhead
                      const targetY = edge.target.y;
                      
                      // Draw a smooth cubic bezier curve
                      const d = `M ${sourceX} ${sourceY} C ${sourceX + 40} ${sourceY}, ${targetX - 40} ${targetY}, ${targetX} ${targetY}`;

                      return (
                        <g key={i}>
                          <path 
                            d={d} 
                            fill="transparent" 
                            stroke={isEdgeActive ? "#6366f1" : "#cbd5e1"} 
                            strokeWidth={isEdgeActive ? "4" : "2"}
                            markerEnd={isEdgeActive ? "url(#arrowhead-active)" : "url(#arrowhead)"}
                            className="transition-all duration-500"
                          />
                          {/* Label for Yes/No along the path */}
                          <rect 
                            x={(sourceX + targetX) / 2 - 15} 
                            y={(sourceY + targetY) / 2 - 10} 
                            width="30" 
                            height="20" 
                            fill={isEdgeActive ? "#e0e7ff" : "#f8fafc"} 
                            rx="4"
                          />
                          <text 
                            x={(sourceX + targetX) / 2} 
                            y={(sourceY + targetY) / 2 + 4} 
                            textAnchor="middle" 
                            fontSize="11" 
                            fontWeight="bold"
                            fill={isEdgeActive ? "#4f46e5" : "#64748b"}
                          >
                            {edge.label}
                          </text>
                        </g>
                      );
                    })}

                    {/* Draw Nodes (Boxes) */}
                    {nodes.map(node => {
                      const isActive = currentNode.id === node.id;
                      const isVisited = path.includes(node.id);
                      
                      return (
                        <foreignObject 
                          key={node.id} 
                          x={node.x} 
                          y={node.y - (node.isLeaf ? 30 : 40)} 
                          width="160" 
                          height={node.isLeaf ? "60" : "80"}
                          className="transition-all duration-500 overflow-visible"
                        >
                          <div className={`
                            w-full h-full flex flex-col items-center justify-center p-3 text-center rounded-xl border-2 shadow-sm transition-all
                            ${isActive ? 'bg-indigo-50 border-indigo-500 shadow-indigo-100 scale-105 shadow-lg ring-4 ring-indigo-100' : 
                              isVisited ? 'bg-white border-indigo-300 shadow-md opacity-100' : 
                              'bg-white border-slate-200 opacity-50 grayscale hover:grayscale-0 hover:opacity-100' }
                          `}>
                            {node.isLeaf ? (
                              <React.Fragment>
                                <span className="text-3xl leading-none mb-1 drop-shadow-sm">{node.emoji}</span>
                                <span className="font-bold text-sm text-slate-800 tracking-tight">{node.bug}</span>
                              </React.Fragment>
                            ) : (
                              <span className={`text-xs font-semibold leading-snug ${isActive ? 'text-indigo-900' : 'text-slate-700'}`}>
                                {node.text}
                              </span>
                            )}
                          </div>
                        </foreignObject>
                      );
                    })}
                  </svg>
                </div>
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DichotomousKeyApp />);
    </script>
</body>
</html>
