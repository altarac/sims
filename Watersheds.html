<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catchment Basin Simulator</title>
    <!-- Tailwind CSS for UI Layout -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- OrbitControls for Navigation -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; overflow: hidden; background-color: #cbd5e1; }
        canvas { outline: none; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .mode-active { background-color: #3b82f6 !important; color: white !important; box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.5); }
        .hidden-panel { max-height: 0 !important; opacity: 0 !important; pointer-events: none; padding-bottom: 0 !important; }
        .visible-panel { max-height: 800px; opacity: 1; }
        .btn-transition { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="select-none">

    <!-- Header Panel -->
    <div class="absolute top-8 left-8 p-6 glass shadow-2xl rounded-[2.5rem] w-[22rem] z-50">
        <div class="flex items-center gap-3 mb-6">
            <div class="p-2 bg-blue-500 rounded-xl text-white">
                <i data-lucide="droplets" class="w-6 h-6"></i>
            </div>
            <h1 class="text-xl font-black tracking-tight text-slate-800 uppercase italic">Catchment Sim</h1>
        </div>
        <div class="flex bg-slate-200/50 p-1.5 rounded-3xl">
            <button id="btn-terrain" class="flex-1 py-3 text-xs font-black uppercase rounded-[2rem] transition-all bg-white shadow-md text-blue-600">Terrain</button>
            <button id="btn-arrows" class="flex-1 py-3 text-xs font-black uppercase rounded-[2rem] transition-all text-slate-400">Show Arrows</button>
        </div>
    </div>

    <!-- Sidepanels -->
    <div class="absolute right-8 top-8 flex flex-col gap-6 w-80 z-50 pointer-events-none">
        <!-- PRESETS -->
        <div class="glass shadow-2xl rounded-[2.5rem] pointer-events-auto overflow-hidden">
            <button id="header-presets" class="flex items-center justify-between p-6 w-full hover:bg-white/50 transition-colors">
                <div class="flex items-center gap-3">
                    <i data-lucide="shuffle" class="w-5 h-5 text-slate-400"></i>
                    <h2 class="text-sm font-black text-slate-600 uppercase tracking-widest">Presets</h2>
                </div>
                <i data-lucide="chevron-up" id="icon-presets" class="w-5 h-5 text-slate-400 transition-transform"></i>
            </button>
            <div id="content-presets" class="px-6 pb-6 flex flex-col gap-3 visible-panel overflow-hidden transition-all duration-300">
                <button id="btn-random" class="w-full py-4 bg-blue-600 text-white rounded-3xl font-bold hover:bg-blue-700 shadow-xl shadow-blue-200 active:scale-95 flex items-center justify-center gap-2 mb-2 uppercase text-xs tracking-widest">
                    <i data-lucide="shuffle" class="w-4 h-4"></i> Random Sandbox
                </button>
                <div class="h-px bg-slate-200/50 my-1"></div>
                <button class="preset-btn text-left p-4 rounded-3xl border-2 border-slate-100 hover:border-blue-200 bg-white transition-all font-bold text-slate-700 text-sm" data-preset="0">Flat Plain</button>
                <button class="preset-btn text-left p-4 rounded-3xl border-2 border-slate-100 hover:border-blue-200 bg-white transition-all font-bold text-slate-700 text-sm" data-preset="1">Mountain Ridge</button>
            </div>
        </div>

        <!-- IMPACT ZONE -->
        <div class="glass shadow-2xl rounded-[2.5rem] pointer-events-auto overflow-hidden">
            <button id="header-impact" class="flex items-center justify-between p-6 w-full hover:bg-white/50 transition-colors">
                <div class="flex items-center gap-3">
                    <i data-lucide="trending-down" class="w-5 h-5 text-red-400"></i>
                    <h3 class="text-sm font-black text-slate-600 uppercase tracking-widest">Impact Zone</h3>
                </div>
                <i data-lucide="chevron-up" id="icon-impact" class="w-5 h-5 text-slate-400 transition-transform"></i>
            </button>
            <div id="content-impact" class="px-6 pb-6 visible-panel overflow-hidden transition-all duration-300">
                <div class="flex justify-end mb-4">
                    <button id="btn-toggle-impact" class="p-2.5 rounded-xl bg-blue-100 text-blue-600 hover:bg-blue-200 transition-colors">
                        <i data-lucide="eye" id="icon-impact-eye" class="w-5 h-5"></i>
                    </button>
                </div>
                <div id="impact-list" class="space-y-3 min-h-[4rem]">
                    <div class="text-[10px] text-slate-400 italic text-center py-6 border border-dashed border-slate-300 rounded-[2rem]">No impact detected.</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toolbar -->
    <div class="absolute bottom-12 left-1/2 -translate-x-1/2 flex items-center gap-4 glass bg-white/80 p-4 rounded-[3rem] shadow-2xl z-50">
        <div class="flex items-center gap-3 pr-6 border-r border-slate-200">
            <button id="mode-rotate" class="toolbar-btn mode-active p-4 rounded-full transition-all" title="Rotate View"><i data-lucide="navigation-2" class="w-7 h-7"></i></button>
            <button id="mode-edit" class="toolbar-btn p-4 rounded-full bg-slate-100 text-slate-500 hover:bg-slate-200 transition-all" title="Sculpt Terrain"><i data-lucide="mountain" class="w-7 h-7"></i></button>
            <button id="mode-move" class="toolbar-btn p-4 rounded-full bg-slate-100 text-slate-500 hover:bg-slate-200 transition-all" title="Reposition Town"><i data-lucide="mouse-pointer-2" class="w-7 h-7"></i></button>
            <button id="mode-spill" class="toolbar-btn p-4 rounded-full bg-slate-100 text-slate-500 hover:bg-slate-200 transition-all" title="Path Tracer"><i data-lucide="droplets" class="w-7 h-7"></i></button>
            <button id="mode-town" class="toolbar-btn p-4 rounded-full bg-slate-100 text-slate-500 hover:bg-slate-200 transition-all" title="Add Town"><i data-lucide="home" class="w-7 h-7"></i></button>
        </div>
        <div class="flex items-center gap-4 px-2">
            <div id="edit-options" class="hidden flex bg-slate-100 p-1 rounded-full items-center">
                <button id="brush-raise" class="px-5 py-2 rounded-full text-[10px] font-black bg-slate-800 text-white shadow-md transition-all">RAISE</button>
                <button id="brush-lower" class="px-5 py-2 rounded-full text-[10px] font-black text-slate-400 transition-all">LOWER</button>
            </div>
            <button id="btn-play-pause" class="p-4 bg-slate-100 hover:bg-slate-200 rounded-full text-blue-600 transition-all"><i data-lucide="pause" id="icon-play-pause" class="w-6 h-6"></i></button>
            <button id="btn-clear" class="p-4 bg-slate-100 hover:bg-red-50 rounded-full text-red-500 transition-all"><i data-lucide="trash-2" class="w-6 h-6"></i></button>
        </div>
    </div>

    <canvas id="main-canvas" class="w-full h-full"></canvas>

    <script>
        // --- CONFIGURATION ---
        const CONFIG = {
            GRID_SIZE: 42,
            PLANE_SIZE: 20,
            BASE_DEPTH: 5,
            PARTICLE_LIFETIME: 10000,
            MAX_TRAIL_POINTS: 120
        };

        const SCENARIOS = [
            {
                title: "Flat Plain",
                generate: () => new Float32Array(CONFIG.GRID_SIZE * CONFIG.GRID_SIZE).fill(1.5)
            },
            {
                title: "Mountain Ridge",
                generate: () => {
                    const data = new Float32Array(CONFIG.GRID_SIZE * CONFIG.GRID_SIZE);
                    for (let i = 0; i < data.length; i++) {
                        const x = (i % CONFIG.GRID_SIZE) / (CONFIG.GRID_SIZE - 1) * 2 - 1;
                        const z = Math.floor(i / CONFIG.GRID_SIZE) / (CONFIG.GRID_SIZE - 1) * 2 - 1;
                        const ridge = Math.exp(-Math.pow(x * 3, 2)) * 6;
                        const noise = Math.sin(x * 10) * Math.cos(z * 10) * 0.5;
                        const slope = (z + 1) * 1.5;
                        data[i] = ridge + noise + slope;
                    }
                    return data;
                }
            }
        ];

        let state = {
            mode: 'rotate',
            brushType: 'raise',
            isPlaying: true,
            showImpact: true,
            viewStep: 0,
            selectedTownIdx: null,
            affectedTowns: new Set(),
            waterLevel: 0.8
        };

        let towns = [
            { name: "Riverdale", x: -6, z: -4, color: "#ef4444" },
            { name: "Hilltop", x: 6, z: 2, color: "#3b82f6" },
            { name: "Lakeside", x: -4, z: 8, color: "#10b981" }
        ];

        let isPointerDown = false;

        // --- THREE.JS SETUP ---
        const canvas = document.getElementById('main-canvas');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#d1d5db');

        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(28, 24, 28);

        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.maxPolarAngle = Math.PI / 2.1;

        scene.add(new THREE.AmbientLight(0xffffff, 0.9));
        const sun = new THREE.DirectionalLight(0xffffff, 0.4);
        sun.position.set(10, 40, 10);
        scene.add(sun);

        const arrowsGroup = new THREE.Group();
        scene.add(arrowsGroup);

        const tracerLineGeom = new THREE.BufferGeometry();
        const tracerLineMat = new THREE.LineBasicMaterial({ color: '#fbbf24', transparent: true, opacity: 0.8 });
        const tracerLine = new THREE.Line(tracerLineGeom, tracerLineMat);
        tracerLine.frustumCulled = false;
        scene.add(tracerLine);

        let heightData = new Float32Array(CONFIG.GRID_SIZE * CONFIG.GRID_SIZE).fill(1.0).map((h, i) => {
            const x = (i % CONFIG.GRID_SIZE) / (CONFIG.GRID_SIZE - 1) * 2 - 1;
            const z = Math.floor(i / CONFIG.GRID_SIZE) / (CONFIG.GRID_SIZE - 1) * 2 - 1;
            return 1.0 + (z + 1) * 1.5 + Math.pow(x, 2) * 5; 
        });
        let originalHeightData = new Float32Array(heightData);

        let terrainMesh;
        let townGroups = [];
        let particles = [];

        function createVolumetricTerrain() {
            if (terrainMesh) scene.remove(terrainMesh);
            const geometry = new THREE.BufferGeometry();
            const vertices = []; const colors = []; const indices = [];
            const color = new THREE.Color();

            for (let z = 0; z < CONFIG.GRID_SIZE; z++) {
                for (let x = 0; x < CONFIG.GRID_SIZE; x++) {
                    const i = z * CONFIG.GRID_SIZE + x;
                    const vx = (x / (CONFIG.GRID_SIZE - 1)) * CONFIG.PLANE_SIZE - CONFIG.PLANE_SIZE / 2;
                    const vz = (z / (CONFIG.GRID_SIZE - 1)) * CONFIG.PLANE_SIZE - CONFIG.PLANE_SIZE / 2;
                    const vy = heightData[i];
                    const vOrig = originalHeightData[i];
                    vertices.push(vx, vy, vz);

                    const delta = vy - vOrig;
                    if ((delta < -0.05 && vy < 6) || vy < state.waterLevel) {
                        color.set('#38bdf8').lerp(new THREE.Color('#1d4ed8'), Math.min(1, Math.abs(delta) / 1.5));
                    } else if (vy > 7.5) {
                        color.set('#cbd5e1').lerp(new THREE.Color('#ffffff'), Math.min(1, (vy - 7.5) / 3));
                    } else {
                        color.set('#4ade80').lerp(new THREE.Color('#166534'), Math.min(1, vy / 10));
                    }
                    colors.push(color.r, color.g, color.b);
                    if (x < CONFIG.GRID_SIZE - 1 && z < CONFIG.GRID_SIZE - 1) {
                        const a = i, b = i + 1, c = i + CONFIG.GRID_SIZE, d = i + CONFIG.GRID_SIZE + 1;
                        indices.push(a, c, b, b, c, d);
                    }
                }
            }

            const baseOffset = vertices.length / 3;
            for (let z = 0; z < CONFIG.GRID_SIZE; z++) {
                for (let x = 0; x < CONFIG.GRID_SIZE; x++) {
                    const vx = (x / (CONFIG.GRID_SIZE - 1)) * CONFIG.PLANE_SIZE - CONFIG.PLANE_SIZE / 2;
                    const vz = (z / (CONFIG.GRID_SIZE - 1)) * CONFIG.PLANE_SIZE - CONFIG.PLANE_SIZE / 2;
                    vertices.push(vx, -CONFIG.BASE_DEPTH, vz);
                    colors.push(0.95, 0.95, 0.95);
                }
            }

            const addWall = (s1, s2, count, step) => {
                for (let i = 0; i < count - 1; i++) {
                    const t1 = s1 + i * step, t2 = s1 + (i + 1) * step, b1 = s2 + i * step, b2 = s2 + (i + 1) * step;
                    indices.push(t1, b1, t2, t2, b1, b2);
                }
            };
            addWall(0, baseOffset, CONFIG.GRID_SIZE, 1);
            addWall((CONFIG.GRID_SIZE - 1) * CONFIG.GRID_SIZE, baseOffset + (CONFIG.GRID_SIZE - 1) * CONFIG.GRID_SIZE, CONFIG.GRID_SIZE, 1);
            addWall(0, baseOffset, CONFIG.GRID_SIZE, CONFIG.GRID_SIZE);
            addWall(CONFIG.GRID_SIZE - 1, baseOffset + CONFIG.GRID_SIZE - 1, CONFIG.GRID_SIZE, CONFIG.GRID_SIZE);

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            geometry.setIndex(indices);
            geometry.computeVertexNormals();

            terrainMesh = new THREE.Mesh(geometry, new THREE.MeshStandardMaterial({ vertexColors: true, flatShading: true, side: THREE.DoubleSide }));
            scene.add(terrainMesh);

            updateTownsInScene();
            updateArrows();
        }

        function createTextLabel(text, color, isSelected) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 256; canvas.height = 64;
            ctx.fillStyle = isSelected ? '#ffffff' : 'rgba(255,255,255,0.95)';
            ctx.roundRect(0, 0, 256, 64, 16);
            ctx.fill();
            ctx.strokeStyle = color;
            ctx.lineWidth = isSelected ? 8 : 4;
            ctx.stroke();
            ctx.fillStyle = '#0f172a';
            ctx.font = 'bold 22px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(text.toUpperCase(), 128, 42);
            const texture = new THREE.CanvasTexture(canvas);
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture, depthTest: false }));
            sprite.scale.set(3, 0.75, 1);
            return sprite;
        }

        function updateTownsInScene() {
            townGroups.forEach(g => scene.remove(g));
            townGroups = [];
            towns.forEach((town, idx) => {
                const isSelected = state.selectedTownIdx === idx;
                const group = new THREE.Group();
                const box = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.7, 0.7), new THREE.MeshStandardMaterial({ color: town.color }));
                group.add(box);
                const roof = new THREE.Mesh(new THREE.ConeGeometry(0.6, 0.5, 4), new THREE.MeshStandardMaterial({ color: '#1e293b' }));
                roof.rotateY(Math.PI / 4); roof.position.y = 0.55; group.add(roof);
                const label = createTextLabel(town.name, town.color, isSelected);
                label.position.y = 2.4; group.add(label);
                const hIdx = getGridIndex(town.x, town.z);
                group.position.set(town.x, heightData[hIdx], town.z);
                scene.add(group);
                townGroups.push(group);
                town.mesh = group;
            });
        }

        function updateArrows() {
            arrowsGroup.clear();
            if (state.viewStep !== 1) return;
            for (let z = 1; z < CONFIG.GRID_SIZE - 1; z += 2) {
                for (let x = 1; x < CONFIG.GRID_SIZE - 1; x += 2) {
                    const idx = z * CONFIG.GRID_SIZE + x;
                    const hL = heightData[z * CONFIG.GRID_SIZE + (x - 1)], hR = heightData[z * CONFIG.GRID_SIZE + (x + 1)];
                    const hU = heightData[(z - 1) * CONFIG.GRID_SIZE + x], hD = heightData[(z + 1) * CONFIG.GRID_SIZE + x];
                    const dir = new THREE.Vector3(hL - hR, 0, hU - hD).normalize();
                    if (dir.length() > 0.1) {
                        const origin = new THREE.Vector3((x / (CONFIG.GRID_SIZE - 1)) * CONFIG.PLANE_SIZE - CONFIG.PLANE_SIZE / 2, heightData[idx] + 0.3, (z / (CONFIG.GRID_SIZE - 1)) * CONFIG.PLANE_SIZE - CONFIG.PLANE_SIZE / 2);
                        arrowsGroup.add(new THREE.ArrowHelper(dir, origin, 0.6, 0x64748b, 0.2, 0.15));
                    }
                }
            }
        }

        function getGridIndex(x, z) {
            const gx = Math.min(CONFIG.GRID_SIZE - 1, Math.max(0, Math.round(((x + CONFIG.PLANE_SIZE / 2) / CONFIG.PLANE_SIZE) * (CONFIG.GRID_SIZE - 1))));
            const gz = Math.min(CONFIG.GRID_SIZE - 1, Math.max(0, Math.round(((z + CONFIG.PLANE_SIZE / 2) / CONFIG.PLANE_SIZE) * (CONFIG.GRID_SIZE - 1))));
            return gz * CONFIG.GRID_SIZE + gx;
        }

        function updateParticle(p) {
            const idx = getGridIndex(p.mesh.position.x, p.mesh.position.z);
            const gx = Math.floor(((p.mesh.position.x + CONFIG.PLANE_SIZE / 2) / CONFIG.PLANE_SIZE) * (CONFIG.GRID_SIZE - 1));
            const gz = Math.floor(((p.mesh.position.z + CONFIG.PLANE_SIZE / 2) / CONFIG.PLANE_SIZE) * (CONFIG.GRID_SIZE - 1));
            if (gx <= 0 || gx >= CONFIG.GRID_SIZE - 1 || gz <= 0 || gz >= CONFIG.GRID_SIZE - 1) {
                scene.remove(p.mesh); return;
            }
            const hL = heightData[gz * CONFIG.GRID_SIZE + (gx - 1)], hR = heightData[gz * CONFIG.GRID_SIZE + (gx + 1)];
            const hU = heightData[(gz - 1) * CONFIG.GRID_SIZE + gx], hD = heightData[(gz + 1) * CONFIG.GRID_SIZE + gx];
            p.vel.x += (hL - hR) * 0.055; p.vel.z += (hU - hD) * 0.055; p.vel.multiplyScalar(0.92);
            p.mesh.position.x += p.vel.x; p.mesh.position.z += p.vel.z; p.mesh.position.y = heightData[idx] + 0.3;
            if (p.isTracer) {
                if (!p.history) p.history = [];
                p.history.push(p.mesh.position.clone());
                if (p.history.length > CONFIG.MAX_TRAIL_POINTS) p.history.shift();
            }
            towns.forEach(town => {
                if (town.mesh && p.mesh.position.distanceTo(town.mesh.position) < 1.8) {
                    if (!state.affectedTowns.has(town.name)) {
                        state.affectedTowns.add(town.name); renderImpactList();
                    }
                }
            });
        }

        function updateTracerLine(now) {
            const tracer = particles.find(p => p.isTracer);
            if (tracer && tracer.history && tracer.history.length > 1) {
                const positions = new Float32Array(tracer.history.length * 3);
                for (let i = 0; i < tracer.history.length; i++) {
                    positions[i * 3] = tracer.history[i].x;
                    positions[i * 3 + 1] = tracer.history[i].y + 0.1;
                    positions[i * 3 + 2] = tracer.history[i].z;
                }
                tracerLine.geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                tracerLine.geometry.attributes.position.needsUpdate = true;
                const age = now - tracer.startTime;
                const fadeRatio = Math.max(0, 1 - age / CONFIG.PARTICLE_LIFETIME);
                tracerLine.material.opacity = 0.8 * fadeRatio;
                tracerLine.visible = true;
            } else { tracerLine.visible = false; }
        }

        function performInteraction(e) {
            if (!terrainMesh) return;
            const rect = canvas.getBoundingClientRect();
            const mouse = new THREE.Vector2(((e.clientX - rect.left) / rect.width) * 2 - 1, -((e.clientY - rect.top) / rect.height) * 2 + 1);
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(terrainMesh);
            if (intersects.length > 0) {
                const p = intersects[0].point;
                if (state.mode === 'edit') {
                    const cx = Math.round(((p.x + CONFIG.PLANE_SIZE / 2) / CONFIG.PLANE_SIZE) * (CONFIG.GRID_SIZE - 1));
                    const cz = Math.round(((p.z + CONFIG.PLANE_SIZE / 2) / CONFIG.PLANE_SIZE) * (CONFIG.GRID_SIZE - 1));
                    const radius = 3;
                    for (let j = -radius; j <= radius; j++) {
                        for (let i = -radius; i <= radius; i++) {
                            const nx = cx + i, nz = cz + j;
                            if (nx >= 0 && nx < CONFIG.GRID_SIZE && nz >= 0 && nz < CONFIG.GRID_SIZE) {
                                const falloff = Math.max(0, (radius - Math.sqrt(i * i + j * j)) / radius);
                                heightData[nz * CONFIG.GRID_SIZE + nx] += (state.brushType === 'raise' ? 0.02 : -0.02) * falloff;
                                heightData[nz * CONFIG.GRID_SIZE + nx] = Math.max(-2, Math.min(14, heightData[nz * CONFIG.GRID_SIZE + nx]));
                            }
                        }
                    }
                    createVolumetricTerrain();
                } else if (state.mode === 'spill') {
                    particles.forEach(part => scene.remove(part.mesh));
                    particles = []; state.affectedTowns.clear(); renderImpactList();
                    const tracerMesh = new THREE.Mesh(new THREE.SphereGeometry(0.5, 24, 24), new THREE.MeshBasicMaterial({ color: '#fbbf24' }));
                    tracerMesh.position.set(p.x, 6, p.z);
                    scene.add(tracerMesh);
                    particles.push({ mesh: tracerMesh, vel: new THREE.Vector3(), isTracer: true, history: [], startTime: Date.now() });
                } else if (state.mode === 'move') {
                    const townIdx = towns.findIndex(t => t.mesh.position.distanceTo(p) < 2.5);
                    if (townIdx !== -1) { state.selectedTownIdx = townIdx; updateTownsInScene(); }
                    else if (state.selectedTownIdx !== null) {
                        towns[state.selectedTownIdx].x = p.x; towns[state.selectedTownIdx].z = p.z;
                        state.selectedTownIdx = null; createVolumetricTerrain();
                    }
                } else if (state.mode === 'town') {
                    towns.push({ name: `TOWN ${towns.length + 1}`, x: p.x, z: p.z, color: `hsl(${Math.random() * 360}, 80%, 45%)` });
                    state.mode = 'edit'; updateToolbar(); createVolumetricTerrain();
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            if (controls) controls.update();
            if (state.isPlaying) {
                const now = Date.now();
                particles = particles.filter(p => {
                    if (!p.mesh) return false;
                    if (now - p.startTime > CONFIG.PARTICLE_LIFETIME) { scene.remove(p.mesh); return false; }
                    updateParticle(p); return true;
                });
                updateTracerLine(now);
            }
            renderer.render(scene, camera);
        }

        function updateToolbar() {
            document.querySelectorAll('.toolbar-btn').forEach(btn => { btn.classList.remove('mode-active'); btn.classList.add('bg-slate-100', 'text-slate-500'); });
            const activeBtn = document.getElementById(`mode-${state.mode}`);
            if (activeBtn) { activeBtn.classList.add('mode-active'); activeBtn.classList.remove('bg-slate-100', 'text-slate-500'); }
            document.getElementById('edit-options').classList.toggle('hidden', state.mode !== 'edit');
        }

        function renderImpactList() {
            const list = document.getElementById('impact-list');
            if (!state.showImpact) { list.innerHTML = '<div class="text-[10px] text-slate-400 italic text-center py-6 border border-dashed border-slate-300 rounded-[2rem]">Impact alerts are hidden.</div>'; return; }
            if (state.affectedTowns.size === 0) { list.innerHTML = '<div class="text-[10px] text-slate-400 italic text-center py-6 border border-dashed border-slate-300 rounded-[2rem]">No impact detected.</div>'; return; }
            list.innerHTML = `<div class="flex items-center gap-2 text-red-600 font-bold text-[10px] uppercase tracking-wider mb-2"><i data-lucide="trending-down" class="w-4 h-4"></i> Contamination</div>`;
            state.affectedTowns.forEach(name => {
                const town = towns.find(t => t.name === name);
                const item = document.createElement('div');
                item.className = "flex items-center gap-4 text-base font-bold text-slate-800 bg-slate-100 p-4 rounded-2xl border border-white";
                item.innerHTML = `<div class="w-4 h-4 rounded-full ring-4 ring-white" style="background-color: ${town?.color || '#000'}"></div> ${name}`;
                list.appendChild(item);
            });
            lucide.createIcons();
        }

        document.getElementById('header-presets').addEventListener('click', () => {
            const content = document.getElementById('content-presets');
            content.classList.toggle('visible-panel'); content.classList.toggle('hidden-panel');
            document.getElementById('icon-presets').style.transform = content.classList.contains('visible-panel') ? 'rotate(0deg)' : 'rotate(180deg)';
        });

        document.getElementById('header-impact').addEventListener('click', () => {
            const content = document.getElementById('content-impact');
            content.classList.toggle('visible-panel'); content.classList.toggle('hidden-panel');
            document.getElementById('icon-impact').style.transform = content.classList.contains('visible-panel') ? 'rotate(0deg)' : 'rotate(180deg)';
        });

        document.getElementById('btn-terrain').addEventListener('click', () => {
            state.viewStep = 0;
            document.getElementById('btn-terrain').className = "flex-1 py-3 text-xs font-black uppercase rounded-[2rem] transition-all bg-white shadow-md text-blue-600";
            document.getElementById('btn-arrows').className = "flex-1 py-3 text-xs font-black uppercase rounded-[2rem] transition-all text-slate-400";
            createVolumetricTerrain();
        });

        document.getElementById('btn-arrows').addEventListener('click', () => {
            state.viewStep = 1;
            document.getElementById('btn-arrows').className = "flex-1 py-3 text-xs font-black uppercase rounded-[2rem] transition-all bg-white shadow-md text-blue-600";
            document.getElementById('btn-terrain').className = "flex-1 py-3 text-xs font-black uppercase rounded-[2rem] transition-all text-slate-400";
            createVolumetricTerrain();
        });

        ['rotate', 'edit', 'move', 'spill', 'town'].forEach(m => {
            document.getElementById(`mode-${m}`).addEventListener('click', () => {
                state.mode = m; controls.enabled = (m === 'rotate'); updateToolbar();
            });
        });

        document.getElementById('brush-raise').addEventListener('click', () => {
            state.brushType = 'raise';
            document.getElementById('brush-raise').className = "px-5 py-2 rounded-full text-[10px] font-black bg-slate-800 text-white shadow-md";
            document.getElementById('brush-lower').className = "px-5 py-2 rounded-full text-[10px] font-black text-slate-400";
        });

        document.getElementById('brush-lower').addEventListener('click', () => {
            state.brushType = 'lower';
            document.getElementById('brush-lower').className = "px-5 py-2 rounded-full text-[10px] font-black bg-slate-800 text-white shadow-md";
            document.getElementById('brush-raise').className = "px-5 py-2 rounded-full text-[10px] font-black text-slate-400";
        });

        document.getElementById('btn-random').addEventListener('click', () => {
            const data = new Float32Array(CONFIG.GRID_SIZE * CONFIG.GRID_SIZE);
            const originalData = new Float32Array(CONFIG.GRID_SIZE * CONFIG.GRID_SIZE);
            const inc = 0.8 + Math.random() * 1.2; const rid = 6 + Math.random() * 3;
            let minH = 100;
            for (let i = 0; i < data.length; i++) {
                const x = (i % CONFIG.GRID_SIZE) / (CONFIG.GRID_SIZE - 1) * 2 - 1;
                const z = Math.floor(i / CONFIG.GRID_SIZE) / (CONFIG.GRID_SIZE - 1) * 2 - 1;
                let h = 1.0 + (z + 1) * inc + Math.pow(x, 2) * rid;
                h += Math.sin(x * 12) * Math.cos(z * 12) * 0.4;
                originalData[i] = h;
                const riv = Math.exp(-Math.pow(x * 15, 2)) * 0.6;
                data[i] = h - riv;
                if (data[i] < minH) minH = data[i];
            }
            state.waterLevel = minH + 0.6; heightData = data; originalHeightData = originalData;
            towns = [];
            const names = ["Stonecrest", "Mistvalley", "Blueford", "Ridgeview", "Oakrun"];
            for (let j = 0; j < 3; j++) {
                let tx, tz, hIdx, attempts = 0;
                do { tx = (Math.random() - 0.5) * 14; tz = (Math.random() - 0.5) * 14; hIdx = getGridIndex(tx, tz); attempts++; } while (attempts < 30 && (data[hIdx] < minH + 0.5));
                towns.push({ name: names[j % names.length] + " " + (j+1), x: tx, z: tz, color: `hsl(${Math.random() * 360}, 80%, 45%)` });
            }
            state.affectedTowns.clear(); particles.forEach(p => scene.remove(p.mesh)); particles = [];
            createVolumetricTerrain(); renderImpactList();
        });

        document.querySelectorAll('.preset-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const idx = parseInt(btn.dataset.preset);
                const newData = SCENARIOS[idx].generate();
                heightData = newData; originalHeightData = new Float32Array(newData);
                state.affectedTowns.clear(); particles.forEach(p => scene.remove(p.mesh)); particles = []; state.waterLevel = 0.8;
                createVolumetricTerrain(); renderImpactList();
            });
        });

        document.getElementById('btn-play-pause').addEventListener('click', () => {
            state.isPlaying = !state.isPlaying;
            document.getElementById('icon-play-pause').setAttribute('data-lucide', state.isPlaying ? 'pause' : 'play');
            lucide.createIcons();
        });

        document.getElementById('btn-clear').addEventListener('click', () => {
            particles.forEach(p => scene.remove(p.mesh));
            particles = []; state.affectedTowns.clear(); renderImpactList();
        });

        document.getElementById('btn-toggle-impact').addEventListener('click', () => {
            state.showImpact = !state.showImpact;
            document.getElementById('icon-impact-eye').setAttribute('data-lucide', state.showImpact ? 'eye' : 'eye-off');
            lucide.createIcons(); renderImpactList();
        });

        canvas.addEventListener('mousedown', (e) => { if (state.mode === 'rotate') return; isPointerDown = true; performInteraction(e); });
        window.addEventListener('mousemove', (e) => { if (isPointerDown && (state.mode === 'edit' || state.mode === 'spill')) performInteraction(e); });
        window.addEventListener('mouseup', () => { isPointerDown = false; });

        window.onload = function () {
            lucide.createIcons();
            createVolumetricTerrain();
            animate();
        }
    </script>
</body>
</html>
