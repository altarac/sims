<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vertical Math Practice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Hide native number input spinners to use our custom ones */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
        .strikethrough {
            text-decoration: line-through;
            color: #9ca3af; /* tailwind gray-400 */
        }
    </style>
</head>
<body class="bg-blue-50 min-h-screen flex items-center justify-center p-4 font-sans text-gray-800">

    <div class="bg-white shadow-xl rounded-2xl w-full max-w-lg overflow-hidden">
        
        <!-- Header & Settings -->
        <div class="bg-blue-600 text-white p-6">
            <h1 class="text-2xl font-bold text-center mb-4">Math Practice</h1>
            <div class="flex flex-wrap justify-center gap-4 text-sm">
                <div class="flex items-center gap-2">
                    <label for="op-select" class="font-semibold">Operation:</label>
                    <select id="op-select" class="bg-blue-700 text-white border border-blue-400 rounded px-2 py-1 outline-none focus:ring-2 focus:ring-blue-300">
                        <option value="mixed">Mixed (+ and -)</option>
                        <option value="+">Addition (+)</option>
                        <option value="-">Subtraction (-)</option>
                    </select>
                </div>
                <div class="flex items-center gap-2">
                    <label for="regroup-select" class="font-semibold">Regrouping:</label>
                    <select id="regroup-select" class="bg-blue-700 text-white border border-blue-400 rounded px-2 py-1 outline-none focus:ring-2 focus:ring-blue-300">
                        <option value="mixed">Mixed</option>
                        <option value="yes">Always Regroup</option>
                        <option value="no">Never Regroup</option>
                    </select>
                </div>
            </div>
            <div class="mt-4 flex justify-center">
                <button id="btn-generate" class="bg-white text-blue-600 hover:bg-blue-50 font-bold py-2 px-6 rounded-full shadow transition-colors">
                    New Problem
                </button>
            </div>
        </div>

        <!-- Math Board -->
        <div class="p-8 flex flex-col items-center">
            
            <div class="grid grid-cols-4 gap-x-2 gap-y-1 text-5xl font-mono items-center w-64">
                
                <!-- Row 1: Regrouping Inputs -->
                <div class="col-span-1"></div> <!-- Empty space over operator -->
                <div class="col-span-1 flex justify-center"></div> <!-- Empty space over Hundreds -->
                
                <!-- Tens Regroup -->
                <div class="col-span-1 flex flex-col items-center gap-1">
                    <button id="btn-up-regroup-tens" class="text-gray-400 hover:text-blue-500 focus:outline-none bg-gray-100 hover:bg-blue-100 rounded p-1 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 15l7-7 7 7"></path></svg>
                    </button>
                    <input type="number" id="regroup-tens" class="w-12 h-12 text-center text-2xl border-2 border-dashed border-gray-300 text-blue-600 rounded focus:border-blue-500 focus:outline-none bg-blue-50" placeholder="">
                    <button id="btn-down-regroup-tens" class="text-gray-400 hover:text-blue-500 focus:outline-none bg-gray-100 hover:bg-blue-100 rounded p-1 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path></svg>
                    </button>
                </div>

                <!-- Ones Regroup (Hidden for Borrowing UI) -->
                <div class="col-span-1 flex flex-col items-center gap-1">
                    <button id="btn-up-regroup-ones" class="text-gray-400 hover:text-blue-500 focus:outline-none bg-gray-100 hover:bg-blue-100 rounded p-1 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 15l7-7 7 7"></path></svg>
                    </button>
                    <input type="number" id="regroup-ones" class="w-12 h-12 text-center text-2xl border-2 border-dashed border-gray-300 text-blue-600 rounded focus:border-blue-500 focus:outline-none bg-blue-50 transition-all duration-200" placeholder="">
                    <button id="btn-down-regroup-ones" class="text-gray-400 hover:text-blue-500 focus:outline-none bg-gray-100 hover:bg-blue-100 rounded p-1 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path></svg>
                    </button>
                </div>

                <!-- Row 2: Top Number -->
                <div class="col-span-1"></div>
                <div class="col-span-1"></div>
                <div id="num1-tens" class="col-span-1 text-center transition-all duration-200">5</div>
                <div id="num1-ones-container" class="col-span-1 flex items-center justify-center relative">
                    <span id="borrow-ten-indicator" class="text-red-500 text-3xl font-bold absolute -left-2 top-0 opacity-0 transition-opacity duration-200">1</span>
                    <div id="num1-ones" class="text-center transition-all duration-200 z-10 bg-white">2</div>
                </div>

                <!-- Row 3: Operator & Bottom Number -->
                <div id="operator" class="col-span-1 text-center text-4xl self-end pb-1">-</div>
                <div class="col-span-1"></div>
                <div id="num2-tens" class="col-span-1 text-center">1</div>
                <div id="num2-ones" class="col-span-1 text-center">8</div>

                <!-- Horizontal Line -->
                <div class="col-span-4 border-b-4 border-black my-2"></div>

                <!-- Row 4: Answer Inputs -->
                <div class="col-span-1"></div>
                
                <!-- Hundreds Answer (for addition > 99) -->
                <div class="col-span-1 flex justify-center">
                    <input type="number" id="ans-hundreds" class="w-12 h-14 text-center text-4xl border-2 border-gray-400 rounded focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-colors" max="9" min="0">
                </div>
                
                <!-- Tens Answer -->
                <div class="col-span-1 flex justify-center">
                    <input type="number" id="ans-tens" class="w-12 h-14 text-center text-4xl border-2 border-gray-400 rounded focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-colors" max="9" min="0">
                </div>
                
                <!-- Ones Answer -->
                <div class="col-span-1 flex justify-center">
                    <input type="number" id="ans-ones" class="w-12 h-14 text-center text-4xl border-2 border-gray-400 rounded focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-colors" max="9" min="0">
                </div>

            </div>

            <!-- Action Area -->
            <div class="mt-8 flex flex-col items-center w-full">
                <button id="btn-check" class="bg-green-500 hover:bg-green-600 text-white text-xl font-bold py-3 px-12 rounded-xl shadow-lg transition-transform transform hover:scale-105 active:scale-95">
                    Check Answer
                </button>
                
                <!-- Feedback Message -->
                <div id="feedback" class="mt-6 text-center text-lg font-semibold min-h-[3rem] px-4 py-2 rounded w-full opacity-0 transition-opacity duration-300">
                    <!-- Message goes here -->
                </div>
            </div>

        </div>
    </div>

    <script>
        // State
        let currentNum1 = 0;
        let currentNum2 = 0;
        let currentOp = '+';

        // Elements
        const elNum1Tens = document.getElementById('num1-tens');
        const elNum1Ones = document.getElementById('num1-ones');
        const elBorrowTenIndicator = document.getElementById('borrow-ten-indicator');
        const elNum2Tens = document.getElementById('num2-tens');
        const elNum2Ones = document.getElementById('num2-ones');
        const elOperator = document.getElementById('operator');
        
        const inRegroupTens = document.getElementById('regroup-tens');
        const inRegroupOnes = document.getElementById('regroup-ones');
        const inAnsHundreds = document.getElementById('ans-hundreds');
        const inAnsTens = document.getElementById('ans-tens');
        const inAnsOnes = document.getElementById('ans-ones');
        
        const feedback = document.getElementById('feedback');

        // Random integer helper
        const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

        // Initialization
        function init() {
            document.getElementById('btn-generate').addEventListener('click', generateProblem);
            document.getElementById('btn-check').addEventListener('click', checkAnswer);

            setupArrows('regroup-tens');
            setupArrows('regroup-ones');

            inRegroupTens.addEventListener('input', updateStrikethrough);
            inRegroupOnes.addEventListener('input', updateStrikethrough);

            // Auto-advance logic for answers
            setupAutoAdvance(inAnsHundreds, inAnsTens);
            setupAutoAdvance(inAnsTens, inAnsOnes);

            generateProblem();
        }

        function setupArrows(id) {
            document.getElementById(`btn-up-${id}`).addEventListener('click', () => changeRegroup(id, 1));
            document.getElementById(`btn-down-${id}`).addEventListener('click', () => changeRegroup(id, -1));
        }

        function setupAutoAdvance(currentInput, nextInput) {
            currentInput.addEventListener('input', () => {
                if (currentInput.value.length >= 1) {
                    currentInput.value = currentInput.value.slice(0, 1); // Keep single digit
                    nextInput.focus();
                }
            });
        }

        function changeRegroup(id, delta) {
            const input = document.getElementById(id);
            let val = parseInt(input.value);
            
            if (isNaN(val)) {
                // Smart initialization based on context if empty
                if (id === 'regroup-ones' && currentOp === '-' && delta > 0) {
                    val = (currentNum1 % 10) + 10;
                } else if (id === 'regroup-tens' && currentOp === '-' && delta < 0) {
                    val = Math.floor(currentNum1 / 10) - 1;
                } else {
                    val = delta > 0 ? 1 : 0;
                }
            } else {
                val += delta;
            }

            if (val < 0) val = 0; // Prevent negatives
            
            // Handle visual changes for borrowing
            if (id === 'regroup-tens' && delta < 0 && currentOp === '-') {
                 input.value = val;
                 updateStrikethrough();
                 
                 // Automatically show the red '1' in the ones column when borrowing from tens
                 elBorrowTenIndicator.classList.remove('opacity-0');
                 elBorrowTenIndicator.classList.add('opacity-100');
                 
                 // We still need to record that regrouping happened for checking the answer, 
                 // but we hide it from the regroup-ones box visually.
                 inRegroupOnes.value = (currentNum1 % 10) + 10;
                 inRegroupOnes.style.opacity = '0'; // Hide the input box
                 document.getElementById('btn-up-regroup-ones').style.opacity = '0';
                 document.getElementById('btn-down-regroup-ones').style.opacity = '0';

            } else if (id === 'regroup-tens' && delta > 0) {
                 // Reset if they went back up
                 input.value = val;
                 updateStrikethrough();
                 
                 elBorrowTenIndicator.classList.add('opacity-0');
                 elBorrowTenIndicator.classList.remove('opacity-100');
                 inRegroupOnes.value = '';
                 inRegroupOnes.style.opacity = '1'; 
                 document.getElementById('btn-up-regroup-ones').style.opacity = '1';
                 document.getElementById('btn-down-regroup-ones').style.opacity = '1';
            } else {
                input.value = val;
                updateStrikethrough();
            }
        }

        function updateStrikethrough() {
            const rT = inRegroupTens.value.trim();
            const rO = inRegroupOnes.value.trim();
            
            // Only strikethrough if the value is less than the original number (meaning they borrowed/decreased it)
            if (rT !== '' && parseInt(rT) < Math.floor(currentNum1 / 10)) {
                elNum1Tens.classList.add('strikethrough');
            } else {
                elNum1Tens.classList.remove('strikethrough');
            }

            // Ones column shouldn't cross out when adding 10, it just gets the '1' next to it
            // Only strikethrough if they actually decrease it (unlikely in this context, but good for completeness)
             if (rO !== '' && parseInt(rO) < (currentNum1 % 10)) {
                elNum1Ones.classList.add('strikethrough');
            } else {
                elNum1Ones.classList.remove('strikethrough');
            }
        }

        function generateProblem() {
            const opSetting = document.getElementById('op-select').value;
            const regroupSetting = document.getElementById('regroup-select').value;

            // Determine Operation
            currentOp = opSetting === 'mixed' ? (Math.random() > 0.5 ? '+' : '-') : opSetting;
            
            // Determine Regrouping Requirement
            let requireRegroup = false;
            if (regroupSetting === 'yes') requireRegroup = true;
            else if (regroupSetting === 'mixed') requireRegroup = Math.random() > 0.5;

            let ones1, ones2, tens1, tens2;

            if (currentOp === '+') {
                if (requireRegroup) {
                    // Force sum of ones >= 10
                    ones1 = rand(1, 9);
                    ones2 = rand(10 - ones1, 9);
                    tens1 = rand(1, 8);
                    tens2 = rand(1, 8);
                } else {
                    // Force sum of ones < 10
                    ones1 = rand(0, 8);
                    ones2 = rand(0, 9 - ones1);
                    tens1 = rand(1, 8);
                    tens2 = rand(1, 8); // Sum of tens can be > 10 (hundreds answer)
                }
            } else {
                // Subtraction
                if (requireRegroup) {
                    // Force ones1 < ones2 (Borrow required)
                    ones1 = rand(0, 8);
                    ones2 = rand(ones1 + 1, 9);
                    tens1 = rand(2, 9); // At least 2 to borrow from
                    tens2 = rand(1, tens1 - 1); // Keep positive result
                } else {
                    // Force ones1 >= ones2 (No borrow)
                    ones1 = rand(0, 9);
                    ones2 = rand(0, ones1);
                    tens1 = rand(1, 9);
                    tens2 = rand(1, tens1);
                    if (tens1 === tens2 && ones1 === ones2) {
                        tens1 = Math.min(9, tens1 + 1); // Prevent 0 result
                    }
                }
            }

            currentNum1 = tens1 * 10 + ones1;
            currentNum2 = tens2 * 10 + ones2;

            updateDOM();
        }

        function updateDOM() {
            // Reset inputs
            inRegroupTens.value = '';
            inRegroupOnes.value = '';
            inAnsHundreds.value = '';
            inAnsTens.value = '';
            inAnsOnes.value = '';
            
            // Reset borrowing visuals
            elBorrowTenIndicator.classList.add('opacity-0');
            elBorrowTenIndicator.classList.remove('opacity-100');
            inRegroupOnes.style.opacity = '1';
            document.getElementById('btn-up-regroup-ones').style.opacity = '1';
            document.getElementById('btn-down-regroup-ones').style.opacity = '1';

            updateStrikethrough();

            // Set text
            elNum1Tens.textContent = Math.floor(currentNum1 / 10);
            elNum1Ones.textContent = currentNum1 % 10;
            elOperator.textContent = currentOp;
            elNum2Tens.textContent = Math.floor(currentNum2 / 10);
            elNum2Ones.textContent = currentNum2 % 10;

            // Reset feedback
            feedback.classList.remove('opacity-100', 'bg-red-100', 'text-red-700', 'border-red-300', 'bg-green-100', 'text-green-700', 'border-green-300', 'bg-yellow-100', 'text-yellow-700', 'border-yellow-300');
            feedback.classList.add('opacity-0');
            feedback.textContent = '';
            
            // Focus on tens answer logically, or let user decide
            inAnsTens.focus();
        }

        function checkAnswer() {
            const h = inAnsHundreds.value || '0';
            const t = inAnsTens.value || '0';
            const o = inAnsOnes.value || '0';
            
            // Handle completely empty input
            if (inAnsHundreds.value === '' && inAnsTens.value === '' && inAnsOnes.value === '') {
                showFeedback("Please enter an answer first.", "bg-gray-100 text-gray-700 border border-gray-300");
                return;
            }

            const userAns = parseInt(h + t + o);

            const expectedAns = currentOp === '+' ? currentNum1 + currentNum2 : currentNum1 - currentNum2;

            // Validate the math answer first
            if (userAns !== expectedAns) {
                showFeedback("Incorrect answer. Double check your math!", "bg-red-100 text-red-700 border border-red-300");
                return;
            }

            // If Answer is correct, validate Regrouping
            const rT = inRegroupTens.value.trim();
            const rO = inRegroupOnes.value.trim();
            let regroupCorrect = true;

            const ones1 = currentNum1 % 10;
            const ones2 = currentNum2 % 10;
            const tens1 = Math.floor(currentNum1 / 10);

            if (currentOp === '+') {
                const carries = (ones1 + ones2) >= 10;
                if (carries && rT !== '1') regroupCorrect = false;
                if (!carries && rT !== '' && rT !== '0') regroupCorrect = false;
                if (rO !== '') regroupCorrect = false; // Never regroup ones in addition
            } else {
                // Subtraction
                const borrows = ones1 < ones2;
                if (borrows) {
                    if (rT !== (tens1 - 1).toString()) regroupCorrect = false;
                    if (rO !== (ones1 + 10).toString()) regroupCorrect = false;
                } else {
                    if (rT !== '' || rO !== '') regroupCorrect = false;
                }
            }

            if (regroupCorrect) {
                showFeedback("🌟 Perfect! Great job adding/subtracting and regrouping!", "bg-green-100 text-green-700 border border-green-300");
            } else {
                showFeedback("Answer is correct! But check your regrouping arrows above.", "bg-yellow-100 text-yellow-700 border border-yellow-300");
            }
        }

        function showFeedback(msg, classes) {
            feedback.textContent = msg;
            // Clear previous state classes to ensure the new ones apply cleanly
            feedback.className = `mt-6 text-center text-lg font-semibold min-h-[3rem] px-4 py-2 rounded w-full transition-opacity duration-300 ${classes}`;
            
            // Force reflow to restart transition if it was already visible
            void feedback.offsetWidth;
            
            feedback.classList.remove('opacity-0');
            feedback.classList.add('opacity-100');
        }

        // Start app
        init();
    </script>
</body>
</html>
