<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Force Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            cursor: none; 
        }
        canvas {
            display: block;
            touch-action: none;
        }
        #ui-layer {
            pointer-events: none;
        }
        #ui-layer * {
            pointer-events: auto;
        }
        #custom-hand {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            width: 64px;
            height: 64px;
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease-out;
            font-size: 56px;
            user-select: none;
            filter: drop-shadow(0px 8px 10px rgba(0,0,0,0.6));
        }
    </style>
</head>
<body class="flex flex-col h-screen">

    <!-- Custom Hand Cursor -->
    <div id="custom-hand">
        <!-- Open Hand (Realistic Emoji) -->
        <div id="hand-open-svg" class="w-full h-full absolute transition-opacity duration-150 flex items-center justify-center">
            🖐🏽
        </div>
        <!-- Grab Hand (Realistic Emoji) -->
        <div id="hand-closed-svg" class="w-full h-full absolute transition-opacity duration-150 opacity-0 flex items-center justify-center">
            ✊🏽
        </div>
    </div>

    <!-- UI Overlay -->
    <div id="ui-layer" class="absolute inset-0 z-10 flex flex-col justify-between p-6">
        <div class="bg-white/10 backdrop-blur-md p-4 rounded-xl border border-white/20 w-80 shadow-2xl">
            <h1 class="text-white text-xl font-bold mb-2">Force Simulation</h1>
            <p class="text-slate-300 text-sm mb-4">Observe how the Support Force (Green) counteracts Gravity when an object is held or placed on the table.</p>
            
            <div class="space-y-4">
                <div>
                    <div class="flex justify-between text-white text-xs mb-1">
                        <span>Gravity (g)</span>
                        <span id="g-val" class="font-mono">9.8</span>
                    </div>
                    <input type="range" id="gravity-slider" min="0" max="25" step="0.1" value="9.8" class="w-full h-1 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-blue-500">
                </div>
                <div class="flex gap-2">
                    <button id="add-small" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white py-2 rounded-lg text-xs font-bold transition-all active:scale-95">Add 1kg</button>
                    <button id="add-large" class="flex-1 bg-purple-600 hover:bg-purple-500 text-white py-2 rounded-lg text-xs font-bold transition-all active:scale-95">Add 5kg</button>
                </div>
                <button id="slow-mo-btn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-2 rounded-lg text-xs font-bold transition-all active:scale-95">Toggle Slow Motion: OFF</button>
                <button id="reset-btn" class="w-full border border-slate-500 text-slate-300 py-2 rounded-lg text-xs hover:bg-slate-800 transition">Clear Scene</button>
            </div>
        </div>

        <div class="bg-slate-900/80 backdrop-blur-sm p-4 rounded-xl self-center text-white text-xs border border-white/10 flex gap-6">
            <div class="flex items-center gap-2"><div class="w-4 h-1 bg-red-500 rounded"></div> Gravity</div>
            <div class="flex items-center gap-2"><div class="w-4 h-1 bg-green-500 rounded"></div> Support (Normal)</div>
            <div class="flex items-center gap-2"><div class="w-4 h-1 bg-yellow-400 rounded"></div> Applied Force</div>
        </div>
    </div>

    <canvas id="physicsCanvas"></canvas>

    <script>
        const canvas = document.getElementById('physicsCanvas');
        const ctx = canvas.getContext('2d');
        const gSlider = document.getElementById('gravity-slider');
        const gValDisplay = document.getElementById('g-val');
        const hand = document.getElementById('custom-hand');
        const handOpen = document.getElementById('hand-open-svg');
        const handClosed = document.getElementById('hand-closed-svg');
        
        let width, height;
        let objects = [];
        let gravityVal = 9.8;
        let pixelGravity = 0.5; 
        const friction = 0.98;
        let groundY;

        const table = {
            x: 0,
            y: 0,
            w: 350,
            h: 20,
            legH: 150
        };
        
        let isDragging = false;
        let dragTarget = null;
        let mouseX = 0;
        let mouseY = 0;
        let lastMouseX = 0;
        let lastMouseY = 0;
        let mouseHistory = [];
        let timeScale = 1.0;
        let isSlowMo = false;

        const COLORS = {
            gravity: '#ff4d4d',
            normal: '#4ade80',
            applied: '#fde047',
            boxLight: '#64748b',
            boxDark: '#334155',
            boxStroke: '#e2e8f0',
            table: '#475569'
        };

        class PhysicsBox {
            constructor(x, y, mass, size) {
                this.x = x;
                this.y = y;
                this.mass = mass;
                this.size = size;
                this.vx = 0;
                this.vy = 0;
                this.isHeld = false;
                this.onSurface = false;
                
                this.fg = 0; 
                this.fn = 0; 
                this.fa = { x: 0, y: 0 }; 
                this.displayFa = { x: 0, y: 0 }; 
            }

            update() {
                const prevVx = this.vx;
                const prevVy = this.vy;

                if (this.isHeld) {
                    this.vx = (mouseX - this.x);
                    this.vy = (mouseY - this.y);
                    this.x = mouseX;
                    this.y = mouseY;
                    this.onSurface = false;
                } else {
                    this.vy += pixelGravity * (this.mass * 0.2) * timeScale;
                    this.x += this.vx * timeScale;
                    this.y += this.vy * timeScale;

                    // Table Collision
                    if (this.x + this.size/2 > table.x && this.x - this.size/2 < table.x + table.w) {
                        if (this.y + this.size/2 > table.y && this.y + this.size/2 < table.y + table.h + 10 && this.vy >= 0) {
                            this.y = table.y - this.size/2;
                            this.vy *= -0.2;
                            this.vx *= friction;
                            this.onSurface = true;
                        } else {
                            this.onSurface = false;
                        }
                    } else {
                        this.onSurface = false;
                    }

                    // Ground Collision
                    if (!this.onSurface && this.y + this.size/2 > groundY) {
                        this.y = groundY - this.size/2;
                        this.vy *= -0.3;
                        this.vx *= friction;
                        this.onSurface = true;
                    }

                    // Wall Collisions
                    if (this.x - this.size/2 < 0) {
                        this.x = this.size/2;
                        this.vx *= -0.5;
                    } else if (this.x + this.size/2 > width) {
                        this.x = width - this.size/2;
                        this.vx *= -0.5;
                    }
                } // This brace was previously missing!

                // Force Calculations (Scaled up slightly to ensure 1kg is visible)
                this.fg = this.mass * pixelGravity * 60;
                
                // Normal Force (Support)
                if (this.onSurface || this.isHeld) {
                    this.fn = this.fg;
                    if (this.onSurface && prevVy > 1) this.fn += prevVy * this.mass * 4;
                } else {
                    this.fn = 0;
                }

                // Applied Force (Net acceleration beyond simple support)
                if (this.isHeld) {
                    this.fa.x = (mouseX - lastMouseX) * this.mass * 15;
                    this.fa.y = (mouseY - lastMouseY) * this.mass * 15;
                    
                    // Smooth approach for persistence
                    this.displayFa.x += (this.fa.x - this.displayFa.x) * 0.15;
                    this.displayFa.y += (this.fa.y - this.displayFa.y) * 0.15;
                } else {
                    this.fa.x = 0;
                    this.fa.y = 0;
                    
                    // Decay smoothly
                    this.displayFa.x *= 0.85;
                    this.displayFa.y *= 0.85;
                }
            }

            draw() {
                // 1. Draw Box First (so arrows appear ON TOP)
                ctx.save();
                ctx.translate(this.x, this.y);
                
                // Shadow
                ctx.shadowColor = 'rgba(0, 0, 0, 0.6)';
                ctx.shadowBlur = 15;
                ctx.shadowOffsetY = 6;

                // Gradient Box
                const grad = ctx.createLinearGradient(-this.size/2, -this.size/2, this.size/2, this.size/2);
                grad.addColorStop(0, COLORS.boxLight);
                grad.addColorStop(1, COLORS.boxDark);

                ctx.fillStyle = grad;
                ctx.strokeStyle = COLORS.boxStroke;
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.roundRect(-this.size/2, -this.size/2, this.size, this.size, 16);
                ctx.fill();
                
                // Turn off shadow for inner details
                ctx.shadowColor = 'transparent'; 
                ctx.stroke();

                // Inner glowing accent
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.roundRect(-this.size/2 + 6, -this.size/2 + 6, this.size - 12, this.size - 12, 10);
                ctx.stroke();

                // Text
                ctx.fillStyle = "#ffffff";
                ctx.shadowColor = 'rgba(0,0,0,0.8)';
                ctx.shadowBlur = 4;
                ctx.font = `bold ${Math.max(14, this.size/3.5)}px Inter, sans-serif`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(`${this.mass}kg`, 0, 0);
                ctx.restore();

                // 2. Draw Forces ON TOP of the box
                // Support Force (Hand or Surface)
                if (this.fn > 0) {
                    this.drawVector(0, 0, 0, -this.fn, COLORS.normal);
                }

                // Gravity (Down)
                this.drawVector(0, 0, 0, this.fg, COLORS.gravity);

                // Applied Force (Acceleration) - Using persistent display vector
                if (this.isHeld || Math.abs(this.displayFa.x) > 3 || Math.abs(this.displayFa.y) > 3) {
                    this.drawVector(0, 0, this.displayFa.x, this.displayFa.y, COLORS.applied);
                }
            }

            drawVector(ox, oy, dx, dy, color) {
                const mag = Math.sqrt(dx*dx + dy*dy);
                if (mag < 3) return;

                const headlen = 16 + Math.min(mag * 0.05, 8); // Slightly dynamic head size based on length
                const tox = this.x + ox + dx;
                const toy = this.y + oy + dy;
                const fromx = this.x + ox;
                const fromy = this.y + oy;

                ctx.save();
                ctx.strokeStyle = color;
                ctx.fillStyle = color;
                ctx.lineWidth = 6;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                // Glow effect
                ctx.shadowColor = color;
                ctx.shadowBlur = 15;

                const angle = Math.atan2(toy - fromy, tox - fromx);

                // Origin Dot (with high contrast outline so it pops on the box)
                ctx.beginPath();
                ctx.arc(fromx, fromy, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#ffffff';
                ctx.stroke();

                // Arrow Shaft
                ctx.strokeStyle = color; // Restore stroke color
                ctx.beginPath();
                ctx.moveTo(fromx, fromy);
                ctx.lineTo(tox - headlen * 0.5 * Math.cos(angle), toy - headlen * 0.5 * Math.sin(angle));
                ctx.stroke();

                // Sleek Dart-Style Arrow Head
                ctx.beginPath();
                ctx.moveTo(tox, toy); // tip
                ctx.lineTo(tox - headlen * Math.cos(angle - Math.PI / 7), toy - headlen * Math.sin(angle - Math.PI / 7)); // right wing
                ctx.lineTo(tox - (headlen * 0.6) * Math.cos(angle), toy - (headlen * 0.6) * Math.sin(angle)); // indented base
                ctx.lineTo(tox - headlen * Math.cos(angle + Math.PI / 7), toy - headlen * Math.sin(angle + Math.PI / 7)); // left wing
                ctx.closePath();
                ctx.fill();
                
                ctx.restore();
            }
        }

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            groundY = height - 100;
            table.x = width / 2 - table.w / 2;
            table.y = groundY - table.legH;
        }

        function drawTable() {
            ctx.save();
            
            // Legs with gradient & shadow
            const legGrad = ctx.createLinearGradient(0, table.y, 0, table.y + table.legH);
            legGrad.addColorStop(0, '#334155');
            legGrad.addColorStop(1, '#0f172a');
            ctx.fillStyle = legGrad;
            
            ctx.shadowColor = 'rgba(0,0,0,0.6)';
            ctx.shadowBlur = 8;
            ctx.shadowOffsetX = 4;
            
            ctx.fillRect(table.x + 30, table.y, 20, table.legH);
            ctx.fillRect(table.x + table.w - 50, table.y, 20, table.legH);
            
            // Top with gradient
            const topGrad = ctx.createLinearGradient(table.x, table.y, table.x, table.y + table.h);
            topGrad.addColorStop(0, '#94a3b8');
            topGrad.addColorStop(0.3, '#64748b');
            topGrad.addColorStop(1, '#334155');
            
            ctx.fillStyle = topGrad;
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 12;
            ctx.shadowOffsetY = 6;
            ctx.shadowOffsetX = 0;
            
            ctx.beginPath();
            ctx.roundRect(table.x, table.y, table.w, table.h, 6);
            ctx.fill();

            // Highlight reflection
            ctx.shadowColor = 'transparent';
            ctx.fillStyle = 'rgba(255,255,255,0.1)';
            ctx.beginPath();
            ctx.roundRect(table.x + 2, table.y + 2, table.w - 4, table.h/3, 4);
            ctx.fill();

            ctx.restore();
        }

        function animate() {
            hand.style.left = `${mouseX}px`;
            hand.style.top = `${mouseY}px`;

            ctx.clearRect(0, 0, width, height);

            // Rich Radial Background
            const bgGrad = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, width*0.8);
            bgGrad.addColorStop(0, '#1e293b');
            bgGrad.addColorStop(1, '#020617');
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, width, height);

            // Subtle Background Grid
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.04)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            const gridSize = 60;
            for(let x=0; x<width; x+=gridSize) { ctx.moveTo(x, 0); ctx.lineTo(x, height); }
            for(let y=0; y<height; y+=gridSize) { ctx.moveTo(0, y); ctx.lineTo(width, y); }
            ctx.stroke();

            // Ground Floor
            const gradient = ctx.createLinearGradient(0, groundY, 0, height);
            gradient.addColorStop(0, '#1e293b');
            gradient.addColorStop(1, '#09090b');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, groundY, width, height - groundY);
            
            // Ground glowing edge
            ctx.strokeStyle = '#475569';
            ctx.lineWidth = 4;
            ctx.shadowColor = '#000';
            ctx.shadowBlur = 10;
            ctx.shadowOffsetY = 2;
            ctx.beginPath();
            ctx.moveTo(0, groundY);
            ctx.lineTo(width, groundY);
            ctx.stroke();
            ctx.shadowColor = 'transparent';

            drawTable();

            objects.forEach(obj => {
                obj.update();
                obj.draw();
            });

            // Track mouse history for accurate tossing
            mouseHistory.push({ x: mouseX, y: mouseY });
            if (mouseHistory.length > 6) mouseHistory.shift();

            lastMouseX = mouseX;
            lastMouseY = mouseY;
            requestAnimationFrame(animate);
        }

        // --- Controls & Events ---

        gSlider.addEventListener('input', (e) => {
            gravityVal = parseFloat(e.target.value);
            pixelGravity = gravityVal / 20; 
            gValDisplay.innerText = gravityVal.toFixed(1);
        });

        document.getElementById('add-small').onclick = () => {
            objects.push(new PhysicsBox(Math.random() * (width - 100) + 50, 50, 1, 45));
        };

        document.getElementById('add-large').onclick = () => {
            objects.push(new PhysicsBox(Math.random() * (width - 100) + 50, 50, 5, 90));
        };

        document.getElementById('reset-btn').onclick = () => {
            objects = [];
        };

        const slowMoBtn = document.getElementById('slow-mo-btn');
        slowMoBtn.onclick = () => {
            isSlowMo = !isSlowMo;
            timeScale = isSlowMo ? 0.2 : 1.0;
            slowMoBtn.innerText = `Toggle Slow Motion: ${isSlowMo ? 'ON' : 'OFF'}`;
            slowMoBtn.className = isSlowMo 
                ? "w-full bg-red-600 hover:bg-red-500 text-white py-2 rounded-lg text-xs font-bold transition-all active:scale-95 shadow-[0_0_15px_rgba(220,38,38,0.5)]" 
                : "w-full bg-emerald-600 hover:bg-emerald-500 text-white py-2 rounded-lg text-xs font-bold transition-all active:scale-95";
        };

        function updateMousePos(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            mouseX = clientX - rect.left;
            mouseY = clientY - rect.top;
        }

        function handleStart(e) {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            updateMousePos(clientX, clientY);
            
            for (let i = objects.length - 1; i >= 0; i--) {
                const obj = objects[i];
                if (mouseX > obj.x - obj.size/2 && mouseX < obj.x + obj.size/2 &&
                    mouseY > obj.y - obj.size/2 && mouseY < obj.y + obj.size/2) {
                    isDragging = true;
                    dragTarget = obj;
                    obj.isHeld = true;
                    
                    // Switch to grabbing hand SVG
                    handOpen.style.opacity = '0';
                    handClosed.style.opacity = '1';
                    hand.style.transform = "translate(-50%, -50%) scale(0.9)";
                    
                    objects.splice(i, 1);
                    objects.push(obj);
                    break;
                }
            }
        }

        function handleMove(e) {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            updateMousePos(clientX, clientY);

            if (!isDragging) {
                let hovering = false;
                for (const obj of objects) {
                    if (mouseX > obj.x - obj.size/2 && mouseX < obj.x + obj.size/2 &&
                        mouseY > obj.y - obj.size/2 && mouseY < obj.y + obj.size/2) {
                        hovering = true;
                        break;
                    }
                }
                // Just scale up nicely when hovering
                hand.style.transform = hovering ? "translate(-50%, -50%) scale(1.15)" : "translate(-50%, -50%) scale(1)";
            }
        }

        function handleEnd() {
            if (dragTarget) {
                dragTarget.isHeld = false;
                
                // Calculate toss velocity from recent cursor history
                if (mouseHistory.length > 2) {
                    const oldest = mouseHistory[0];
                    const newest = mouseHistory[mouseHistory.length - 1];
                    const dx = newest.x - oldest.x;
                    const dy = newest.y - oldest.y;
                    
                    // Multiply for a satisfying toss, scale inversely by timeScale to throw properly in slow-mo
                    dragTarget.vx = (dx * 0.35) / timeScale; 
                    dragTarget.vy = (dy * 0.35) / timeScale;
                } else {
                    dragTarget.vx = 0;
                    dragTarget.vy = 0;
                }
            }
            isDragging = false;
            dragTarget = null;
            
            // Switch back to open hand SVG
            handOpen.style.opacity = '1';
            handClosed.style.opacity = '0';
            hand.style.transform = "translate(-50%, -50%) scale(1)";
        }

        window.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);
        window.addEventListener('touchstart', handleStart, {passive: false});
        window.addEventListener('touchmove', (e) => { e.preventDefault(); handleMove(e); }, {passive: false});
        window.addEventListener('touchend', handleEnd);

        window.onload = () => { resize(); animate(); };
        window.onresize = resize;
    </script>
</body>
</html>
