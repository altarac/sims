<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Digital Scale Simulator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #f0f4f8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-container {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 40px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
            text-align: center;
            pointer-events: none;
            min-width: 250px;
            border: 2px solid #cbd5e1;
            z-index: 10;
        }
        #mass-display {
            font-size: 3.5rem;
            font-weight: bold;
            color: #1e293b;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            line-height: 1;
            letter-spacing: -2px;
        }
        .unit {
            font-size: 1.5rem;
            color: #64748b;
            margin-left: 8px;
            letter-spacing: normal;
        }
        #instructions {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 12px;
            color: #334155;
            pointer-events: none;
            max-width: 320px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            border: 1px solid #e2e8f0;
            z-index: 10;
        }
        h1 { margin-top: 0; font-size: 1.4rem; color: #0f172a; margin-bottom: 8px;}
        p { margin-bottom: 0; font-size: 0.95rem; line-height: 1.4;}
        
        #calibration-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(240, 244, 248, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            font-size: 1.8rem;
            color: #475569;
            font-weight: 600;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>
    <div id="calibration-overlay">Calibrating Scale...</div>
    
    <div id="instructions">
        <h1>2D Digital Scale</h1>
        <p>Drag and drop the objects (mitten, pencil, tennis ball, water bottle) onto the scale pan to measure their mass.</p>
    </div>

    <div id="ui-container">
        <div id="mass-display">0.0<span class="unit">g</span></div>
    </div>

    <div id="canvas-container"></div>

    <script>
        // Module aliases
        const Engine = Matter.Engine,
              Render = Matter.Render,
              Runner = Matter.Runner,
              Bodies = Matter.Bodies,
              Body = Matter.Body,
              Composite = Matter.Composite,
              Constraint = Matter.Constraint,
              Mouse = Matter.Mouse,
              MouseConstraint = Matter.MouseConstraint,
              Events = Matter.Events,
              Vertices = Matter.Vertices;

        let engine, render, runner;
        
        // Scale physics elements
        let scalePan, scaleBase, scaleSpring;
        let restingPanHeight = 0;
        let isCalibrated = false;
        let calibrationTicks = 0;
        let currentDisplayedMass = 0;
        
        // Scene dimensions
        let width = window.innerWidth;
        let height = window.innerHeight;

        // --- NEW: Add globals for UI snapping logic ---
        let mouseConstraint = null;
        let knownObjects = [];

        function init() {
            engine = Engine.create();
            // Increase positional iterations for more stable stacking
            engine.positionIterations = 8;
            engine.velocityIterations = 8;

            render = Render.create({
                element: document.getElementById('canvas-container'),
                engine: engine,
                options: {
                    width: width,
                    height: height,
                    wireframes: false, // Turn off wireframes to see colors
                    background: 'transparent',
                    pixelRatio: window.devicePixelRatio // Sharp rendering on retina displays
                }
            });

            createEnvironment();
            createScale();
            createObjects();
            setupInteractions();

            Render.run(render);
            
            // Create runner
            runner = Runner.create();
            Runner.run(runner, engine);

            // Hook into the engine update loop for scale logic
            Events.on(engine, 'beforeUpdate', handlePhysicsStep);

            window.addEventListener('resize', onWindowResize);
        }

        function createEnvironment() {
            const wallThickness = 100;
            
            // Visual desk/floor
            const ground = Bodies.rectangle(width / 2, height - 20, width, 40, { 
                isStatic: true,
                render: { fillStyle: '#94a3b8' },
                friction: 0.8
            });

            // Invisible walls to keep objects from falling off screen
            const leftWall = Bodies.rectangle(0 - wallThickness/2, height/2, wallThickness, height * 2, { isStatic: true });
            const rightWall = Bodies.rectangle(width + wallThickness/2, height/2, wallThickness, height * 2, { isStatic: true });
            const ceiling = Bodies.rectangle(width/2, -wallThickness*2, width * 2, wallThickness, { isStatic: true });

            Composite.add(engine.world, [ground, leftWall, rightWall, ceiling]);
        }

        function createScale() {
            const scaleX = width / 2;
            const scaleY = height - 120; // Positioned near bottom

            // Scale Base (Static) - Made narrower than the pan so objects fall off completely instead of getting stuck on the edge
            scaleBase = Bodies.rectangle(scaleX, scaleY + 40, 180, 80, { 
                isStatic: true,
                render: { fillStyle: '#1e293b' }, // Dark navy
                chamfer: { radius: 10 } // Rounded corners
            });

            // Scale Pan (Dynamic)
            // Make it heavy so it's stable, but we subtract this baseline weight during calibration
            scalePan = Bodies.rectangle(scaleX, scaleY - 30, 220, 16, { 
                mass: 5,
                friction: 0.8, // High friction so objects don't slide off easily
                frictionAir: 0.05, // Add slight air friction to kill micro-vibrations
                render: { fillStyle: '#e2e8f0' }, // Silver
                chamfer: { radius: 4 }
            });

            // Lock the pan's rotation completely so it stays perfectly horizontal
            Body.setInertia(scalePan, Infinity);

            // Spring connecting Pan to Base
            scaleSpring = Constraint.create({
                bodyA: scalePan,
                bodyB: scaleBase,
                pointA: { x: 0, y: 0 },
                pointB: { x: 0, y: -40 },
                stiffness: 0.2,  // Increased stiffness
                damping: 0.5,    // Much higher damping to stop bounces quickly
                length: 50,
                render: { visible: false } // Hide the spring line
            });
            
            // Decorative support columns (just visual, attached to base)
            const strut1 = Bodies.rectangle(scaleX - 60, scaleY - 5, 10, 40, { isStatic: true, render: { fillStyle: '#64748b' }});
            const strut2 = Bodies.rectangle(scaleX + 60, scaleY - 5, 10, 40, { isStatic: true, render: { fillStyle: '#64748b' }});
            // Disable collisions for struts so the pan can move down through them
            strut1.collisionFilter = { mask: 0 };
            strut2.collisionFilter = { mask: 0 };

            Composite.add(engine.world, [scaleBase, strut1, strut2, scalePan, scaleSpring]);
        }

        function createObjects() {
            
            // --- 1. The Pencil ---
            // Built from 3 parts: Lead/wood tip, Yellow body, Pink eraser
            const pX = width * 0.2;
            const pY = height - 200;
            
            // Use Vertices to make a triangle for the tip
            const tipVertices = Vertices.fromPath('0 0, 15 5, 15 -5');
            const pTip = Bodies.fromVertices(pX - 57, pY, [tipVertices], { render: { fillStyle: '#d4a373' }});
            const pBody = Bodies.rectangle(pX, pY, 100, 10, { render: { fillStyle: '#fbbf24' }}); // Yellow
            const pEraser = Bodies.rectangle(pX + 55, pY, 10, 10, { render: { fillStyle: '#f472b6' }}); // Pink

            // Combine parts into one compound body
            const pencil = Body.create({
                parts: [pTip, pBody, pEraser],
                friction: 0.3
            });
            // Force the exact mass (Matter.js recalculates and overrides options.mass for composites)
            Body.setMass(pencil, 0.0155);
            // Rotate it slightly for visual flair
            Body.setAngle(pencil, -Math.PI / 6);


            // --- 2. The Mitten ---
            // Built from 2 parts: Hand area and Thumb
            const mX = width * 0.8;
            const mY = height - 300;
            
            const hand = Bodies.rectangle(mX, mY, 60, 90, { render: { fillStyle: '#ef4444' }, chamfer: { radius: 20 }});
            const thumb = Bodies.rectangle(mX - 35, mY + 10, 35, 45, { render: { fillStyle: '#ef4444' }, chamfer: { radius: 15 }});
            const cuff = Bodies.rectangle(mX, mY + 45, 70, 20, { render: { fillStyle: '#3b82f6' }, chamfer: { radius: 5 }});
            
            // Angle the thumb
            Body.setAngle(thumb, Math.PI / 4);

            const mitten = Body.create({
                parts: [hand, thumb, cuff],
                friction: 0.9,
                restitution: 0.1 // Squishy
            });
            Body.setMass(mitten, 0.0304);


            // --- 3. Tennis Ball ---
            const tX = width * 0.35;
            const tY = height - 150;
            const tennisBall = Bodies.circle(tX, tY, 22, { 
                friction: 0.5,
                restitution: 0.8, // Very bouncy
                render: { fillStyle: '#d9f95d' } // Optic yellow
            });
            Body.setMass(tennisBall, 0.0549);
            
            // --- 4. Water Bottle ---
            const bX = width * 0.65;
            const bY = height - 150;
            
            // Composed of a plastic body, a white label, and a cap
            const bottleBody = Bodies.rectangle(bX, bY, 40, 110, { render: { fillStyle: '#38bdf8' }, chamfer: { radius: 8 }});
            const bottleLabel = Bodies.rectangle(bX, bY, 42, 35, { render: { fillStyle: '#ffffff' }});
            const bottleCap = Bodies.rectangle(bX, bY - 55, 16, 14, { render: { fillStyle: '#f8fafc' }, chamfer: { radius: 3 }});
            
            const waterBottle = Body.create({
                parts: [bottleBody, bottleLabel, bottleCap],
                friction: 0.6,
                restitution: 0.2
            });
            Body.setMass(waterBottle, 0.2501);

            // Register objects to accurately snap the UI to their combined exact value
            knownObjects = [
                { body: pencil, exactMass: 15.5 },
                { body: mitten, exactMass: 30.4 },
                { body: tennisBall, exactMass: 54.9 },
                { body: waterBottle, exactMass: 250.1 }
            ];

            Composite.add(engine.world, [pencil, mitten, tennisBall, waterBottle]);
        }

        function setupInteractions() {
            const mouse = Mouse.create(render.canvas);
            mouseConstraint = MouseConstraint.create(engine, {
                mouse: mouse,
                constraint: {
                    stiffness: 0.2, // Looser stiffness feels more like dragging heavy objects
                    render: { visible: false }
                }
            });

            Composite.add(engine.world, mouseConstraint);
            
            // Keep the mouse in sync with rendering
            render.mouse = mouse;
        }

        function handlePhysicsStep() {
            
            // 1. Constrain pan to only move vertically (act like it's on rails)
            const scaleX = width / 2;
            Body.setPosition(scalePan, { x: scaleX, y: scalePan.position.y });
            Body.setVelocity(scalePan, { x: 0, y: scalePan.velocity.y });
            Body.setAngularVelocity(scalePan, 0); // Double ensure no spinning

            // 2. Calibration Phase (wait for engine to settle, then save resting height)
            if (!isCalibrated) {
                calibrationTicks++;
                // Relaxed the velocity threshold and added a strict timeout (250 ticks) so it guarantees completion
                if ((calibrationTicks > 100 && Math.abs(scalePan.velocity.y) < 0.1) || calibrationTicks > 250) {
                    restingPanHeight = scalePan.position.y;
                    isCalibrated = true;
                    // Hide loading overlay
                    const overlay = document.getElementById('calibration-overlay');
                    if (overlay) {
                        overlay.style.opacity = '0';
                        setTimeout(() => overlay.style.display = 'none', 500);
                    }
                }
                return; // Skip mass calculations until calibrated
            }

            // 3. Mass Calculation (Deterministic approach instead of Hooke's Law)
            let exactRestingMass = 0;
            // Widen the detection zone slightly to account for object overhangs
            const panLeft = scaleBase.position.x - 130; 
            const panRight = scaleBase.position.x + 130;

            for (let obj of knownObjects) {
                // Safely check if any part of this object is currently being held by the user
                let isGrabbed = false;
                if (mouseConstraint && mouseConstraint.body) {
                    if (obj.body === mouseConstraint.body || (obj.body.parts && obj.body.parts.includes(mouseConstraint.body))) {
                        isGrabbed = true;
                    }
                }
                
                // Check if the object is horizontally over the pan and vertically resting above the base
                if (!isGrabbed && 
                    obj.body.position.x > panLeft && 
                    obj.body.position.x < panRight && 
                    obj.body.position.y < scaleBase.position.y + 20) {
                    
                    exactRestingMass += obj.exactMass;
                }
            }

            // Smoothly ease towards the EXACT target mass (ignores physics noise)
            currentDisplayedMass += (exactRestingMass - currentDisplayedMass) * 0.15;

            // 4. Update UI Readout
            const displayElem = document.getElementById('mass-display');
            let panSpeed = Math.abs(scalePan.velocity.y);
            
            // Snap firmly to the exact decimal when heavy bouncing has stopped and we are close
            if (panSpeed < 0.5 && Math.abs(currentDisplayedMass - exactRestingMass) < 5.0) {
                currentDisplayedMass = exactRestingMass; // Lock internal state
                displayElem.innerHTML = exactRestingMass.toFixed(1) + '<span class="unit">g</span>';
            } else {
                // Keep visually updating while it settles, adding temporary jitter based on velocity impact
                let jitter = (scalePan.velocity.y * 30);
                let visualMass = Math.max(0, currentDisplayedMass + jitter);
                displayElem.innerHTML = visualMass.toFixed(1) + '<span class="unit">g</span>';
            }
        }

        function onWindowResize() {
            width = window.innerWidth;
            height = window.innerHeight;
            
            render.canvas.width = width;
            render.canvas.height = height;
            
            // To properly handle resizing, we'd theoretically need to reposition all bodies
            // (walls, ground, scale base). For this simulation, simply reloading is cleanest 
            // to reset the physical layout perfectly to the new aspect ratio.
            // Alternatively, just let it crop on minor resizes to avoid interrupting the user.
        }

        // Start simulation
        window.onload = init;

    </script>
</body>
</html>
