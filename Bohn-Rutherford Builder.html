<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bohr-Rutherford Simulator</title>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Icon Components (Replaced lucide-react imports) ---
        const RefreshCw = ({ size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        );
        const CheckCircle = ({ size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/></svg>
        );
        const Info = ({ size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
        );
        const Trash2 = ({ size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
        );
        const Plus = ({ size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        );
        const Minus = ({ size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
        );

        // --- App Data ---
        const ELEMENTS = [
            { z: 1, symbol: 'H', name: 'Hydrogen' },
            { z: 2, symbol: 'He', name: 'Helium' },
            { z: 3, symbol: 'Li', name: 'Lithium' },
            { z: 4, symbol: 'Be', name: 'Beryllium' },
            { z: 5, symbol: 'B', name: 'Boron' },
            { z: 6, symbol: 'C', name: 'Carbon' },
            { z: 7, symbol: 'N', name: 'Nitrogen' },
            { z: 8, symbol: 'O', name: 'Oxygen' },
            { z: 9, symbol: 'F', name: 'Fluorine' },
            { z: 10, symbol: 'Ne', name: 'Neon' },
            { z: 11, symbol: 'Na', name: 'Sodium' },
            { z: 12, symbol: 'Mg', name: 'Magnesium' },
            { z: 13, symbol: 'Al', name: 'Aluminum' },
            { z: 14, symbol: 'Si', name: 'Silicon' },
            { z: 15, symbol: 'P', name: 'Phosphorus' },
            { z: 16, symbol: 'S', name: 'Sulfur' },
            { z: 17, symbol: 'Cl', name: 'Chlorine' },
            { z: 18, symbol: 'Ar', name: 'Argon' },
            { z: 19, symbol: 'K', name: 'Potassium' },
            { z: 20, symbol: 'Ca', name: 'Calcium' }
        ];

        // --- Main Component ---
        function App() {
            const [targetElement, setTargetElement] = useState(ELEMENTS[5]); // Default to Carbon
            const [protons, setProtons] = useState(0);
            const [shells, setShells] = useState([0]);
            
            const [dragState, setDragState] = useState(null); // { type, source, x, y }
            const [activeZone, setActiveZone] = useState(null);
            const [feedback, setFeedback] = useState(null);
            
            const svgRef = useRef(null);
            const dragStateRef = useRef(null);
            const downInfoRef = useRef(null);

            // Keep ref in sync with state for window event listeners
            useEffect(() => {
                dragStateRef.current = dragState;
            }, [dragState]);

            const pickRandomElement = () => {
                let next = ELEMENTS[Math.floor(Math.random() * 20)];
                while (next.z === targetElement.z) {
                next = ELEMENTS[Math.floor(Math.random() * 20)];
                }
                setTargetElement(next);
                resetAtom();
            };

            const resetAtom = () => {
                setProtons(0);
                setShells([0]);
                setFeedback(null);
            };

            const checkAtom = () => {
                const Z = targetElement.z;
                let isCorrect = true;
                let msg = "";

                if (protons !== Z) {
                isCorrect = false;
                msg = `Incorrect number of protons. ${targetElement.name} has atomic number ${Z}, so it needs exactly ${Z} protons.`;
                } else {
                let expected = [0, 0, 0, 0];
                let remainingE = Z;
                expected[0] = Math.min(remainingE, 2); remainingE -= expected[0];
                expected[1] = Math.min(remainingE, 8); remainingE -= expected[1];
                expected[2] = Math.min(remainingE, 8); remainingE -= expected[2];
                expected[3] = Math.min(remainingE, 2); remainingE -= expected[3];

                // Remove trailing zeros
                while(expected.length > 1 && expected[expected.length - 1] === 0) {
                    expected.pop();
                }

                if (shells.length < expected.length) {
                    isCorrect = false;
                    msg = `You don't have enough shells! ${targetElement.name} requires ${expected.length} shells.`;
                } else if (shells.length > expected.length) {
                    let hasElectronsInExtra = false;
                    for(let i = expected.length; i < shells.length; i++) {
                    if (shells[i] > 0) hasElectronsInExtra = true;
                    }
                    if (hasElectronsInExtra) {
                    isCorrect = false;
                    msg = `You placed electrons in shells that should be empty. Remember capacities are 2, 8, 8, 2.`;
                    } else {
                    isCorrect = false;
                    msg = `You have extra empty shells. Remove them using the '- Shell' button.`;
                    }
                } else {
                    for (let i = 0; i < expected.length; i++) {
                    if (shells[i] !== expected[i]) {
                        isCorrect = false;
                        msg = `Electrons are incorrect in Shell ${i + 1}. Expected ${expected[i]}, but you have ${shells[i]}.`;
                        break;
                    }
                    }
                }
                }

                if (isCorrect) {
                setFeedback({ status: 'success', message: `Fantastic! You correctly built a neutral ${targetElement.name} atom.` });
                } else {
                setFeedback({ status: 'error', message: msg });
                }
            };

            const handlePointerDown = (e, type, source) => {
                // Prevent default to stop scrolling on touch devices while dragging
                if (e.target.hasPointerCapture(e.pointerId)) {
                e.target.releasePointerCapture(e.pointerId);
                }
                
                downInfoRef.current = { time: Date.now(), x: e.clientX, y: e.clientY };
                
                setDragState({
                type,
                source,
                x: e.clientX,
                y: e.clientY
                });

                if (typeof source === 'number') {
                setShells(s => {
                    const newS = [...s];
                    newS[source] = Math.max(0, newS[source] - 1);
                    return newS;
                });
                }
                setFeedback(null);
            };

            useEffect(() => {
                const handlePointerMove = (e) => {
                const currentDrag = dragStateRef.current;
                if (!currentDrag) return;

                setDragState(prev => ({ ...prev, x: e.clientX, y: e.clientY }));

                if (svgRef.current) {
                    const rect = svgRef.current.getBoundingClientRect();
                    const cx = rect.left + rect.width / 2;
                    const cy = rect.top + rect.height / 2;
                    const distance = Math.sqrt(Math.pow(e.clientX - cx, 2) + Math.pow(e.clientY - cy, 2));

                    const scale = 500 / rect.width;
                    const svgDistance = distance * scale;

                    let zone = 'trash';
                    if (svgDistance > 40) {
                    for (let i = 0; i < shells.length; i++) {
                        if (svgDistance < 70 + i * 40 + 20) {
                        zone = i;
                        break;
                        }
                    }
                    }

                    setActiveZone(zone);
                }
                };

                const handlePointerUp = (e) => {
                const currentDrag = dragStateRef.current;
                if (!currentDrag) return;

                const dx = e.clientX - downInfoRef.current.x;
                const dy = e.clientY - downInfoRef.current.y;
                const isClick = Date.now() - downInfoRef.current.time < 250 && Math.sqrt(dx*dx + dy*dy) < 10;

                if (isClick && currentDrag.source !== 'bin') {
                    setDragState(null);
                    setActiveZone(null);
                    return;
                }

                const zone = activeZone;

                if (currentDrag.type === 'electron') {
                    if (typeof zone === 'number') {
                    setShells(s => {
                        const newS = [...s];
                        newS[zone] = Math.min(32, newS[zone] + 1);
                        return newS;
                    });
                    } else if (zone !== 'trash') {
                    if (typeof currentDrag.source === 'number') {
                        setShells(s => {
                        const newS = [...s];
                        newS[currentDrag.source] += 1;
                        return newS;
                        });
                    }
                    }
                }

                setDragState(null);
                setActiveZone(null);
                };

                window.addEventListener('pointermove', handlePointerMove);
                window.addEventListener('pointerup', handlePointerUp);
                return () => {
                window.removeEventListener('pointermove', handlePointerMove);
                window.removeEventListener('pointerup', handlePointerUp);
                };
            }, [activeZone]);

            return (
                <div className="min-h-screen bg-slate-900 text-slate-100 font-sans flex flex-col items-center py-8 px-4 overflow-hidden touch-none">
                
                <div className="max-w-4xl w-full">
                    <header className="text-center mb-8">
                    <h1 className="text-3xl md:text-4xl font-bold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
                        Bohr-Rutherford Builder
                    </h1>
                    <p className="text-slate-400 mt-2">Build the atom by dragging protons to the nucleus and electrons to the shells.</p>
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-4 gap-6">
                    
                    {/* Left Panel: Target Element & Bins */}
                    <div className="lg:col-span-1 flex flex-col gap-4">
                        <div className="bg-slate-800 rounded-xl p-5 border border-slate-700 shadow-lg text-center">
                        <h2 className="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-2">Target Element</h2>
                        <div className="text-5xl font-bold text-white mb-1">{targetElement.symbol}</div>
                        <div className="text-xl text-blue-300 mb-3">{targetElement.name}</div>
                        <div className="flex justify-between text-sm px-2 mt-4 bg-slate-900 rounded p-2 border border-slate-700">
                            <span className="text-slate-400">Atomic Number:</span>
                            <span className="font-bold text-emerald-400">{targetElement.z}</span>
                        </div>
                        </div>

                        <div className="bg-slate-800 rounded-xl p-5 border border-slate-700 shadow-lg flex flex-row lg:flex-col gap-4 justify-around items-center">
                        <div className="flex flex-col items-center p-2">
                            <label className="text-sm font-medium text-slate-300 mb-3">Protons in Nucleus</label>
                            <input
                            type="number"
                            min="0"
                            max="20"
                            value={protons === 0 ? '' : protons}
                            onChange={(e) => {
                                const val = e.target.value;
                                setProtons(val === '' ? 0 : Math.min(20, Math.max(0, parseInt(val) || 0)));
                            }}
                            className="w-24 h-16 text-center text-3xl font-bold bg-slate-900 border-2 border-red-500 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-red-400 shadow-[0_0_15px_rgba(239,68,68,0.2)]"
                            placeholder="0"
                            />
                        </div>
                        
                        <div className="hidden lg:block w-full h-px bg-slate-700"></div>
                        <div className="block lg:hidden w-px h-full bg-slate-700"></div>

                        <div 
                            className="flex flex-col items-center cursor-grab active:cursor-grabbing p-3 hover:bg-slate-700 rounded-lg transition-colors select-none w-full"
                            onPointerDown={(e) => handlePointerDown(e, 'electron', 'bin')}
                        >
                            <div className="w-12 h-12 rounded-full bg-blue-500 shadow-[0_0_15px_rgba(59,130,246,0.5)] flex items-center justify-center text-white font-bold text-2xl mb-3 pointer-events-none">
                            e⁻
                            </div>
                            <span className="text-sm font-medium text-slate-300 text-center">Drag Electrons</span>
                        </div>
                        </div>
                        
                        <div className="text-xs text-slate-500 text-center flex items-center justify-center gap-1">
                        <Info size={14} /> Tip: Click a placed particle to remove it.
                        </div>
                    </div>

                    {/* Center Panel: Interactive Atom Canvas */}
                    <div className="lg:col-span-2 bg-slate-800/50 rounded-xl border border-slate-700 shadow-inner flex items-center justify-center relative p-2 md:p-6 aspect-square max-h-[600px] overflow-hidden">
                        <svg 
                        ref={svgRef}
                        viewBox="-250 -250 500 500" 
                        className="w-full h-full drop-shadow-2xl"
                        >
                        <defs>
                            <radialGradient id="nucleusGrad" cx="30%" cy="30%" r="70%">
                            <stop offset="0%" stopColor="#ef4444" />
                            <stop offset="100%" stopColor="#991b1b" />
                            </radialGradient>
                        </defs>

                        {/* Background Glow for Active Zone */}
                        {shells.map((_, i) => (
                            activeZone === i && <circle key={`glow-${i}`} r={70 + i * 40} fill="none" stroke="#3b82f6" strokeWidth="20" opacity="0.2" />
                        ))}

                        {/* Electron Shell Tracks */}
                        {shells.map((_, i) => (
                            <circle
                            key={`track-${i}`}
                            r={70 + i * 40}
                            fill="none"
                            stroke={activeZone === i ? '#60a5fa' : '#334155'}
                            strokeWidth={activeZone === i ? 4 : 2}
                            strokeDasharray="4 6"
                            className="transition-all duration-200"
                            />
                        ))}

                        {/* Nucleus */}
                        <circle 
                            r="35" 
                            fill="url(#nucleusGrad)" 
                            stroke="#7f1d1d"
                            strokeWidth="2"
                        />
                        <text x="0" y="-2" textAnchor="middle" fill="white" fontSize="22" fontWeight="bold" className="pointer-events-none select-none">
                            {protons}
                        </text>
                        <text x="0" y="16" textAnchor="middle" fill="#fca5a5" fontSize="14" fontWeight="bold" className="pointer-events-none select-none">
                            p⁺
                        </text>

                        {/* Render placed electrons */}
                        {shells.map((count, shellIndex) => {
                            const radius = 70 + shellIndex * 40;
                            return Array.from({ length: count }).map((_, i) => {
                            // Distribute evenly around the circle
                            const angle = (i / count) * 2 * Math.PI - Math.PI / 2;
                            const cx = radius * Math.cos(angle);
                            const cy = radius * Math.sin(angle);
                            
                            return (
                                <g 
                                key={`e-${shellIndex}-${i}`} 
                                className="cursor-grab active:cursor-grabbing"
                                onPointerDown={(e) => handlePointerDown(e, 'electron', shellIndex)}
                                >
                                <circle cx={cx} cy={cy} r="12" fill="#3b82f6" stroke="#1d4ed8" strokeWidth="1" />
                                <text x={cx} y={cy} dy=".3em" textAnchor="middle" fill="white" fontSize="14" fontWeight="bold" className="pointer-events-none select-none">-</text>
                                </g>
                            );
                            });
                        })}
                        </svg>
                    </div>

                    {/* Right Panel: Controls & Feedback */}
                    <div className="lg:col-span-1 flex flex-col gap-4">
                        <button 
                        onClick={checkAtom}
                        className="w-full py-4 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl font-bold text-lg shadow-lg flex items-center justify-center gap-2 transition-all transform hover:scale-[1.02] active:scale-[0.98]"
                        >
                        <CheckCircle size={24} /> Check Answer
                        </button>

                        <div className="flex gap-2 w-full">
                        <button 
                            onClick={() => setShells(s => s.length > 1 ? s.slice(0, -1) : s)}
                            className="flex-1 py-3 bg-slate-700 hover:bg-slate-600 text-white rounded-xl font-semibold shadow flex items-center justify-center gap-2 transition-all"
                        >
                            <Minus size={20} /> Shell
                        </button>
                        <button 
                            onClick={() => setShells(s => s.length < 5 ? [...s, 0] : s)}
                            className="flex-1 py-3 bg-slate-700 hover:bg-slate-600 text-white rounded-xl font-semibold shadow flex items-center justify-center gap-2 transition-all"
                        >
                            <Plus size={20} /> Shell
                        </button>
                        </div>

                        <button 
                        onClick={pickRandomElement}
                        className="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-semibold shadow-lg flex items-center justify-center gap-2 transition-all"
                        >
                        <RefreshCw size={20} /> Next Random Atom
                        </button>

                        <button 
                        onClick={resetAtom}
                        className="w-full py-3 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-xl font-semibold shadow flex items-center justify-center gap-2 transition-all border border-slate-700"
                        >
                        <Trash2 size={18} /> Clear Canvas
                        </button>

                        {/* Feedback Display */}
                        {feedback && (
                        <div className={`mt-4 p-4 rounded-xl border-l-4 shadow-lg animate-in fade-in slide-in-from-top-4 ${
                            feedback.status === 'success' ? 'bg-emerald-900/50 border-emerald-500 text-emerald-100' : 'bg-red-900/50 border-red-500 text-red-100'
                        }`}>
                            <h3 className="font-bold flex items-center gap-2 mb-1">
                            {feedback.status === 'success' ? <CheckCircle size={18}/> : <Info size={18}/>}
                            {feedback.status === 'success' ? 'Correct!' : 'Keep Trying'}
                            </h3>
                            <p className="text-sm leading-relaxed opacity-90">{feedback.message}</p>
                        </div>
                        )}
                    </div>

                    </div>
                </div>

                {/* Floating Dragged Element rendering */}
                {dragState && dragState.type === 'electron' && (
                    <div 
                    className="fixed pointer-events-none rounded-full flex items-center justify-center text-white font-bold z-50 shadow-2xl bg-blue-500 w-12 h-12 text-2xl"
                    style={{ 
                        left: dragState.x, 
                        top: dragState.y,
                        transform: 'translate(-50%, -50%)'
                    }}
                    >
                    e⁻
                    </div>
                )}
                </div>
            );
        }

        // --- Render App ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
