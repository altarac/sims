<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stratigraphy Explorer</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for in-browser JSX transpilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // ==========================================
        // SVG FOSSIL ICONS
        // Clean vector paths to represent the fossils.
        // ==========================================
        const icons = {
          Ammonite: () => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className="w-full h-full">
              <path d="M12 20a8 8 0 1 0 0-16 8 8 0 0 0 0 16zM12 16a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM12 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4z" />
              <path d="M12 4v16M4 12h16M6.5 6.5l11 11M6.5 17.5l11-11" strokeWidth="0.5" />
            </svg>
          ),
          Cephalopod: () => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" className="w-full h-full">
              <path d="M12 2l-5 16h10zM8 18v4M12 18v4M16 18v4M9 10h6M10 6h4M8 14h8" />
            </svg>
          ),
          Dinosaur: () => (
            <svg viewBox="0 0 100 100" fill="none" stroke="currentColor" strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" className="w-full h-full">
              <path d="M 90 40 C 95 25 80 10 60 15 C 45 18 30 20 18 30 C 8 38 2 50 5 60 C 8 68 15 65 25 60 C 35 55 50 55 65 58 C 80 62 90 60 95 50 C 98 45 95 40 90 40 Z" />
              <path d="M 35 32 C 45 28 55 25 62 38 C 68 50 55 48 45 45 C 35 42 28 40 35 32 Z" />
              <path d="M 68 28 C 78 22 85 28 80 40 C 75 50 68 45 65 35 C 62 25 68 28 68 28 Z" />
              <path d="M 12 42 C 20 35 28 38 25 48 C 22 55 10 50 12 42 Z" />
              <path d="M 5 72 C 15 88 45 95 70 85 C 85 78 95 65 95 60 C 85 65 65 72 45 72 C 25 72 10 68 5 72 Z" />
              <path d="M 55 77 C 65 74 80 68 80 68 C 80 68 75 80 65 82 C 55 84 50 80 55 77 Z" />
              <path d="M 12 62 L 15 72 L 18 60 L 22 70 L 25 58 L 30 68 L 33 57 L 38 65 L 42 56 L 46 63 L 50 54 L 53 60 L 57 53" />
              <path d="M 15 70 L 18 60 L 22 71 L 26 61 L 30 72 L 34 62 L 38 71 L 42 64 L 45 72 L 48 66 L 52 73" />
              <path d="M 22 35 C 25 32 30 32 32 35" strokeWidth="1" />
              <path d="M 65 20 C 70 20 75 22 78 25" strokeWidth="1" />
            </svg>
          ),
          Fish: () => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round" className="w-full h-full">
              <path d="M10 7c-2 0-5 1-7 4l-1 1 3 3c2 2 4 2 5 2V7z" />
              <circle cx="5" cy="10.5" r="1" fill="currentColor" stroke="none" />
              <path d="M2 12l2 2" />
              <path d="M10 12h10" />
              <path d="M20 12l3-4v8l-3-4z" />
              <path d="M12 9v6M14 8v8M16 8.5v7M18 9.5v5" />
              <path d="M14 8l-2-4M16 8.5l-1.5-3M14 16l-2 4M16 15.5l-1.5 3" />
            </svg>
          ),
          Insect: () => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinejoin="round" className="w-full h-full">
              <path d="M12 4v16" />
              <path d="M12 8L4 4v4l8 4M12 8l8-4v4l-8 4M12 12l-6-3v3l6 3M12 12l6-3v3l-6 3" />
              <circle cx="12" cy="4" r="1.5" fill="currentColor" />
            </svg>
          ),
          Mammal: () => (
            <svg viewBox="0 0 100 100" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" className="w-full h-full">
              <path d="M 85 60 C 90 20 50 10 35 25 C 20 25 10 35 8 48 C 7 52 10 54 15 54 L 28 54 C 40 60 55 60 65 52 L 85 60 Z" />
              <ellipse cx="48" cy="36" rx="10" ry="15" transform="rotate(-10 48 36)" />
              <path d="M 12 42 C 18 38 22 40 20 46 C 15 48 10 45 12 42 Z" fill="currentColor" />
              <path d="M 13 54 V 78 H 23 V 54 M 23 54 V 74 H 31 V 54" />
              <path d="M 32 64 C 35 85 55 90 75 80 C 82 75 80 62 72 60 C 65 68 50 70 42 68 C 36 66 32 64 32 64 Z" />
              <path d="M 52 14 L 49 22 L 53 25 L 50 31" strokeWidth="1.5" />
              <path d="M 32 24 C 40 20 50 20 60 22" strokeWidth="2" />
            </svg>
          ),
          Coral: () => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinejoin="round" className="w-full h-full">
              <path d="M12 22V10M12 14l-4-4v-4M12 18l5-5v-5M8 10v-4M16 10v-4" />
              <path d="M8 6h1M12 10h1M17 13h1" />
            </svg>
          ),
          Plant: () => (
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinejoin="round" className="w-full h-full">
              <path d="M12 22V2" />
              <path d="M12 14c-2-1-4-3-5-5M12 14c2-1 4-3 5-5M12 18c-3-1-5-3-7-5M12 18c3-1 5-3 7-5M12 10c-1.5-1-3-2-4-3M12 10c1.5-1 3-2 4-3" />
            </svg>
          ),
          Trilobite: () => (
            <svg viewBox="0 0 100 100" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round" className="w-full h-full">
              <path d="M 50 10 C 20 10 10 25 10 45 C 10 50 8 60 5 68 C 12 55 18 45 25 45 C 30 48 70 48 75 45 C 82 45 88 55 95 68 C 92 60 90 50 90 45 C 90 25 80 10 50 10 Z" />
              <path d="M 38 45 C 35 25 42 15 50 15 C 58 15 65 25 62 45" />
              <path d="M 41 22 Q 50 26 59 22 M 40 30 Q 50 34 60 30 M 39 38 Q 50 42 61 38" />
              <path d="M 32 28 C 36 20 42 25 42 35" />
              <path d="M 68 28 C 64 20 58 25 58 35" />
              <path d="M 38 45 L 34 85" />
              <path d="M 62 45 L 66 85" />
              <path d="M 37.5 50 Q 50 54 62.5 50 M 37 55 Q 50 59 63 55 M 36.5 60 Q 50 64 63.5 60 M 36 65 Q 50 69 64 65 M 35.5 70 Q 50 74 64.5 70 M 35 75 Q 50 79 65 75 M 34.5 80 Q 50 84 65.5 80" />
              <path d="M 38 45 C 25 46 15 50 10 58 M 37.5 50 C 25 51 15 55 11 63 M 37 55 C 25 56 16 60 12 68 M 36.5 60 C 25 61 17 65 13 73 M 36 65 C 26 66 18 70 14 78 M 35.5 70 C 27 71 20 75 16 83 M 35 75 C 28 76 22 80 18 88 M 34.5 80 C 29 81 24 84 20 92" />
              <path d="M 62 45 C 75 46 85 50 90 58 M 62.5 50 C 75 51 85 55 89 63 M 63 55 C 75 56 84 60 88 68 M 63.5 60 C 75 61 83 65 87 73 M 64 65 C 74 66 82 70 86 78 M 64.5 70 C 73 71 80 75 84 83 M 65 75 C 72 76 78 80 82 88 M 65.5 80 C 71 81 76 84 80 92" />
              <path d="M 18 88 C 30 102 70 102 82 88" />
              <path d="M 34 85 C 34 94 42 96 50 96 C 58 96 66 94 66 85" />
            </svg>
          )
        };

        // ==========================================
        // DATA DEFINITIONS
        // ==========================================
        const LEGEND_ITEMS = [
          { id: 'Ammonite', name: 'Ammonite' },
          { id: 'Cephalopod', name: 'Cephalopod' },
          { id: 'Dinosaur', name: 'Dinosaur' },
          { id: 'Fish', name: 'Fish' },
          { id: 'Insect', name: 'Insect' },
          { id: 'Mammal', name: 'Mammal' },
          { id: 'Coral', name: 'Coral' },
          { id: 'Plant', name: 'Plant' },
          { id: 'Trilobite', name: 'Trilobite' }
        ];

        const STRATA_LAYERS = [
          {
            id: 'A',
            color: 'bg-[#e5ddd5]',
            fossils: ['Fish', 'Mammal', 'Plant', 'Coral', 'Insect']
          },
          {
            id: 'B',
            color: 'bg-[#d6ccc0]',
            fossils: ['Fish', 'Mammal', 'Insect', 'Plant', 'Fish', 'Plant']
          },
          {
            id: 'C',
            color: 'bg-[#c7bbab]',
            fossils: ['Dinosaur', 'Ammonite', 'Insect', 'Cephalopod', 'Fish', 'Cephalopod', 'Ammonite', 'Dinosaur']
          },
          {
            id: 'D',
            color: 'bg-[#b8a997]',
            fossils: ['Insect', 'Cephalopod', 'Ammonite', 'Dinosaur', 'Dinosaur', 'Fish', 'Cephalopod']
          },
          {
            id: 'E',
            color: 'bg-[#a99882]',
            fossils: ['Trilobite', 'Cephalopod', 'Trilobite', 'Cephalopod', 'Trilobite', 'Cephalopod', 'Cephalopod']
          }
        ];

        const QUIZ_QUESTIONS = [
          {
            question: "According to the Law of Superposition, which layer is the oldest?",
            options: ["Layer A", "Layer C", "Layer E", "Layer B"],
            answer: 2,
            explanation: "The Law of Superposition states that in undisturbed sequences, older rock layers are deposited beneath younger rock layers. Layer E is at the very bottom."
          },
          {
            question: "Between which two layers did the Dinosaurs and Ammonites likely go extinct?",
            options: ["Between E and D", "Between D and C", "Between C and B", "Between B and A"],
            answer: 2,
            explanation: "Dinosaurs and Ammonites are found in layer C, but completely disappear in layer B and all layers above it. This marks a major extinction event."
          },
          {
            question: "Which fossil serves as an excellent 'index fossil' to identify the oldest time period shown?",
            options: ["Trilobite", "Cephalopod", "Fish", "Insect"],
            answer: 0,
            explanation: "Trilobites are only found in Layer E. A good index fossil lived for a relatively short specific period of time, making it useful for dating the rock it's found in."
          },
          {
            question: "Based on the fossil record in this diagram, which appeared first in Earth's history: Insects or Mammals?",
            options: ["Insects", "Mammals", "They appeared at the same time", "Cannot be determined"],
            answer: 0,
            explanation: "Insects first appear in Layer D, which is deeper and older than Layer B, where Mammals first make their appearance."
          },
          {
            question: "Which organism is the most recent (youngest) addition to this environment?",
            options: ["Plant", "Coral", "Fish", "Mammal"],
            answer: 1,
            explanation: "Coral is only found in Layer A, the topmost and youngest layer, indicating it appeared most recently among these options."
          }
        ];

        // ==========================================
        // MAIN COMPONENT
        // ==========================================
        function App() {
          const [currentQuestion, setCurrentQuestion] = useState(0);
          const [selectedOption, setSelectedOption] = useState(null);
          const [hasSubmitted, setHasSubmitted] = useState(false);
          const [score, setScore] = useState(0);
          const [quizComplete, setQuizComplete] = useState(false);

          const handleOptionSelect = (index) => {
            if (!hasSubmitted) {
              setSelectedOption(index);
            }
          };

          const handleSubmit = () => {
            if (selectedOption === null) return;
            setHasSubmitted(true);
            if (selectedOption === QUIZ_QUESTIONS[currentQuestion].answer) {
              setScore(score + 1);
            }
          };

          const handleNext = () => {
            if (currentQuestion < QUIZ_QUESTIONS.length - 1) {
              setCurrentQuestion(currentQuestion + 1);
              setSelectedOption(null);
              setHasSubmitted(false);
            } else {
              setQuizComplete(true);
            }
          };

          const resetQuiz = () => {
            setCurrentQuestion(0);
            setSelectedOption(null);
            setHasSubmitted(false);
            setScore(0);
            setQuizComplete(false);
          };

          return (
            <div className="h-[100dvh] bg-stone-50 p-2 md:p-4 font-sans text-stone-800 selection:bg-stone-300 overflow-hidden flex flex-col box-border">
              <div className="max-w-7xl w-full mx-auto flex-1 flex flex-col lg:flex-row gap-3 md:gap-4 lg:gap-6 min-h-0 overflow-hidden">
                
                {/* LEFT COLUMN: Stratigraphy Diagram */}
                <div className="flex-1 flex flex-col bg-white rounded-xl shadow-lg border border-stone-200 overflow-hidden min-h-0">
                  <div className="bg-stone-800 text-stone-100 py-2 px-4 shrink-0">
                    <h1 className="text-xl md:text-2xl font-bold tracking-tight text-center truncate">
                      Stratigraphic Layers of the Earth with Fossils
                    </h1>
                  </div>
                  
                  <div className="relative p-2 md:p-4 flex-1 flex flex-col min-h-0">
                    {/* Layers Container */}
                    <div className="w-full h-full border-4 border-stone-800 rounded-lg overflow-hidden flex flex-col shadow-inner bg-stone-100 min-h-0">
                      {STRATA_LAYERS.map((layer, layerIdx) => (
                        <div 
                          key={layer.id} 
                          className={`flex-1 ${layer.color} border-b-2 last:border-b-0 border-stone-800/40 relative flex items-center shadow-[inset_0_4px_12px_rgba(0,0,0,0.03)] transition-colors duration-500 hover:bg-opacity-80 min-h-0`}
                        >
                          {/* Layer Identifier */}
                          <div className="absolute left-0 top-0 bottom-0 w-8 md:w-12 border-r-2 border-stone-800/20 flex items-center justify-center bg-white/20 backdrop-blur-sm z-10">
                            <span className="text-xl md:text-2xl font-bold text-stone-800/80">{layer.id}</span>
                          </div>

                          {/* Fossils Area */}
                          <div className="ml-8 md:ml-12 pl-2 pr-2 md:pr-4 flex-1 flex flex-wrap items-center justify-around gap-1 sm:gap-2 w-full h-full py-1 overflow-hidden">
                            {layer.fossils.map((fossilType, fIdx) => {
                              const IconComponent = icons[fossilType];
                              // Pseudo-random rotation for organic look based on index
                              const rotation = ((fIdx * 37 + layerIdx * 13) % 40) - 20; 
                              
                              return (
                                <div 
                                  key={`${layer.id}-${fIdx}`} 
                                  title={fossilType}
                                  className="w-8 h-8 sm:w-10 sm:h-10 md:w-12 md:h-12 lg:w-14 lg:h-14 max-h-[90%] text-stone-700/80 drop-shadow-md transition-transform duration-300 hover:scale-110 hover:text-stone-900 cursor-help flex items-center justify-center"
                                  style={{ transform: `rotate(${rotation}deg)` }}
                                >
                                  <IconComponent />
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>

                {/* RIGHT COLUMN: Legend & Quiz */}
                <div className="w-full lg:w-[350px] xl:w-[400px] flex flex-col gap-3 md:gap-4 h-full min-h-0">
                  
                  {/* Legend Panel */}
                  <div className="bg-white rounded-xl shadow-lg border border-stone-200 overflow-hidden shrink-0">
                    <div className="bg-stone-200 py-2 px-4 border-b border-stone-300">
                      <h2 className="text-lg font-bold text-stone-800 flex items-center gap-2">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-4 h-4"><path d="M4 6h16M4 12h16M4 18h7"/></svg>
                        Fossil Legend
                      </h2>
                    </div>
                    <div className="p-2 md:p-3 grid grid-cols-3 sm:grid-cols-4 lg:grid-cols-2 gap-2">
                      {LEGEND_ITEMS.map(item => {
                        const IconComponent = icons[item.id];
                        return (
                          <div key={item.id} className="flex items-center gap-1.5 md:gap-2 p-1 rounded-md hover:bg-stone-100 transition-colors">
                            <div className="w-5 h-5 md:w-6 md:h-6 shrink-0 text-stone-700">
                              <IconComponent />
                            </div>
                            <span className="text-xs md:text-sm font-medium text-stone-700 leading-tight truncate" title={item.name}>{item.name}</span>
                          </div>
                        );
                      })}
                    </div>
                  </div>

                  {/* Quiz Panel */}
                  <div className="bg-white rounded-xl shadow-lg border border-stone-200 overflow-hidden flex-1 flex flex-col min-h-0">
                    <div className="bg-emerald-700 text-emerald-50 py-2 px-4 border-b border-emerald-800 flex justify-between items-center shrink-0">
                      <h2 className="text-lg font-bold flex items-center gap-2">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-4 h-4"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3M12 17h.01"/></svg>
                        Knowledge Check
                      </h2>
                      <span className="text-xs font-semibold bg-emerald-800 px-2 py-0.5 rounded-full">
                        {quizComplete ? 'Complete' : `Q ${currentQuestion + 1} / ${QUIZ_QUESTIONS.length}`}
                      </span>
                    </div>
                    
                    <div className="p-3 md:p-4 flex-1 flex flex-col min-h-0 overflow-y-auto">
                      {!quizComplete ? (
                        <>
                          <h3 className="text-sm md:text-base font-semibold text-stone-800 mb-3 leading-snug shrink-0">
                            {QUIZ_QUESTIONS[currentQuestion].question}
                          </h3>
                          
                          <div className="flex flex-col gap-2 mb-3 flex-1 min-h-0 justify-center">
                            {QUIZ_QUESTIONS[currentQuestion].options.map((option, idx) => {
                              const isSelected = selectedOption === idx;
                              const isCorrect = idx === QUIZ_QUESTIONS[currentQuestion].answer;
                              
                              let buttonClass = "w-full text-left p-2 md:p-3 rounded-lg border-2 transition-all font-medium text-sm ";
                              
                              if (!hasSubmitted) {
                                buttonClass += isSelected 
                                  ? "border-emerald-500 bg-emerald-50 text-emerald-800 shadow-sm scale-[1.01]" 
                                  : "border-stone-200 bg-white hover:border-stone-400 hover:bg-stone-50 text-stone-700";
                              } else {
                                if (isCorrect) {
                                  buttonClass += "border-emerald-500 bg-emerald-100 text-emerald-900";
                                } else if (isSelected && !isCorrect) {
                                  buttonClass += "border-rose-400 bg-rose-50 text-rose-800 opacity-70";
                                } else {
                                  buttonClass += "border-stone-200 bg-white text-stone-400 opacity-50";
                                }
                              }

                              return (
                                <button
                                  key={idx}
                                  disabled={hasSubmitted}
                                  onClick={() => handleOptionSelect(idx)}
                                  className={buttonClass}
                                >
                                  {option}
                                </button>
                              );
                            })}
                          </div>

                          {/* Feedback Area */}
                          {hasSubmitted && (
                            <div className={`p-2 md:p-3 rounded-lg mb-3 shrink-0 ${selectedOption === QUIZ_QUESTIONS[currentQuestion].answer ? 'bg-emerald-50 border border-emerald-200' : 'bg-rose-50 border border-rose-200'}`}>
                              <p className="text-xs md:text-sm font-semibold mb-0.5">
                                {selectedOption === QUIZ_QUESTIONS[currentQuestion].answer ? '✅ Correct!' : '❌ Incorrect.'}
                              </p>
                              <p className="text-xs md:text-sm text-stone-700 leading-tight">
                                {QUIZ_QUESTIONS[currentQuestion].explanation}
                              </p>
                            </div>
                          )}

                          {/* Action Buttons */}
                          <div className="mt-auto shrink-0 pt-1">
                            {!hasSubmitted ? (
                              <button 
                                onClick={handleSubmit}
                                disabled={selectedOption === null}
                                className={`w-full py-2 md:py-3 rounded-lg font-bold text-sm md:text-base transition-all ${selectedOption !== null ? 'bg-emerald-600 hover:bg-emerald-700 text-white shadow-md active:scale-[0.98]' : 'bg-stone-200 text-stone-400 cursor-not-allowed'}`}
                              >
                                Check Answer
                              </button>
                            ) : (
                              <button 
                                onClick={handleNext}
                                className="w-full py-2 md:py-3 rounded-lg font-bold text-sm md:text-base bg-stone-800 hover:bg-stone-900 text-white shadow-md transition-all active:scale-[0.98]"
                              >
                                {currentQuestion < QUIZ_QUESTIONS.length - 1 ? 'Next Question' : 'View Results'}
                              </button>
                            )}
                          </div>
                        </>
                      ) : (
                        <div className="flex-1 flex flex-col items-center justify-center text-center p-2">
                          <div className="w-16 h-16 md:w-20 md:h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mb-4">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-8 h-8 md:w-10 md:h-10"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14M22 4L12 14.01l-3-3"/></svg>
                          </div>
                          <h3 className="text-2xl md:text-3xl font-bold text-stone-800 mb-2">Quiz Complete!</h3>
                          <p className="text-lg md:text-xl text-stone-600 mb-6">
                            You scored <span className="font-bold text-emerald-600">{score}</span> out of <span className="font-bold">{QUIZ_QUESTIONS.length}</span>
                          </p>
                          <button 
                            onClick={resetQuiz}
                            className="px-6 py-2 md:py-3 bg-stone-800 hover:bg-stone-900 text-white rounded-lg font-bold text-base shadow-md transition-all active:scale-[0.98]"
                          >
                            Try Again
                          </button>
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              </div>
            </div>
          );
        }

        // Initialize React App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
