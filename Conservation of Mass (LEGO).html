<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conservation of Mass: Lego House</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a202c; color: white; font-family: 'Inter', sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none; /* Let clicks pass through unless on specific elements */
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .ui-element {
            pointer-events: auto;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(8px);
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        button {
            transition: all 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        #scale-display {
            font-size: 2.5rem;
            font-weight: bold;
            font-family: monospace;
            color: #10B981; /* Emerald green for positive reading */
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
            background: #0f172a;
            padding: 1rem 2rem;
            border-radius: 0.5rem;
            border: 2px solid #1e293b;
            margin-top: 10px;
            text-align: right;
            min-width: 200px;
        }
        .scale-unit {
            font-size: 1rem;
            color: #64748b;
            margin-left: 8px;
        }
        
        #brick-count-display {
            font-size: 2.5rem;
            font-weight: bold;
            font-family: monospace;
            color: #f59e0b; /* Amber color */
            text-shadow: 0 0 10px rgba(245, 158, 11, 0.5);
            background: #0f172a;
            padding: 1rem 2rem;
            border-radius: 0.5rem;
            border: 2px solid #1e293b;
            margin-top: 10px;
            text-align: right;
        }
        
        /* Educational Overlay */
        #info-overlay {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 600px;
            text-align: center;
        }
        
        .loading-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>

    <div id="loading" class="loading-screen">
        <h1 class="text-3xl font-bold animate-pulse text-blue-400">Loading Simulation...</h1>
    </div>

    <div id="ui-container">
        <div class="ui-element">
            <h1 class="text-2xl font-bold mb-2">Conservation of Mass</h1>
            <p class="text-sm text-gray-300 mb-4 max-w-xs">Observe how mass remains constant before and after a physical change.</p>
            
            <div class="flex gap-2 mb-4">
                <button id="btn-house" class="bg-blue-600 hover:bg-blue-500 text-white font-semibold py-2 px-4 rounded w-full">
                    Show House
                </button>
                <button id="btn-pieces" class="bg-orange-600 hover:bg-orange-500 text-white font-semibold py-2 px-4 rounded w-full">
                    Smash into Pile!
                </button>
            </div>
            
            <div class="mt-4">
                <div class="text-sm text-gray-400 mb-1 uppercase tracking-wider font-semibold">Digital Scale Reading</div>
                <div id="scale-display">
                    0.00 <span class="scale-unit">g</span>
                </div>
            </div>

            <div class="mt-4 border-t border-gray-700 pt-4">
                <div class="text-sm text-gray-400 mb-1 uppercase tracking-wider font-semibold">Total Bricks</div>
                <div id="brick-count-display">
                    0
                </div>
            </div>
        </div>
    </div>

    <div id="info-overlay" class="ui-element">
        <h2 id="status-title" class="text-xl font-bold text-blue-400 mb-2">State: Solid House</h2>
        <p id="status-desc" class="text-gray-200">The Lego bricks are arranged in an organized structure. The total mass is the sum of all individual bricks.</p>
    </div>

    <script>
        // Constants & State
        const BRICK_MASS = 2.5; // grams per 2x4 brick equivalent
        const BRICK_COLORS = [0xd32f2f, 0x1976d2, 0xfbc02d, 0x388e3c, 0xffffff]; // Red, Blue, Yellow, Green, White
        
        let scene, camera, renderer;
        let houseGroup, pileGroup;
        let isHouse = true;
        let currentMass = 0;
        let targetMass = 0;
        let allBricks = []; // Store data to rebuild house/pile consistently
        
        // Scale animation variables
        let scaleDisplayValue = 0;
        let isScaleAnimating = false;

        // Mouse interaction
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let rotationTarget = { x: 0, y: 0 };
        let rotationCurrent = { x: 0, y: 0.5 }; // initial slight rotation

        function init() {
            // 1. Scene Setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1e293b); // Slate 800
            scene.fog = new THREE.FogExp2(0x1e293b, 0.02);

            // 2. Camera Setup (Backed up and adjusted to avoid UI)
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(20, 25, 55); // Moved further back and slightly right
            camera.lookAt(0, 8, 0); // Look slightly higher up

            // 3. Renderer Setup
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            // 4. Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 1.2); // Increased from 0.6
            scene.add(ambientLight);

            // Added Hemisphere light for better overall fill illumination
            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.0); 
            hemiLight.position.set(0, 20, 0);
            scene.add(hemiLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 1.5); // Increased from 0.8
            dirLight.position.set(10, 20, 10);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            dirLight.shadow.camera.near = 0.5;
            dirLight.shadow.camera.far = 50;
            dirLight.shadow.camera.left = -15;
            dirLight.shadow.camera.right = 15;
            dirLight.shadow.camera.top = 15;
            dirLight.shadow.camera.bottom = -15;
            scene.add(dirLight);

            const spotLight = new THREE.SpotLight(0x60a5fa, 0.5); // Blue tint
            spotLight.position.set(-15, 20, -10);
            spotLight.angle = Math.PI/4;
            scene.add(spotLight);

            // 5. Environment (The Scale)
            buildScale();

            // 6. Groups to hold objects
            houseGroup = new THREE.Group();
            pileGroup = new THREE.Group();
            
            // Add a container group for rotation
            scene.rotationContainer = new THREE.Group();
            scene.add(scene.rotationContainer);
            
            scene.rotationContainer.add(houseGroup);
            scene.rotationContainer.add(pileGroup);

            // 7. Generate Objects
            generateLegoData();
            buildHouse();
            buildPile();

            // Initial State
            pileGroup.visible = false;
            targetMass = allBricks.length * BRICK_MASS;
            updateScaleDisplay(targetMass); // Instantly set initial mass
            
            document.getElementById('brick-count-display').innerText = allBricks.length;

            // 8. Event Listeners
            window.addEventListener('resize', onWindowResize);
            
            // Mouse/Touch rotation
            renderer.domElement.addEventListener('mousedown', onPointerDown);
            renderer.domElement.addEventListener('mousemove', onPointerMove);
            renderer.domElement.addEventListener('mouseup', onPointerUp);
            renderer.domElement.addEventListener('mouseleave', onPointerUp);
            
            renderer.domElement.addEventListener('touchstart', (e) => {
                e.preventDefault();
                onPointerDown(e.touches[0]);
            }, { passive: false });
            renderer.domElement.addEventListener('touchmove', (e) => {
                e.preventDefault();
                onPointerMove(e.touches[0]);
            }, { passive: false });
            renderer.domElement.addEventListener('touchend', onPointerUp);

            // UI Buttons
            document.getElementById('btn-house').addEventListener('click', () => switchState(true));
            document.getElementById('btn-pieces').addEventListener('click', () => switchState(false));

            // Hide loading
            setTimeout(() => {
                document.getElementById('loading').style.opacity = '0';
                setTimeout(() => document.getElementById('loading').style.display = 'none', 500);
            }, 1000);
        }

        function buildScale() {
            // Scale Base
            const baseGeo = new THREE.CylinderGeometry(15, 16, 2, 64);
            const baseMat = new THREE.MeshStandardMaterial({ 
                color: 0x334155, // Slate 700
                roughness: 0.7,
                metalness: 0.2
            });
            const base = new THREE.Mesh(baseGeo, baseMat);
            base.position.y = -1;
            base.receiveShadow = true;
            scene.add(base);

            // Scale Platter (Glass/Metal look)
            const platterGeo = new THREE.CylinderGeometry(14, 14, 0.5, 64);
            const platterMat = new THREE.MeshStandardMaterial({
                color: 0x94a3b8, // Slate 400
                roughness: 0.2,
                metalness: 0.8
            });
            const platter = new THREE.Mesh(platterGeo, platterMat);
            platter.position.y = 0.25;
            platter.receiveShadow = true;
            platter.castShadow = true;
            scene.add(platter);
            
            // Digital Display area on scale (purely visual, real value is in HTML UI)
            const displayGeo = new THREE.BoxGeometry(6, 0.6, 3);
            const displayMat = new THREE.MeshStandardMaterial({ color: 0x0f172a });
            const display = new THREE.Mesh(displayGeo, displayMat);
            display.position.set(0, 0.5, 12);
            display.rotation.x = -Math.PI / 12; // tilt up slightly
            scene.add(display);
        }

        // Lego brick dimensions (approximate relative proportions)
        const unit = 1;
        const width = unit * 2;
        const length = unit * 4;
        const height = unit * 1.2;
        const studRadius = 0.3;
        const studHeight = 0.2;

        function createBrickGeometry() {
            // A simplified brick geometry for performance
            const geometry = new THREE.BoxGeometry(length, height, width);
            
            // We could add studs, but for many bricks, simple boxes are better
            // Adding a few studs to make it look like lego
            const studGeo = new THREE.CylinderGeometry(studRadius, studRadius, studHeight, 8);
            
            // Create a single merged geometry for a brick
            const group = new THREE.Group();
            
            const mainBody = new THREE.Mesh(geometry);
            mainBody.position.y = height/2;
            group.add(mainBody);
            
            // Top studs
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 2; j++) {
                    const stud = new THREE.Mesh(studGeo);
                    // Distribute along length and width
                    const x = (i - 1.5) * (length / 4);
                    const z = (j - 0.5) * (width / 2);
                    stud.position.set(x, height + studHeight/2, z);
                    group.add(stud);
                }
            }
            
            return group;
        }

        // Generate the logical layout of the house
        function generateLegoData() {
            // Clear existing
            allBricks = [];
            
            const houseWidth = 6; // in bricks
            const houseDepth = 5; // in bricks
            const wallHeight = 5; // in bricks
            
            let id = 0;

            // Helper to add a brick
            const addBrick = (x, y, z, rotY, colorType) => {
                allBricks.push({
                    id: id++,
                    pos: { x, y, z },
                    rotY: rotY,
                    color: BRICK_COLORS[colorType % BRICK_COLORS.length],
                    // Random position for the pile
                    pilePos: {
                        x: (Math.random() - 0.5) * 15,
                        y: Math.random() * 5 + 0.5, // start slightly above ground
                        z: (Math.random() - 0.5) * 15
                    },
                    pileRot: {
                        x: Math.random() * Math.PI * 2,
                        y: Math.random() * Math.PI * 2,
                        z: Math.random() * Math.PI * 2
                    }
                });
            };

            // Build Walls
            for (let y = 0; y < wallHeight; y++) {
                const yPos = y * height;
                
                // Stagger bricks for stability (alternating patterns)
                const offset = (y % 2 === 0) ? 0 : length / 2;

                // Front & Back walls (along X axis)
                for (let x = 0; x < houseWidth; x++) {
                    // Front wall (skip middle for door on bottom rows)
                    if (!(y < 3 && x === Math.floor(houseWidth/2))) {
                        addBrick((x * length) - (houseWidth*length/2) + length/2 + (offset%length), yPos, (houseDepth*width/2) - width/2, 0, x+y);
                    }
                    // Back wall
                    addBrick((x * length) - (houseWidth*length/2) + length/2 + ((length-offset)%length), yPos, -(houseDepth*width/2) + width/2, 0, x+y+1);
                }

                // Left & Right walls (along Z axis)
                // Note: rotation is Math.PI/2, so width/length swap in space
                for (let z = 1; z < houseDepth - 1; z++) { // start 1, end -1 to avoid overlapping corners
                     // Left wall (skip middle for window)
                     if (!(y === 2 && z === Math.floor(houseDepth/2))) {
                        addBrick(-(houseWidth*length/2) + width/2, yPos, (z * length) - (houseDepth*length/2) + length/2, Math.PI/2, z+y+2);
                     }
                     // Right wall
                     addBrick((houseWidth*length/2) - width/2, yPos, (z * length) - (houseDepth*length/2) + length/2, Math.PI/2, z+y+3);
                }
            }

            // Build Roof (Stepped pyramid style)
            let roofLevel = 0;
            let currentW = houseWidth + 1; // Overhang
            let currentD = houseDepth + 1;
            
            // Add a tiny offset to prevent z-fighting (glitchy colors)
            const gap = 0.02;

            while(currentW > 0 && currentD > 0) {
                const yPos = wallHeight * height + (roofLevel * height) + (roofLevel * gap);
                
                // Along X
                for(let x=0; x < currentW; x++) {
                    // Front edge
                    addBrick((x * length) - (currentW*length/2) + length/2, yPos, (currentD*width/2) - width/2, 0, 0); // Red roof
                    // Back edge
                    if (currentD > 1) {
                         addBrick((x * length) - (currentW*length/2) + length/2, yPos, -(currentD*width/2) + width/2, 0, 0);
                    }
                }
                
                // Along Z
                for (let z = 1; z < currentD - 1; z++) {
                    // Left edge
                    addBrick(-(currentW*length/2) + width/2, yPos, (z * length) - (currentD*length/2) + length/2, Math.PI/2, 0);
                    // Right edge
                    addBrick((currentW*length/2) - width/2, yPos, (z * length) - (currentD*length/2) + length/2, Math.PI/2, 0);
                }
                
                currentW -= 1; // step in half a brick length (roughly)
                currentD -= 1;
                roofLevel++;
            }
            
            // Add a chimney
            // Start higher up and offset slightly to prevent exact overlap with roof geometry
            for(let i=0; i<4; i++) {
                const chimneyStartY = wallHeight * height + (1.5 * height);
                addBrick(length + 0.1, chimneyStartY + i*height + (i * gap), -width*1.5 + 0.1, 0, 4); // White chimney
            }
        }

        // Shared geometry and materials for performance 
        // Made bricks slightly smaller than the grid size to create natural gaps and prevent z-fighting
        const baseBrickGeo = new THREE.BoxGeometry(length - 0.05, height - 0.05, width - 0.05); 
        const studGeo = new THREE.CylinderGeometry(studRadius, studRadius, studHeight, 8);
        
        function createOptimizedBrickMesh(colorHex) {
            const mat = new THREE.MeshStandardMaterial({ 
                color: colorHex, 
                roughness: 0.4,
                metalness: 0.1
            });
            
            const group = new THREE.Group();
            
            const body = new THREE.Mesh(baseBrickGeo, mat);
            body.position.y = height/2;
            body.castShadow = true;
            body.receiveShadow = true;
            group.add(body);
            
            // Add studs
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 2; j++) {
                    const stud = new THREE.Mesh(studGeo, mat);
                    const x = (i - 1.5) * (length / 4);
                    const z = (j - 0.5) * (width / 2);
                    stud.position.set(x, height + studHeight/2, z);
                    group.add(stud);
                }
            }
            return group;
        }

        function buildHouse() {
            // Clear
            while(houseGroup.children.length > 0){ 
                houseGroup.remove(houseGroup.children[0]); 
            }

            // Group by color to reuse materials/geometry creation
            const meshesByColor = {};

            allBricks.forEach(bData => {
                const mesh = createOptimizedBrickMesh(bData.color);
                
                // Set House position
                mesh.position.set(bData.pos.x, bData.pos.y + 0.5, bData.pos.z); // +0.5 to sit on platter
                mesh.rotation.y = bData.rotY;
                
                houseGroup.add(mesh);
            });
        }

        function buildPile() {
             while(pileGroup.children.length > 0){ 
                pileGroup.remove(pileGroup.children[0]); 
            }

            allBricks.forEach(bData => {
                const mesh = createOptimizedBrickMesh(bData.color);
                
                // Set Pile position (simulate dropping them)
                // In a real physics sim, we'd use Cannon.js. Here we fake a messy pile.
                
                // Constrain x,z to stay roughly on the scale
                let rX = bData.pilePos.x;
                let rZ = bData.pilePos.z;
                // keep within circle radius ~12
                if(rX*rX + rZ*rZ > 144) {
                    const angle = Math.atan2(rZ, rX);
                    const r = Math.random() * 10;
                    rX = Math.cos(angle) * r;
                    rZ = Math.sin(angle) * r;
                }

                mesh.position.set(rX, bData.pilePos.y + 0.5, rZ);
                mesh.rotation.set(bData.pileRot.x, bData.pileRot.y, bData.pileRot.z);
                
                pileGroup.add(mesh);
            });
        }

        function switchState(toHouse) {
            if (isHouse === toHouse) return; // Already in state
            
            isHouse = toHouse;
            
            // Update UI Styling
            const btnHouse = document.getElementById('btn-house');
            const btnPieces = document.getElementById('btn-pieces');
            const statusTitle = document.getElementById('status-title');
            const statusDesc = document.getElementById('status-desc');

            if (isHouse) {
                houseGroup.visible = true;
                pileGroup.visible = false;
                
                btnHouse.classList.remove('bg-gray-600');
                btnHouse.classList.add('bg-blue-600');
                btnPieces.classList.remove('bg-orange-600');
                btnPieces.classList.add('bg-gray-600');
                
                statusTitle.innerText = "State: Solid House";
                statusTitle.className = "text-xl font-bold text-blue-400 mb-2";
                statusDesc.innerText = "The Lego bricks are arranged in an organized structure. The total mass is the sum of all individual bricks.";
                
                // Add a little drop animation
                houseGroup.position.y = 5;
            } else {
                houseGroup.visible = false;
                pileGroup.visible = true;
                
                btnHouse.classList.remove('bg-blue-600');
                btnHouse.classList.add('bg-gray-600');
                btnPieces.classList.remove('bg-gray-600');
                btnPieces.classList.add('bg-orange-600');
                
                statusTitle.innerText = "State: Disassembled Pile";
                statusTitle.className = "text-xl font-bold text-orange-400 mb-2";
                statusDesc.innerText = "Physical Change occurred! The structure is broken down, but the NUMBER of bricks remains exactly the same. Therefore, the MASS is conserved.";
                
                // Animate dropping the pile
                pileGroup.children.forEach(child => {
                    // Store original y to drop to
                    child.userData.targetY = child.position.y;
                    // Start high up
                    child.position.y += 10 + Math.random() * 5; 
                });
            }

            // Animate scale to show zero briefly, then back up, to simulate taking off and putting on
            animateScaleReset();
        }

        function animateScaleReset() {
            // Target mass is always the same! (Conservation of mass)
            const finalMass = allBricks.length * BRICK_MASS;
            
            // Animate to 0
            let startVal = scaleDisplayValue;
            let startTime = Date.now();
            let duration = 300; // ms to drop to 0

            function dropToZero() {
                let now = Date.now();
                let progress = (now - startTime) / duration;
                if (progress < 1) {
                    scaleDisplayValue = startVal * (1 - progress);
                    updateScaleDisplay(scaleDisplayValue);
                    requestAnimationFrame(dropToZero);
                } else {
                    scaleDisplayValue = 0;
                    updateScaleDisplay(0);
                    
                    // Pause briefly at 0
                    setTimeout(() => {
                        // Animate back to finalMass
                        let startUpTime = Date.now();
                        let durationUp = 800;
                        
                        function riseToMass() {
                            let nowUp = Date.now();
                            let progressUp = (nowUp - startUpTime) / durationUp;
                            // Ease out
                            let easeProgress = 1 - Math.pow(1 - progressUp, 3);
                            
                            if (progressUp < 1) {
                                scaleDisplayValue = finalMass * easeProgress;
                                // Add a tiny bit of "wobble" as it settles
                                let wobble = (1-progressUp) * Math.sin(progressUp * Math.PI * 10) * 5;
                                updateScaleDisplay(scaleDisplayValue + wobble);
                                requestAnimationFrame(riseToMass);
                            } else {
                                scaleDisplayValue = finalMass;
                                updateScaleDisplay(finalMass);
                            }
                        }
                        riseToMass();
                    }, 200); // 200ms pause at 0
                }
            }
            dropToZero();
        }

        function updateScaleDisplay(val) {
            // Ensure no negative numbers from wobble
            val = Math.max(0, val);
            document.getElementById('scale-display').innerHTML = 
                `${val.toFixed(2)} <span class="scale-unit">g</span>`;
        }

        // Mouse/Touch rotation logic
        function onPointerDown(event) {
            isDragging = true;
            let clientX = event.clientX !== undefined ? event.clientX : event.touches[0].clientX;
            let clientY = event.clientY !== undefined ? event.clientY : event.touches[0].clientY;
            
            previousMousePosition = { x: clientX, y: clientY };
        }

        function onPointerMove(event) {
            if (!isDragging) return;
            
            let clientX = event.clientX !== undefined ? event.clientX : event.touches[0].clientX;
            // let clientY = event.clientY !== undefined ? event.clientY : event.touches[0].clientY;

            const deltaMove = {
                x: clientX - previousMousePosition.x,
                // y: clientY - previousMousePosition.y
            };

            // Only rotate around Y axis
            rotationTarget.y += deltaMove.x * 0.01;

            previousMousePosition = { x: clientX }; // y: clientY };
        }

        function onPointerUp() {
            isDragging = false;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            // Smooth rotation interpolation
            rotationCurrent.y += (rotationTarget.y - rotationCurrent.y) * 0.1;
            scene.rotationContainer.rotation.y = rotationCurrent.y;

            // Auto-rotate slowly if not interacted with recently
            if(!isDragging) {
                rotationTarget.y += 0.002;
            }

            // Animate house dropping (if recently switched)
            if (isHouse && houseGroup.position.y > 0) {
                houseGroup.position.y -= 0.5;
                if (houseGroup.position.y < 0) houseGroup.position.y = 0;
            }

            // Animate pile pieces dropping
            if (!isHouse) {
                let allSettled = true;
                pileGroup.children.forEach(child => {
                    if (child.position.y > child.userData.targetY) {
                        child.position.y -= 0.8; // drop speed
                        allSettled = false;
                    } else if (child.position.y < child.userData.targetY) {
                        child.position.y = child.userData.targetY;
                    }
                });
            }

            renderer.render(scene, camera);
        }

        // Initialize simulation after all data and constants are defined
        init();
        animate();
    </script>
</body>
</html>
