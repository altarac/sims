<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Litmus Test Simulator</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel for JSX compilation in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @keyframes turnBlue {
      0% { background-color: #f87171; }
      100% { background-color: #3b82f6; }
    }
    @keyframes turnRed {
      0% { background-color: #60a5fa; }
      100% { background-color: #ef4444; }
    }
    .animate-red-to-blue {
      /* 4-second gradual color change animation */
      animation: turnBlue 4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    .animate-blue-to-red {
      /* 4-second gradual color change animation */
      animation: turnRed 4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
  </style>
</head>
<body class="bg-slate-800">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- Inline SVG Icons (Replacing lucide-react for standalone HTML) ---
    const Beaker = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4.5 3h15"/><path d="M6 3v16a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V3"/><path d="M14 9h4"/></svg>
    );
    const Eraser = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/></svg>
    );
    const Info = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
    );
    const CheckCircle2 = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
    );
    const XCircle = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>
    );
    const AlertCircle = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
    );
    const Trash2 = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
    );

    // --- Lab Data & Constants ---
    const LIQUIDS = {
      'A': { id: 'A', name: 'Liquid A', type: 'acid', dropperColor: 'bg-yellow-400', wellColor: 'bg-yellow-400/40' },
      'B': { id: 'B', name: 'Liquid B', type: 'base', dropperColor: 'bg-blue-400', wellColor: 'bg-blue-400/40' },
      'C': { id: 'C', name: 'Liquid C', type: 'neutral', dropperColor: 'bg-slate-300', wellColor: 'bg-slate-300/40' },
      'D': { id: 'D', name: 'Liquid D', type: 'acid', dropperColor: 'bg-red-400', wellColor: 'bg-red-400/30' },
      'E': { id: 'E', name: 'Liquid E', type: 'base', dropperColor: 'bg-green-400', wellColor: 'bg-green-400/40' },
      'F': { id: 'F', name: 'Liquid F', type: 'neutral', dropperColor: 'bg-cyan-400', wellColor: 'bg-cyan-400/30' },
    };

    const TOOLS = {
      DROPPER: 'DROPPER',
      RED_LITMUS: 'RED_LITMUS',
      BLUE_LITMUS: 'BLUE_LITMUS',
      CLEAN: 'CLEAN'
    };

    function App() {
      // State
      const [activeTool, setActiveTool] = useState(null);
      const [dropperContent, setDropperContent] = useState(null); 
      const [mousePos, setMousePos] = useState({ x: 0, y: 0 });
      const [isMouseInWindow, setIsMouseInWindow] = useState(true);
      
      const [wells, setWells] = useState(Array(6).fill().map((_, i) => ({
        id: i,
        liquidId: null,
        redTested: false,
        blueTested: false,
        guess: null,
        isCorrect: null
      })));
      
      const [message, setMessage] = useState({ text: 'Welcome! Click the dropper to equip it.', type: 'info' });
      const [showTheory, setShowTheory] = useState(false);

      // --- Mouse Tracking Effect ---
      useEffect(() => {
        const handleMouseMove = (e) => setMousePos({ x: e.clientX, y: e.clientY });
        const handleMouseEnter = () => setIsMouseInWindow(true);
        const handleMouseLeave = () => setIsMouseInWindow(false);

        window.addEventListener('mousemove', handleMouseMove);
        document.addEventListener('mouseenter', handleMouseEnter);
        document.addEventListener('mouseleave', handleMouseLeave);

        return () => {
          window.removeEventListener('mousemove', handleMouseMove);
          document.removeEventListener('mouseenter', handleMouseEnter);
          document.removeEventListener('mouseleave', handleMouseLeave);
        };
      }, []);

      // --- Interaction Handlers ---
      const showMessage = (text, type = 'info') => {
        setMessage({ text, type });
        setTimeout(() => setMessage(null), type === 'error' ? 4000 : 3000);
      };

      const toggleTool = (tool) => {
        if (activeTool === tool) {
          setActiveTool(null);
          showMessage('Tool put down.', 'info');
        } else {
          setActiveTool(tool);
        }
      };

      const handleVialClick = (liquidId) => {
        if (activeTool === TOOLS.DROPPER) {
          if (dropperContent === null) {
            setDropperContent(liquidId);
            showMessage(`Filled dropper with ${LIQUIDS[liquidId].name}.`, 'success');
          } else if (dropperContent !== liquidId) {
            showMessage(`CONTAMINATION WARNING! Discard your dirty dropper in the waste bin first!`, 'error');
          } else {
            showMessage(`Dropper is already full of ${LIQUIDS[liquidId].name}.`, 'info');
          }
        } else {
          showMessage('Equip the dropper first to pick up liquids.', 'error');
        }
      };

      const handleTrashClick = () => {
        if (activeTool) {
          if (activeTool === TOOLS.DROPPER) {
            setDropperContent(null);
          }
          setActiveTool(null);
          showMessage('Tool discarded. Mouse reset to normal pointer.', 'info');
        }
      };

      const handleWellClick = (wellIndex) => {
        if (!activeTool) return;

        setWells(prev => {
          const newWells = [...prev];
          const well = { ...newWells[wellIndex] };

          if (well.isCorrect && activeTool !== TOOLS.CLEAN) {
            showMessage('This well is correctly identified. Clean it to reuse.', 'info');
            return prev;
          }

          if (activeTool === TOOLS.CLEAN) {
            newWells[wellIndex] = { id: wellIndex, liquidId: null, redTested: false, blueTested: false, guess: null, isCorrect: null };
            showMessage('Well cleaned.', 'info');
            return newWells;
          }

          if (activeTool === TOOLS.DROPPER) {
            if (dropperContent === null) {
              showMessage('Dropper is empty! Click a vial to fill it first.', 'error');
              return prev;
            }
            
            well.liquidId = dropperContent;
            well.redTested = false;
            well.blueTested = false;
            well.guess = null;
            well.isCorrect = null;
            showMessage(`Added drops of ${LIQUIDS[dropperContent].name} to the well.`, 'info');
          } 
          else if (activeTool === TOOLS.RED_LITMUS || activeTool === TOOLS.BLUE_LITMUS) {
            if (!well.liquidId) {
              showMessage('Add a liquid to this well before testing!', 'error');
              return prev;
            }
            
            if (activeTool === TOOLS.RED_LITMUS) {
              well.redTested = true;
              showMessage('Tested with Red Litmus Paper.', 'info');
            } else {
              well.blueTested = true;
              showMessage('Tested with Blue Litmus Paper.', 'info');
            }
          }

          newWells[wellIndex] = well;
          return newWells;
        });
      };

      const handleGuess = (wellIndex, guessType) => {
        setWells(prev => {
          const newWells = [...prev];
          const well = { ...newWells[wellIndex] };
          const actualType = LIQUIDS[well.liquidId].type;
          
          well.guess = guessType;
          well.isCorrect = (guessType === actualType);
          
          if (well.isCorrect) {
            showMessage('Correct identification!', 'success');
          } else {
            showMessage('Incorrect. Check your litmus results again.', 'error');
          }

          newWells[wellIndex] = well;
          return newWells;
        });
      };

      // --- Render Helpers ---
      const getLitmusResultColor = (paperType, liquidId) => {
        if (!liquidId) return '';
        const liquidType = LIQUIDS[liquidId].type;
        
        if (paperType === 'red') {
          return liquidType === 'base' ? 'animate-red-to-blue' : 'bg-red-400';
        } else {
          return liquidType === 'acid' ? 'animate-blue-to-red' : 'bg-blue-400';
        }
      };

      return (
        <div className={`min-h-screen text-slate-100 font-sans selection:bg-blue-500/30 pb-12 ${activeTool ? '[&_*]:cursor-none' : ''}`}>
          
          {/* --- CUSTOM FLOATING CURSOR --- */}
          {activeTool && isMouseInWindow && (
            <div 
              className="fixed z-[9999] pointer-events-none drop-shadow-2xl"
              style={{ 
                left: mousePos.x, 
                top: mousePos.y,
                transform: 
                  activeTool === TOOLS.DROPPER ? 'translate(-50%, -95%)' : 
                  activeTool === TOOLS.CLEAN ? 'translate(-50%, -50%)' :
                  'translate(-50%, -95%)'
              }}
            >
              {activeTool === TOOLS.DROPPER && (
                <div className="flex flex-col items-center scale-125">
                  <div className="w-8 h-10 bg-pink-300 rounded-t-full border-2 border-slate-700 z-10 -mb-1 shadow-inner"></div>
                  <div className="w-3 h-16 bg-white/40 border-2 border-slate-700 rounded-b-full overflow-hidden flex flex-col justify-end relative backdrop-blur-[2px]">
                    {dropperContent && <div className={`w-full h-10 ${LIQUIDS[dropperContent].dropperColor} transition-all duration-300`}></div>}
                  </div>
                </div>
              )}
              
              {activeTool === TOOLS.RED_LITMUS && (
                <div className="w-6 h-24 bg-red-400 border border-red-500/50 shadow-lg rounded-sm" />
              )}

              {activeTool === TOOLS.BLUE_LITMUS && (
                <div className="w-6 h-24 bg-blue-400 border border-blue-500/50 shadow-lg rounded-sm" />
              )}

              {activeTool === TOOLS.CLEAN && (
                <div className="bg-yellow-400 w-12 h-8 rounded-md border-2 border-yellow-600 shadow-lg flex items-center justify-center opacity-90">
                  <Eraser size={20} className="text-yellow-800" />
                </div>
              )}
            </div>
          )}

          {/* Header */}
          <header className="bg-slate-900 border-b border-slate-700 p-4 shadow-md flex justify-between items-center sticky top-0 z-40 relative">
            <div>
              <h1 className="text-2xl font-bold flex items-center gap-2">
                <Beaker className="text-blue-400" />
                Litmus Test Simulator
              </h1>
              <p className="text-slate-400 text-sm mt-1">Click tools to equip them, click again to put them down.</p>
            </div>
            <button 
              onClick={() => setShowTheory(!showTheory)}
              className="flex items-center gap-2 px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded-lg border border-slate-600 transition-colors z-50 cursor-pointer"
            >
              <Info size={18} />
              {showTheory ? 'Hide Theory' : 'Show Theory'}
            </button>
          </header>

          {/* Theory Panel (Collapsible) */}
          {showTheory && (
            <div className="bg-slate-700 border-b border-slate-600 p-6 shadow-inner text-sm leading-relaxed relative z-30">
              <div className="max-w-4xl mx-auto flex flex-col md:flex-row gap-8">
                <div className="flex-1">
                  <h3 className="text-lg font-semibold text-white mb-2">How Litmus Paper Works</h3>
                  <p className="mb-2">Litmus is an indicator that changes color depending on the pH of a liquid.</p>
                  <ul className="list-disc pl-5 space-y-1">
                    <li><strong className="text-red-400">Acids:</strong> Turn blue litmus paper red. Red paper stays red.</li>
                    <li><strong className="text-blue-400">Bases:</strong> Turn red litmus paper blue. Blue paper stays blue.</li>
                    <li><strong className="text-slate-300">Neutrals:</strong> Do not change the color of either paper.</li>
                  </ul>
                </div>
                <div className="flex-1 bg-slate-800 p-4 rounded-lg border border-slate-600">
                  <h4 className="font-medium text-white mb-2">Instructions:</h4>
                  <ol className="list-decimal pl-5 space-y-1 text-slate-300">
                    <li>Click the <strong>Dropper</strong> to equip it.</li>
                    <li>With the dropper active, click a vial to draw liquid.</li>
                    <li>Click a well to deposit the drops.</li>
                    <li><strong>IMPORTANT:</strong> Click the <strong>Waste Bin</strong> to flush the dropper before picking up a new liquid!</li>
                    <li>Click a litmus paper stack to equip a strip, then click a filled well to test.</li>
                  </ol>
                </div>
              </div>
            </div>
          )}

          {/* Main Workspace */}
          <div className="max-w-7xl mx-auto p-6 flex flex-col lg:flex-row gap-8 mt-4 relative z-20">
            
            {/* Left Toolbar (Tools & Vials) */}
            <div className="w-full lg:w-80 flex flex-col gap-6">
              
              {/* Dropper Station */}
              <div className="bg-slate-900 rounded-xl border border-slate-700 p-5 shadow-lg transition-colors duration-300">
                <h2 className="text-sm uppercase tracking-wider text-slate-400 font-bold mb-4 flex justify-between">
                  Dropper Station
                  {activeTool === TOOLS.DROPPER && <span className="text-blue-400 animate-pulse text-[10px]">EQUIPPED</span>}
                </h2>
                <div className="flex justify-between items-end gap-4">
                  
                  {/* Dropper Tool Button */}
                  <div 
                    onClick={() => toggleTool(TOOLS.DROPPER)}
                    className={`flex flex-col items-center p-3 rounded-lg border transition-all flex-1 cursor-pointer ${
                      activeTool === TOOLS.DROPPER ? 'bg-blue-500/20 border-blue-400 shadow-[0_0_15px_rgba(59,130,246,0.3)]' : 'bg-slate-800 border-slate-600 hover:bg-slate-700'
                    }`}
                  >
                    <div className={`flex flex-col items-center scale-110 transition-opacity ${activeTool === TOOLS.DROPPER ? 'opacity-30' : 'opacity-100'}`}>
                      <div className="w-8 h-10 bg-pink-300 rounded-t-full border-2 border-slate-600 z-10 -mb-1 shadow-[inset_-2px_-2px_4px_rgba(0,0,0,0.2)]"></div>
                      <div className="w-3 h-16 bg-white/20 border-2 border-slate-600 rounded-b-full overflow-hidden flex flex-col justify-end relative shadow-[inset_-1px_-1px_3px_rgba(0,0,0,0.1)]">
                        {dropperContent && <div className={`w-full h-8 ${LIQUIDS[dropperContent].dropperColor} transition-all duration-300`}></div>}
                      </div>
                    </div>
                    <span className="text-xs font-medium mt-3 text-slate-300 text-center">
                      {activeTool === TOOLS.DROPPER ? 'Click to Unequip' : (dropperContent ? `Contains ${dropperContent}` : 'Equip Dropper')}
                    </span>
                  </div>

                  {/* Tool Trash Can */}
                  <div 
                    onClick={handleTrashClick}
                    className={`flex flex-col items-center justify-center p-3 h-36 w-24 rounded-lg border-2 border-dashed transition-all ${
                      activeTool 
                        ? 'border-slate-400 bg-slate-800 hover:bg-slate-700 cursor-pointer hover:border-red-400 hover:shadow-[0_0_15px_rgba(248,113,113,0.4)]' 
                        : 'border-slate-700 bg-slate-800/30 opacity-50'
                    }`}
                  >
                    <Trash2 size={28} className={activeTool ? 'text-red-400 animate-pulse' : 'text-slate-500'} />
                    <span className="text-[10px] uppercase font-bold text-slate-400 text-center mt-2">Discard<br/>Tool</span>
                  </div>

                </div>
              </div>

              {/* Vials Section */}
              <div className="bg-slate-900 rounded-xl border border-slate-700 p-5 shadow-lg">
                <h2 className="text-sm uppercase tracking-wider text-slate-400 font-bold mb-4">Unknown Liquids</h2>
                <div className="grid grid-cols-3 gap-3">
                  {Object.values(LIQUIDS).map(liquid => (
                    <div
                      key={liquid.id}
                      onClick={() => handleVialClick(liquid.id)}
                      className={`relative flex flex-col items-center p-2 rounded-xl border-2 transition-all ${
                        activeTool === TOOLS.DROPPER ? 'border-transparent hover:border-blue-400 hover:bg-slate-800 cursor-pointer' : 'border-transparent opacity-70 cursor-pointer'
                      }`}
                    >
                      {/* Bottle Visual */}
                      <div className="w-12 h-16 border-2 border-slate-400/80 rounded-b-xl rounded-t flex flex-col justify-end overflow-hidden relative shadow-inner bg-white/5">
                         <div className="absolute -top-3 left-1/2 -translate-x-1/2 w-4 h-3 bg-slate-500 rounded-sm"></div>
                         <div className={`w-full h-10 ${liquid.dropperColor} opacity-80 backdrop-blur-sm`}></div>
                         <div className="absolute inset-0 flex flex-col items-center justify-center font-black text-slate-900 drop-shadow-md">
                           <span className="bg-white/80 px-2 py-0.5 rounded text-xs border border-slate-300">{liquid.id}</span>
                         </div>
                      </div>
                      <span className="text-[10px] font-medium mt-2 text-slate-400">{liquid.name}</span>
                    </div>
                  ))}
                </div>
              </div>

              {/* Paper & Cleanup Section */}
              <div className="flex gap-4">
                <div className="bg-slate-900 rounded-xl border border-slate-700 p-4 shadow-lg flex-1 flex flex-col">
                  <h2 className="text-sm uppercase tracking-wider text-slate-400 font-bold mb-3">Litmus Pads</h2>
                  <div className="flex justify-around items-center h-full gap-2">
                    
                    {/* Red Stack */}
                    <div 
                      onClick={() => toggleTool(TOOLS.RED_LITMUS)}
                      className={`w-14 h-24 bg-red-400 border-l-4 border-b-4 border-red-500 shadow-md flex items-center justify-center transition-all hover:-translate-y-1 cursor-pointer ${
                        activeTool === TOOLS.RED_LITMUS ? 'ring-2 ring-red-300 ring-offset-2 ring-offset-slate-900 scale-105 opacity-50' : '-rotate-3'
                      }`}
                    >
                      <span className="rotate-90 whitespace-nowrap text-xs font-black text-red-900/40 tracking-widest uppercase">Red Litmus</span>
                    </div>

                    {/* Blue Stack */}
                    <div 
                      onClick={() => toggleTool(TOOLS.BLUE_LITMUS)}
                      className={`w-14 h-24 bg-blue-400 border-l-4 border-b-4 border-blue-500 shadow-md flex items-center justify-center transition-all hover:-translate-y-1 cursor-pointer ${
                        activeTool === TOOLS.BLUE_LITMUS ? 'ring-2 ring-blue-300 ring-offset-2 ring-offset-slate-900 scale-105 opacity-50' : 'rotate-3'
                      }`}
                    >
                      <span className="rotate-90 whitespace-nowrap text-xs font-black text-blue-900/40 tracking-widest uppercase">Blue Litmus</span>
                    </div>

                  </div>
                </div>

                <div className="bg-slate-900 rounded-xl border border-slate-700 p-4 shadow-lg w-28 flex flex-col items-center justify-center">
                   <button
                      onClick={() => toggleTool(TOOLS.CLEAN)}
                      className={`w-full flex flex-col items-center justify-center gap-2 p-3 rounded-lg border transition-all h-full cursor-pointer ${
                        activeTool === TOOLS.CLEAN 
                          ? 'bg-yellow-500/20 border-yellow-400 text-yellow-200 shadow-[0_0_15px_rgba(250,204,21,0.3)] opacity-50' 
                          : 'bg-slate-800 border-slate-600 text-slate-300 hover:bg-slate-700'
                      }`}
                    >
                      <Eraser size={24} />
                      <span className="text-[10px] font-bold uppercase text-center">Clean<br/>Wells</span>
                    </button>
                </div>
              </div>

            </div>

            {/* Spot Plate Area */}
            <div className="flex-1 flex flex-col items-center relative z-10">
              
              {/* Toast Message overlay */}
              <div className="absolute -top-2 left-1/2 -translate-x-1/2 w-full max-w-xl flex justify-center z-30 pointer-events-none">
                {message && (
                  <div className={`flex items-center gap-2 px-5 py-3 rounded-full text-sm font-bold shadow-xl animate-in fade-in slide-in-from-top-4 ${
                    message.type === 'error' ? 'bg-red-900/90 text-red-100 border border-red-500' : 
                    message.type === 'success' ? 'bg-green-900/90 text-green-100 border border-green-500' : 
                    'bg-blue-900/90 text-blue-100 border border-blue-500'
                  }`}>
                    {message.type === 'error' && <AlertCircle size={18} />}
                    {message.type === 'success' && <CheckCircle2 size={18} />}
                    {message.type === 'info' && <Info size={18} />}
                    {message.text}
                  </div>
                )}
              </div>

              {/* Ceramic Spot Plate */}
              <div className="bg-slate-50 rounded-[3rem] p-8 shadow-[0_25px_50px_rgba(0,0,0,0.5),inset_0_5px_15px_rgba(255,255,255,0.8)] border border-slate-300 w-full max-w-4xl mt-10">
                <div className="grid grid-cols-2 lg:grid-cols-3 gap-x-12 gap-y-16 place-items-center">
                  
                  {wells.map((well, index) => (
                    <div key={well.id} className="flex flex-col items-center gap-6 w-full">
                      
                      {/* The Well Itself */}
                      <div 
                        onClick={() => handleWellClick(index)}
                        className={`relative w-24 h-24 rounded-full bg-slate-200 shadow-[inset_0_10px_20px_rgba(0,0,0,0.2),0_2px_4px_rgba(255,255,255,0.8)] border border-slate-300 transition-all flex items-center justify-center ${
                          activeTool ? 'hover:ring-4 hover:ring-blue-300/50 cursor-pointer hover:scale-105' : 'cursor-pointer'
                        }`}
                      >
                        
                        {/* Liquid inside well */}
                        {well.liquidId && (
                          <div className={`absolute inset-2 rounded-full ${LIQUIDS[well.liquidId].wellColor} animate-in zoom-in duration-500 backdrop-blur-[1px]`} />
                        )}

                        {/* Dipped Red Litmus Paper - STICKS OUT! */}
                        {well.redTested && (
                          <div className="absolute bottom-4 left-3 origin-bottom -rotate-12 flex flex-col shadow-[2px_4px_10px_rgba(0,0,0,0.3)] z-10 w-7 h-32 pointer-events-none drop-shadow-md">
                            {/* Dry top part */}
                            <div className="w-full h-[60%] bg-red-400 rounded-t-sm border-x border-t border-red-500/50" />
                            {/* Wet bottom part */}
                            <div className={`w-full h-[40%] ${getLitmusResultColor('red', well.liquidId)} rounded-b-sm border-x border-b border-black/20 relative`}>
                                {/* Wetness gradient overlay */}
                                <div className="absolute top-0 left-0 right-0 h-2 bg-gradient-to-b from-red-400 to-transparent mix-blend-overlay"></div>
                            </div>
                          </div>
                        )}

                        {/* Dipped Blue Litmus Paper - STICKS OUT! */}
                        {well.blueTested && (
                          <div className="absolute bottom-4 right-3 origin-bottom rotate-12 flex flex-col shadow-[-2px_4px_10px_rgba(0,0,0,0.3)] z-10 w-7 h-32 pointer-events-none drop-shadow-md">
                            {/* Dry top part */}
                            <div className="w-full h-[60%] bg-blue-400 rounded-t-sm border-x border-t border-blue-500/50" />
                            {/* Wet bottom part */}
                            <div className={`w-full h-[40%] ${getLitmusResultColor('blue', well.liquidId)} rounded-b-sm border-x border-b border-black/20 relative`}>
                                 {/* Wetness gradient overlay */}
                                 <div className="absolute top-0 left-0 right-0 h-2 bg-gradient-to-b from-blue-400 to-transparent mix-blend-overlay"></div>
                            </div>
                          </div>
                        )}

                        {/* Hover state hint */}
                        {!well.liquidId && (
                          <span className="text-slate-400 text-sm font-bold select-none opacity-40">{index + 1}</span>
                        )}
                      </div>

                      {/* Identification Controls */}
                      {well.liquidId ? (
                        <div className="flex flex-col items-center w-full px-2 z-20">
                          <div className="text-slate-500 text-xs font-bold mb-1.5 uppercase tracking-wider bg-slate-200 px-3 py-0.5 rounded-full border border-slate-300 shadow-sm">{LIQUIDS[well.liquidId].name}</div>
                          
                          {well.isCorrect ? (
                            <div className="flex items-center gap-1.5 px-3 py-1.5 bg-green-100 text-green-700 rounded-lg font-bold text-sm border border-green-300 w-full justify-center shadow-sm">
                              <CheckCircle2 size={16} />
                              {well.guess.toUpperCase()}
                            </div>
                          ) : (
                            <div className="flex flex-col w-full gap-1">
                              <div className="grid grid-cols-3 gap-1 h-8">
                                <button 
                                  onClick={(e) => { e.stopPropagation(); handleGuess(index, 'acid'); }}
                                  className={`text-xs font-bold rounded shadow-sm border transition-colors relative z-20 ${well.guess === 'acid' ? 'bg-red-100 text-red-700 border-red-400' : 'bg-slate-100 text-slate-600 hover:bg-slate-200 border-slate-300'} ${activeTool ? 'pointer-events-auto cursor-pointer' : 'cursor-pointer'}`}
                                >
                                  Acid
                                </button>
                                <button 
                                  onClick={(e) => { e.stopPropagation(); handleGuess(index, 'base'); }}
                                  className={`text-xs font-bold rounded shadow-sm border transition-colors relative z-20 ${well.guess === 'base' ? 'bg-blue-100 text-blue-700 border-blue-400' : 'bg-slate-100 text-slate-600 hover:bg-slate-200 border-slate-300'} ${activeTool ? 'pointer-events-auto cursor-pointer' : 'cursor-pointer'}`}
                                >
                                  Base
                                </button>
                                <button 
                                  onClick={(e) => { e.stopPropagation(); handleGuess(index, 'neutral'); }}
                                  className={`text-xs font-bold rounded shadow-sm border transition-colors relative z-20 ${well.guess === 'neutral' ? 'bg-slate-300 text-slate-800 border-slate-500' : 'bg-slate-100 text-slate-600 hover:bg-slate-200 border-slate-300'} ${activeTool ? 'pointer-events-auto cursor-pointer' : 'cursor-pointer'}`}
                                >
                                  Neutral
                                </button>
                              </div>
                              {well.isCorrect === false && (
                                <div className="text-red-500 text-xs font-bold text-center flex items-center justify-center gap-1 mt-1 bg-red-50 py-0.5 rounded border border-red-100">
                                  <XCircle size={12} /> Incorrect
                                </div>
                              )}
                            </div>
                          )}
                        </div>
                      ) : (
                        <div className="h-[4.5rem] flex items-center justify-center z-20">
                          <span className="text-slate-400 text-xs italic bg-slate-100 px-3 py-1 rounded-full border border-slate-200 shadow-sm">Empty Well</span>
                        </div>
                      )}

                    </div>
                  ))}
                  
                </div>
              </div>
            </div>

          </div>
        </div>
      );
    }

    // Render the React app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
