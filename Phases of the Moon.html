<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moon Phase Simulator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Custom styles for range inputs to match the original accent colors */
    input[type=range] {
      -webkit-appearance: none;
      background: transparent;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 16px;
      width: 16px;
      border-radius: 50%;
      background: currentColor;
      cursor: pointer;
      margin-top: -6px;
    }
    input[type=range]::-webkit-slider-runnable-track {
      width: 100%;
      height: 4px;
      cursor: pointer;
      background: #334155;
      border-radius: 2px;
    }
    #speedInput { color: #6366f1; } /* indigo-500 */
    #angleInput { color: #94a3b8; } /* slate-400 */
  </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans flex flex-col min-h-screen">

  <!-- Header -->
  <header class="bg-slate-900 border-b border-slate-800 p-4 shadow-md">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <div class="flex items-center gap-3">
        <!-- Moon Icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-8 h-8 text-indigo-400">
          <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
        </svg>
        <h1 class="text-2xl font-bold tracking-tight">Lunar Phase Simulator</h1>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col lg:flex-row max-w-7xl w-full mx-auto p-4 gap-6">
    
    <!-- Left/Top: Interactive Canvas -->
    <div class="flex-1 flex flex-col bg-slate-900 rounded-2xl border border-slate-800 overflow-hidden shadow-xl relative">
      <div class="absolute top-4 left-4 bg-slate-800/80 backdrop-blur px-4 py-2 rounded-full border border-slate-700 flex items-center gap-2 text-sm text-slate-300 z-10">
        <!-- Info Icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4">
          <circle cx="12" cy="12" r="10"></circle><path d="M12 16v-4"></path><path d="M12 8h.01"></path>
        </svg>
        Drag the Sun to change light direction
      </div>
      
      <div class="w-full h-full flex items-center justify-center min-h-[400px]">
        <canvas id="mainCanvas" width="800" height="600" class="max-w-full h-auto object-contain cursor-default"></canvas>
      </div>
    </div>

    <!-- Right/Bottom: Controls & View from Earth -->
    <aside class="w-full lg:w-80 flex flex-col gap-6 shrink-0">
      
      <!-- Phase Visualizer Card -->
      <div class="bg-slate-900 rounded-2xl border border-slate-800 p-6 flex flex-col items-center shadow-xl">
        <div class="flex items-center justify-between w-full mb-4">
          <h2 class="text-sm font-semibold uppercase tracking-wider text-slate-400">View from Earth</h2>
          <label class="flex items-center gap-2 text-sm text-slate-300 cursor-pointer hover:text-white transition-colors">
            <input type="checkbox" id="revealViewCheck" class="w-4 h-4 rounded bg-slate-800 border-slate-700 text-indigo-500 focus:ring-indigo-500 cursor-pointer">
            Reveal
          </label>
        </div>
        
        <div id="phaseViewContent" class="hidden flex-col items-center w-full">
          <div class="w-48 h-48 mb-6">
            <canvas id="phaseCanvas" width="200" height="200" class="w-full h-full"></canvas>
          </div>
          
          <div class="text-center">
            <div id="phaseName" class="text-2xl font-bold text-white mb-1">New Moon</div>
            <div id="illumination" class="text-sm text-slate-400">Illumination: 0%</div>
          </div>
        </div>

        <!-- Placeholder when view is hidden -->
        <div id="phaseViewPlaceholder" class="flex-1 flex flex-col items-center justify-center text-slate-500 text-sm italic py-16 text-center w-full">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-8 h-8 mb-3 opacity-50"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>
          Check "Reveal" to see<br>the view from Earth
        </div>
      </div>

      <!-- Controls Card -->
      <div class="bg-slate-900 rounded-2xl border border-slate-800 p-6 shadow-xl flex flex-col gap-6">
        <h2 class="text-sm font-semibold uppercase tracking-wider text-slate-400">Simulation Controls</h2>
        
        <!-- Play/Pause & Speed -->
        <div class="flex items-center gap-4">
          <button id="playBtn" class="p-3 rounded-full flex items-center justify-center transition-colors bg-indigo-500/20 text-indigo-400 hover:bg-indigo-500/30">
            <!-- Pause Icon (Default) -->
            <svg id="pauseIcon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6 block">
              <rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect>
            </svg>
            <!-- Play Icon -->
            <svg id="playIcon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6 hidden">
              <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
          </button>
          
          <div class="flex-1 flex flex-col gap-2">
            <label class="text-xs text-slate-400 flex justify-between">
              <span>Orbit Speed</span>
              <span id="speedLabel">5x</span>
            </label>
            <input id="speedInput" type="range" min="0.001" max="0.02" step="0.001" value="0.005" class="w-full cursor-pointer">
          </div>
        </div>

        <hr class="border-slate-800">

        <!-- Manual Angle Control -->
        <div class="flex flex-col gap-2">
          <label class="text-xs text-slate-400 flex justify-between">
            <span>Manual Position</span>
            <!-- Sun Icon -->
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 text-slate-500">
              <circle cx="12" cy="12" r="4"></circle><path d="M12 2v2"></path><path d="M12 20v2"></path><path d="m4.93 4.93 1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="m6.34 17.66-1.41 1.41"></path><path d="m19.07 4.93-1.41 1.41"></path>
            </svg>
          </label>
          <input id="angleInput" type="range" min="0" max="6.28318530718" step="0.01" value="0" class="w-full cursor-pointer">
        </div>

        <hr class="border-slate-800">

        <!-- Highlight Earth View Toggle -->
        <button id="highlightBtn" class="w-full py-3 px-4 rounded-xl bg-slate-800 border border-slate-700 text-slate-300 hover:bg-slate-700 transition-colors text-sm font-medium flex items-center justify-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4"><path d="M2 12h4"/><path d="M18 12h4"/><path d="M12 2v4"/><path d="M12 18v4"/><path d="m4.93 4.93 2.83 2.83"/><path d="m16.24 16.24 2.83 2.83"/><path d="m19.07 4.93-2.83 2.83"/><path d="m7.76 16.24-2.83 2.83"/><circle cx="12" cy="12" r="4"/></svg>
          Highlight Earth's View
        </button>
      </div>

    </aside>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // --- State ---
      let moonAngle = 0;
      let sunPos = { x: 700, y: 300 };
      let isPlaying = true;
      let speed = 0.005;
      let isDraggingSun = false;
      let isHoveringSun = false;
      let showPhaseView = false;
      let highlightVisibleMoon = false;

      // --- Constants ---
      const CANVAS_WIDTH = 800;
      const CANVAS_HEIGHT = 600;
      const CX = CANVAS_WIDTH / 2;
      const CY = CANVAS_HEIGHT / 2;
      const ORBIT_RADIUS = 180;
      const EARTH_RADIUS = 30;
      const MOON_RADIUS = 14;
      const SUN_RADIUS = 35;

      // --- DOM Elements ---
      const mainCanvas = document.getElementById('mainCanvas');
      const phaseCanvas = document.getElementById('phaseCanvas');
      const mainCtx = mainCanvas.getContext('2d');
      const phaseCtx = phaseCanvas.getContext('2d');
      
      const playBtn = document.getElementById('playBtn');
      const playIcon = document.getElementById('playIcon');
      const pauseIcon = document.getElementById('pauseIcon');
      const speedInput = document.getElementById('speedInput');
      const speedLabel = document.getElementById('speedLabel');
      const angleInput = document.getElementById('angleInput');
      
      const phaseNameEl = document.getElementById('phaseName');
      const illuminationEl = document.getElementById('illumination');

      const revealViewCheck = document.getElementById('revealViewCheck');
      const phaseViewContent = document.getElementById('phaseViewContent');
      const phaseViewPlaceholder = document.getElementById('phaseViewPlaceholder');
      const highlightBtn = document.getElementById('highlightBtn');

      // --- Background Stars ---
      const stars = Array.from({ length: 150 }).map(() => ({
        x: Math.random() * CANVAS_WIDTH,
        y: Math.random() * CANVAS_HEIGHT,
        r: Math.random() * 1.5,
        alpha: Math.random() * 0.8 + 0.2
      }));

      // --- UI Updaters ---
      function updatePlayBtnUI() {
        if (isPlaying) {
          playBtn.className = "p-3 rounded-full flex items-center justify-center transition-colors bg-indigo-500/20 text-indigo-400 hover:bg-indigo-500/30";
          playIcon.classList.add('hidden');
          playIcon.classList.remove('block');
          pauseIcon.classList.add('block');
          pauseIcon.classList.remove('hidden');
        } else {
          playBtn.className = "p-3 rounded-full flex items-center justify-center transition-colors bg-green-500/20 text-green-400 hover:bg-green-500/30";
          playIcon.classList.add('block');
          playIcon.classList.remove('hidden');
          pauseIcon.classList.add('hidden');
          pauseIcon.classList.remove('block');
        }
      }

      function updateCursor() {
        if (isDraggingSun) {
          mainCanvas.className = "max-w-full h-auto object-contain cursor-grabbing";
        } else if (isHoveringSun) {
          mainCanvas.className = "max-w-full h-auto object-contain cursor-grab";
        } else {
          mainCanvas.className = "max-w-full h-auto object-contain cursor-default";
        }
      }

      // --- Event Listeners ---
      playBtn.addEventListener('click', () => {
        isPlaying = !isPlaying;
        updatePlayBtnUI();
      });

      speedInput.addEventListener('input', (e) => {
        speed = parseFloat(e.target.value);
        speedLabel.textContent = Math.round(speed * 1000) + 'x';
      });

      angleInput.addEventListener('input', (e) => {
        moonAngle = parseFloat(e.target.value);
        isPlaying = false;
        updatePlayBtnUI();
      });

      revealViewCheck.addEventListener('change', (e) => {
        showPhaseView = e.target.checked;
        if (showPhaseView) {
          phaseViewContent.classList.remove('hidden');
          phaseViewContent.classList.add('flex');
          phaseViewPlaceholder.classList.add('hidden');
          phaseViewPlaceholder.classList.remove('flex');
        } else {
          phaseViewContent.classList.add('hidden');
          phaseViewContent.classList.remove('flex');
          phaseViewPlaceholder.classList.remove('hidden');
          phaseViewPlaceholder.classList.add('flex');
        }
      });

      highlightBtn.addEventListener('click', () => {
        highlightVisibleMoon = !highlightVisibleMoon;
        if (highlightVisibleMoon) {
          highlightBtn.className = "w-full py-3 px-4 rounded-xl bg-sky-500/20 border border-sky-500/50 text-sky-400 hover:bg-sky-500/30 transition-colors text-sm font-medium flex items-center justify-center gap-2";
        } else {
          highlightBtn.className = "w-full py-3 px-4 rounded-xl bg-slate-800 border border-slate-700 text-slate-300 hover:bg-slate-700 transition-colors text-sm font-medium flex items-center justify-center gap-2";
        }
      });

      // Pointer Event Helpers
      function getMousePos(e) {
        const rect = mainCanvas.getBoundingClientRect();
        const scaleX = mainCanvas.width / rect.width;
        const scaleY = mainCanvas.height / rect.height;
        
        let clientX = e.clientX;
        let clientY = e.clientY;
        
        if (e.touches && e.touches.length > 0) {
          clientX = e.touches[0].clientX;
          clientY = e.touches[0].clientY;
        }

        return {
          x: (clientX - rect.left) * scaleX,
          y: (clientY - rect.top) * scaleY
        };
      }

      mainCanvas.addEventListener('pointerdown', (e) => {
        const pos = getMousePos(e);
        const dist = Math.hypot(pos.x - sunPos.x, pos.y - sunPos.y);
        if (dist <= SUN_RADIUS + 20) {
          isDraggingSun = true;
          isPlaying = false; // Pause while dragging
          updatePlayBtnUI();
          updateCursor();
          mainCanvas.setPointerCapture(e.pointerId);
        }
      });

      mainCanvas.addEventListener('pointermove', (e) => {
        const pos = getMousePos(e);
        
        // Check hover
        const distToSun = Math.hypot(pos.x - sunPos.x, pos.y - sunPos.y);
        const wasHovering = isHoveringSun;
        isHoveringSun = distToSun <= SUN_RADIUS + 20;
        
        if (wasHovering !== isHoveringSun) {
          updateCursor();
        }

        if (!isDraggingSun) return;

        // Prevent sun from getting too close to Earth (minimum distance)
        let dx = pos.x - CX;
        let dy = CY - pos.y; // Standard math coordinates (y goes up)
        const distToEarth = Math.hypot(dx, dy);
        const MIN_SUN_DIST = ORBIT_RADIUS + 70;
        
        if (distToEarth < MIN_SUN_DIST) {
          dx = (dx / distToEarth) * MIN_SUN_DIST;
          dy = (dy / distToEarth) * MIN_SUN_DIST;
          sunPos = { x: CX + dx, y: CY - dy };
        } else {
          sunPos = pos;
        }
      });

      function handlePointerUp(e) {
        if (isDraggingSun) {
          isDraggingSun = false;
          mainCanvas.releasePointerCapture(e.pointerId);
          updateCursor();
        }
      }

      mainCanvas.addEventListener('pointerup', handlePointerUp);
      mainCanvas.addEventListener('pointercancel', handlePointerUp);

      // --- Drawing Functions ---
      function drawMainCanvas(sunAngle) {
        // Clear background
        mainCtx.fillStyle = '#0a0a1a';
        mainCtx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

        // Draw stars
        mainCtx.fillStyle = '#ffffff';
        stars.forEach(star => {
          mainCtx.globalAlpha = star.alpha;
          mainCtx.beginPath();
          mainCtx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
          mainCtx.fill();
        });
        mainCtx.globalAlpha = 1.0;

        // Draw Light Rays
        mainCtx.strokeStyle = 'rgba(253, 184, 19, 0.1)';
        mainCtx.lineWidth = 2;
        const dx = CX - sunPos.x;
        const dy = CY - sunPos.y;
        const dist = Math.hypot(dx, dy);
        const dirX = dx / dist;
        const dirY = dy / dist;
        
        for (let i = -6; i <= 6; i++) {
          const perpX = -dirY;
          const perpY = dirX;
          const spacing = 40;
          const startX = sunPos.x + perpX * spacing * i;
          const startY = sunPos.y + perpY * spacing * i;
          
          mainCtx.beginPath();
          mainCtx.moveTo(startX, startY);
          mainCtx.lineTo(startX + dirX * 1500, startY + dirY * 1500);
          mainCtx.stroke();
        }

        // Draw Sun
        mainCtx.beginPath();
        mainCtx.arc(sunPos.x, sunPos.y, SUN_RADIUS, 0, 2 * Math.PI);
        mainCtx.fillStyle = '#FDB813';
        mainCtx.shadowBlur = isHoveringSun ? 60 : 40;
        mainCtx.shadowColor = '#FDB813';
        mainCtx.fill();
        mainCtx.shadowBlur = 0;

        // Draw Orbit
        mainCtx.beginPath();
        mainCtx.arc(CX, CY, ORBIT_RADIUS, 0, 2 * Math.PI);
        mainCtx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
        mainCtx.setLineDash([4, 6]);
        mainCtx.stroke();
        mainCtx.setLineDash([]);

        // Draw Earth
        mainCtx.beginPath();
        mainCtx.arc(CX, CY, EARTH_RADIUS, 0, 2 * Math.PI);
        mainCtx.fillStyle = '#2b78e4';
        mainCtx.fill();
        
        // Earth Terminator
        mainCtx.save();
        mainCtx.translate(CX, CY);
        mainCtx.rotate(-sunAngle);
        mainCtx.beginPath();
        mainCtx.arc(0, 0, EARTH_RADIUS, Math.PI/2, 3*Math.PI/2);
        mainCtx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        mainCtx.fill();
        mainCtx.restore();

        // Draw Moon
        const mx = CX + ORBIT_RADIUS * Math.cos(moonAngle);
        const my = CY - ORBIT_RADIUS * Math.sin(moonAngle);

        // Line of sight
        mainCtx.beginPath();
        mainCtx.moveTo(CX, CY);
        mainCtx.lineTo(mx, my);
        mainCtx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
        mainCtx.stroke();

        mainCtx.save();
        mainCtx.translate(mx, my);
        mainCtx.rotate(-sunAngle);

        // Lit half
        mainCtx.beginPath();
        mainCtx.arc(0, 0, MOON_RADIUS, -Math.PI/2, Math.PI/2);
        mainCtx.fillStyle = '#F4F6F0';
        mainCtx.fill();

        // Dark half
        mainCtx.beginPath();
        mainCtx.arc(0, 0, MOON_RADIUS, Math.PI/2, 3*Math.PI/2);
        mainCtx.fillStyle = '#1a1a1a';
        mainCtx.fill();
        
        // Outline
        mainCtx.beginPath();
        mainCtx.arc(0, 0, MOON_RADIUS, 0, Math.PI*2);
        mainCtx.strokeStyle = 'rgba(255,255,255,0.1)';
        mainCtx.stroke();
        mainCtx.restore();

        // Highlight visible hemisphere and draw view cone
        if (highlightVisibleMoon) {
          mainCtx.save();
          mainCtx.translate(mx, my);
          
          // Calculate angle from Moon pointing towards Earth
          const earthAngle = Math.atan2(CY - my, CX - mx);
          mainCtx.rotate(earthAngle);
          
          // Draw bright arc on the side facing Earth
          mainCtx.beginPath();
          mainCtx.arc(0, 0, MOON_RADIUS + 3, -Math.PI/2, Math.PI/2);
          mainCtx.strokeStyle = '#38bdf8'; // Sky blue highlight
          mainCtx.lineWidth = 3;
          mainCtx.stroke();
          
          // Draw a soft viewing cone projecting back to Earth
          const distToEarth = Math.hypot(CX - mx, CY - my);
          mainCtx.beginPath();
          mainCtx.moveTo(0, -(MOON_RADIUS + 3));
          mainCtx.lineTo(distToEarth, 0); // Earth center in this rotated context
          mainCtx.lineTo(0, MOON_RADIUS + 3);
          mainCtx.fillStyle = 'rgba(56, 189, 248, 0.08)';
          mainCtx.fill();
          
          // Dashed lines for the cone edges
          mainCtx.beginPath();
          mainCtx.moveTo(0, -(MOON_RADIUS + 3));
          mainCtx.lineTo(distToEarth, 0);
          mainCtx.moveTo(0, MOON_RADIUS + 3);
          mainCtx.lineTo(distToEarth, 0);
          mainCtx.strokeStyle = 'rgba(56, 189, 248, 0.3)';
          mainCtx.lineWidth = 1;
          mainCtx.setLineDash([4, 4]);
          mainCtx.stroke();
          
          mainCtx.restore();
        }
      }

      function drawPhaseCanvas(phaseDiff) {
        const width = phaseCanvas.width;
        const height = phaseCanvas.height;
        const pcx = width / 2;
        const pcy = height / 2;
        const pR = Math.min(width, height) * 0.45;

        phaseCtx.clearRect(0, 0, width, height);

        // Base dark moon
        phaseCtx.beginPath();
        phaseCtx.arc(pcx, pcy, pR, 0, 2*Math.PI);
        phaseCtx.fillStyle = '#111111';
        phaseCtx.fill();

        const isWaxing = phaseDiff < Math.PI;
        phaseCtx.fillStyle = '#F4F6F0';

        if (isWaxing) {
          phaseCtx.beginPath();
          phaseCtx.arc(pcx, pcy, pR, -Math.PI/2, Math.PI/2);
          phaseCtx.fill();
          phaseCtx.beginPath();
          phaseCtx.ellipse(pcx, pcy, pR * Math.abs(Math.cos(phaseDiff)), pR, 0, 0, 2*Math.PI);
          phaseCtx.fillStyle = phaseDiff < Math.PI/2 ? '#111111' : '#F4F6F0';
          phaseCtx.fill();
        } else {
          phaseCtx.beginPath();
          phaseCtx.arc(pcx, pcy, pR, Math.PI/2, 3*Math.PI/2);
          phaseCtx.fill();
          phaseCtx.beginPath();
          phaseCtx.ellipse(pcx, pcy, pR * Math.abs(Math.cos(phaseDiff)), pR, 0, 0, 2*Math.PI);
          phaseCtx.fillStyle = phaseDiff < 3*Math.PI/2 ? '#F4F6F0' : '#111111';
          phaseCtx.fill();
        }

        // Overlay craters
        phaseCtx.save();
        phaseCtx.globalCompositeOperation = 'source-atop';
        phaseCtx.fillStyle = 'rgba(0, 0, 0, 0.08)';
        phaseCtx.beginPath(); phaseCtx.arc(pcx - pR*0.3, pcy - pR*0.4, pR*0.2, 0, Math.PI*2); phaseCtx.fill();
        phaseCtx.beginPath(); phaseCtx.arc(pcx + pR*0.2, pcy + pR*0.2, pR*0.3, 0, Math.PI*2); phaseCtx.fill();
        phaseCtx.beginPath(); phaseCtx.arc(pcx - pR*0.4, pcy + pR*0.1, pR*0.15, 0, Math.PI*2); phaseCtx.fill();
        phaseCtx.restore();

        // Outer glow
        phaseCtx.beginPath();
        phaseCtx.arc(pcx, pcy, pR, 0, 2*Math.PI);
        phaseCtx.lineWidth = 1;
        phaseCtx.strokeStyle = 'rgba(255,255,255,0.1)';
        phaseCtx.stroke();
      }

      // --- Animation Loop ---
      function animate() {
        if (isPlaying) {
          moonAngle = (moonAngle + speed) % (2 * Math.PI);
          angleInput.value = moonAngle; // Keep slider synced
        }

        // Calculations
        const sunAngle = Math.atan2(CY - sunPos.y, sunPos.x - CX);
        const phaseDiff = (moonAngle - sunAngle + 2 * Math.PI) % (2 * Math.PI);
        
        const phaseIndex = Math.round(phaseDiff / (Math.PI / 4)) % 8;
        const phaseNames = [
          "New Moon", "Waxing Crescent", "First Quarter", "Waxing Gibbous",
          "Full Moon", "Waning Gibbous", "Third Quarter", "Waning Crescent"
        ];
        
        // Update UI Text
        phaseNameEl.textContent = phaseNames[phaseIndex];
        illuminationEl.textContent = `Illumination: ${Math.round((1 - Math.cos(phaseDiff)) / 2 * 100)}%`;

        // Render Canvases
        drawMainCanvas(sunAngle);
        drawPhaseCanvas(phaseDiff);

        requestAnimationFrame(animate);
      }

      // Initialize
      updatePlayBtnUI();
      animate();
    });
